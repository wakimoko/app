<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>出荷管理</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  padding:20px;
  background:#f6efe6;
  font-family:sans-serif;
  color:#111;
}

h1{
  font-size:28px;
}

button{
  margin:5px;
  padding:12px 16px;
  border:none;
  border-radius:18px;
  background:#e6ddd4;
  color:#111;
  font-weight:bold;
}

.active{
  background:#b88a5a;
  color:#fff;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:20px;
  margin-top:15px;
}

.like{
  background:#b88a5a;
  color:white;
}
</style>
</head>

<body>

<h1>出荷管理</h1>

<div>
  <button id="tab_notice" onclick="setTab('notice')">注意事項</button>
  <button id="tab_ship" onclick="setTab('ship')">出荷予定</button>
  <button id="tab_today" onclick="setTab('today')">当日出荷</button>
  <button id="tab_manage" onclick="setTab('manage')">管理</button>
</div>

<div id="dates"></div>
<div id="view"></div>

<script>
const client = supabase.createClient(
  "https://bylottznuwuizncgfltd.supabase.co",
  "sb_publishable_VDryMJYXIZUwumf5gxxqyw__ivv1upf"
);

let currentTab="notice";
let currentDate="5/4";

const dates=["5/4","5/5","5/6","5/7","5/8"];

function setTab(tab){
  currentTab=tab;

  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab_"+tab).classList.add("active");

  renderDates();
  render();
}

function renderDates(){
  const box=document.getElementById("dates");
  box.innerHTML="";

  if(currentTab==="manage") return;

  dates.forEach(d=>{
    let btn=document.createElement("button");
    btn.textContent=d;
    if(d===currentDate) btn.classList.add("active");

    btn.onclick=()=>{
      currentDate=d;
      renderDates();
      render();
    };

    box.appendChild(btn);
  });
}

async function render(){
  const view=document.getElementById("view");
  view.innerHTML="";

  if(currentTab==="ship"){
    view.innerHTML=`
      <div class="card">
        <h3>出荷予定</h3>
        佐川急便 2F<br>
        福山通運 2F / 梱包場 / MJ倉庫
      </div>
    `;
    return;
  }

  if(currentTab==="notice"){
    let {data}=await client.from("shipments")
      .select("*")
      .eq("date",currentDate)
      .eq("category","notice");

    if(!data || data.length===0){
      view.innerHTML='<div class="card">データなし</div>';
      return;
    }

    data.forEach(item=>{
      view.innerHTML+=`
        <div class="card">
          ${item.title}<br>
          ${item.content}<br>
          <button class="like" onclick="like(${item.id},${item.likes||0})">
            👍 ×${item.likes||0}
          </button>
        </div>
      `;
    });
  }

  if(currentTab==="today"){
    view.innerHTML=`
      <div class="card">
        <h3>当日出荷</h3>
        2F：あり / なし<br>
        2Fテーブル：あり / なし<br>
        梱包場：あり / なし<br>
        MJ倉庫：あり / なし
      </div>
    `;
  }

  if(currentTab==="manage"){
    view.innerHTML=`
      <div class="card">
        <h3>追加</h3>
        <input id="title" placeholder="タイトル"><br>
        <textarea id="content" placeholder="内容"></textarea><br>
        <button onclick="add()">追加</button>
      </div>
    `;
  }
}

async function add(){
  await client.from("shipments").insert({
    date:currentDate,
    category:"notice",
    title:document.getElementById("title").value,
    content:document.getElementById("content").value,
    likes:0
  });

  alert("追加した");
  render();
}

async function like(id,count){
  await client.from("shipments")
    .update({likes:count+1})
    .eq("id",id);

  render();
}

setTab("notice");
</script>

</body>
</html>
