<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出荷管理</title>

<style>
body {
  font-family: sans-serif;
  background: #f3eee8;
  padding: 20px;
  color: #000;
  font-size: 18px;
}

h1 {
  font-size: 28px;
}

.tabs button {
  padding: 10px 16px;
  border-radius: 12px;
  border: none;
  margin-right: 6px;
  background: #ddd;
  font-size: 16px;
}

.active {
  background: #a9744f !important;
  color: #fff;
}

.date-btn {
  padding: 10px 14px;
  margin: 4px;
  border-radius: 10px;
  border: none;
  background: #ddd;
  font-size: 16px;
}

.date-active {
  background: #a9744f !important;
  color: #fff;
}

.card {
  background: #fff;
  padding: 16px;
  border-radius: 14px;
  margin-top: 12px;
}

.important {
  color: red;
}

.like {
  margin-top: 10px;
  background: #eee;
  padding: 6px 12px;
  border-radius: 20px;
  display: inline-block;
  cursor: pointer;
}

.like.active {
  background: #d8c2a8;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<h1>出荷管理</h1>

<div class="tabs">
  <button onclick="changeTab('notice')" id="tab-notice">注意事項</button>
  <button onclick="changeTab('shipping')" id="tab-shipping">出荷予定</button>
  <button onclick="changeTab('manage')" id="tab-manage">管理</button>
</div>

<br>

<div id="dateArea">
  <button class="date-btn" onclick="changeDate('5/4')">5/4</button>
  <button class="date-btn" onclick="changeDate('5/5')">5/5</button>
  <button class="date-btn" onclick="changeDate('5/6')">5/6</button>
  <button class="date-btn" onclick="changeDate('5/7')">5/7</button>
  <button class="date-btn" onclick="changeDate('5/8')">5/8</button>
</div>

<div id="content"></div>

<script>
let currentTab = "notice";
let selectedDate = "5/4";

const data = [
  { date:"5/8", title:"三重クレーム", content:"要検品", important:true, likes:0 },
  { date:"5/8", title:"クレーム", content:"要検品", important:true, likes:0 }
];

// タブ切替
function changeTab(tab){
  currentTab = tab;

  document.querySelectorAll(".tabs button").forEach(btn=>btn.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");

  // 管理の時は日付非表示
  document.getElementById("dateArea").classList.toggle("hidden", tab==="manage");

  render();
}

// 日付変更
function changeDate(date){
  selectedDate = date;

  document.querySelectorAll(".date-btn").forEach(btn=>{
    btn.classList.remove("date-active");
    if(btn.innerText === date) btn.classList.add("date-active");
  });

  render();
}

// 表示
function render(){
  const container = document.getElementById("content");
  container.innerHTML = "";

  if(currentTab === "notice"){
    const list = data.filter(d => d.date === selectedDate);

    if(list.length === 0){
      container.innerHTML = "<div class='card'>注意事項はありません</div>";
      return;
    }

    list.forEach((item, index)=>{
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="${item.important ? 'important' : ''}">${item.title}</div>
        <div>${item.content}</div>
        <div class="like" onclick="like(${index}, this)">
          👍 ×${item.likes}
        </div>
      `;

      container.appendChild(div);
    });
  }
}

// 👍
function like(index, el){
  data[index].likes++;

  el.classList.add("active");
  el.innerHTML = `👍 ×${data[index].likes}`;
}

// 初期表示
changeTab("notice");
changeDate("5/4");
</script>

</body>
</html>
