<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出荷管理</title>

<style>
body{
  font-family:sans-serif;
  background:#f5efe9;
  padding:20px;
  color:#000;
  font-size:20px;
}

h1{font-size:28px}

button{
  padding:10px 16px;
  border-radius:12px;
  border:none;
  margin:4px;
  font-size:18px;
}

.tab{background:#ddd;color:#007bff}
.active{background:#a9744f;color:#fff}

.date{background:#ddd;color:#007bff}
.date-active{background:#a9744f;color:#fff}

.card{
  background:#fff;
  padding:16px;
  border-radius:14px;
  margin-top:12px;
}

.important{color:red}

.like{
  margin-top:10px;
  padding:6px 12px;
  border-radius:20px;
  background:#eee;
}

.like.active{background:#d8c2a8}

.hidden{display:none}
</style>
</head>

<body>

<h1>出荷管理</h1>

<div>
  <button id="tab_notice" class="tab" onclick="changeTab('notice')">注意事項</button>
  <button id="tab_ship" class="tab" onclick="changeTab('ship')">出荷予定</button>
  <button id="tab_manage" class="tab" onclick="changeTab('manage')">管理</button>
</div>

<div id="dateArea"></div>

<div id="content"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://bylottznuwuizncgfltd.supabase.co",
  "sb_publishable_VDryMJYXIZUwumf5gxxqyw__ivv1upf"
);

let currentTab="notice";
let currentDate="5/4";

// 日付生成
function renderDates(){
  const box=document.getElementById("dateArea");
  box.innerHTML="";

  if(currentTab==="manage"){
    box.classList.add("hidden");
    return;
  }else{
    box.classList.remove("hidden");
  }

  ["5/4","5/5","5/6","5/7","5/8"].forEach(d=>{
    const btn=document.createElement("button");
    btn.innerText=d;
    btn.className="date";
    if(d===currentDate) btn.classList.add("date-active");

    btn.onclick=()=>{
      currentDate=d;
      renderDates();
      render();
    };

    box.appendChild(btn);
  });
}

// タブ
function changeTab(tab){
  currentTab=tab;

  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab_"+tab).classList.add("active");

  renderDates();
  render();
}

// 表示
async function render(){
  const box=document.getElementById("content");
  box.innerHTML="";

  if(currentTab==="notice"){

    const {data,error}=await supabase
      .from("shipments")
      .select("*")
      .eq("date", currentDate)
      .eq("category","notice");

    if(error){
      box.innerHTML=error.message;
      return;
    }

    if(!data || data.length===0){
      box.innerHTML="<div class='card'>注意事項はありません</div>";
      return;
    }

    data.forEach(item=>{
      box.innerHTML+=`
        <div class="card">
          <div class="${item.status==="重要"?"important":""}">
            <b>${item.title||""}</b>
          </div>
          <div>${item.content||""}</div>
          <div class="like" onclick="like(${item.id},${item.likes||0},${item.liked})">
            👍 ×${item.likes||0}
          </div>
        </div>
      `;
    });
  }

  if(currentTab==="ship"){
    box.innerHTML="<div class='card'>出荷予定（後で追加）</div>";
  }

  if(currentTab==="manage"){
    box.innerHTML=`
      <div class="card">
        <h3>管理</h3>

        <input id="date" value="${currentDate}">
        <input id="title" placeholder="タイトル">
        <textarea id="contentText" placeholder="内容"></textarea>

        <select id="status">
          <option>通常</option>
          <option>重要</option>
        </select>

        <button class="active" onclick="addData()">追加</button>
      </div>
    `;
  }
}

// 追加（重要）
async function addData(){
  const date=document.getElementById("date").value;

  await supabase.from("shipments").insert({
    date:date,
    category:"notice",
    title:document.getElementById("title").value,
    content:document.getElementById("contentText").value,
    status:document.getElementById("status").value,
    likes:0,
    liked:false
  });

  alert("追加したよ");
  currentDate=date;
  changeTab("notice");
}

// 👍
async function like(id,likes,liked){
  await supabase.from("shipments")
    .update({
      likes: liked?likes-1:likes+1,
      liked: !liked
    })
    .eq("id",id);

  render();
}

// 初期
changeTab("notice");
</script>

</body>
</html>
