<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出荷管理</title>
<style>
body{margin:0;padding:20px;background:#f6efe6;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;color:#111}
h1{font-size:28px}
button{margin:5px;padding:12px 16px;border:none;border-radius:18px;background:#e6ddd4;color:#111;font-weight:bold}
.active{background:#b88a5a;color:#fff}
.card{background:#fff;padding:20px;border-radius:20px;margin-top:15px;position:relative}
.item-title{font-size:22px;font-weight:800;margin-bottom:6px}
.item-content{font-size:18px;margin-bottom:40px}
.important{color:red}
input,textarea,select{width:100%;padding:12px;margin-top:10px;border-radius:12px;border:1px solid #ddd;font-size:16px}
textarea{height:100px}
.icon-btn{position:absolute;bottom:10px;width:32px;height:32px;border-radius:50%;padding:0}
.edit-btn{right:50px;background:#e6ddd4}
.delete-btn{right:10px;background:#f3d6d6}
</style>
</head>

<body>

<h1>出荷管理</h1>

<button id="tab_notice" onclick="setTab('notice')">注意事項</button>
<button id="tab_ship" onclick="setTab('ship')">出荷予定</button>
<button id="tab_today" onclick="setTab('today')">当日出荷</button>
<button id="tab_manage" onclick="setTab('manage')">管理</button>

<div id="dates"></div>
<div id="view"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const client = supabase.createClient(
  "https://bylottznuwuizncgfltd.supabase.co",
  "sb_publishable_VDryMJYXIZUwumf5gxxqyw__ivv1upf"
);

let currentTab="notice";
let currentDate="5/4";
let editId=null;
const dateList=["5/4","5/5","5/6","5/7","5/8"];

function setTab(tab){
  currentTab=tab;
  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab_"+tab).classList.add("active");
  renderDates();
  render();
}

function renderDates(){
  const box=document.getElementById("dates");
  box.innerHTML="";
  if(currentTab==="manage") return;

  dateList.forEach(d=>{
    const btn=document.createElement("button");
    btn.textContent=d;
    if(d===currentDate) btn.classList.add("active");
    btn.onclick=()=>{currentDate=d;renderDates();render();};
    box.appendChild(btn);
  });
}

async function render(){
  const view=document.getElementById("view");
  view.innerHTML="";

  if(currentTab==="ship"){
    view.innerHTML=`
      <div class="card">
        <h3>出荷予定</h3>
        佐川急便 2F<br><br>
        福山通運 2F / 梱包場 / MJ倉庫
      </div>`;
    return;
  }

  if(currentTab==="today"){
    view.innerHTML=`
      <div class="card">
        <h3>当日出荷</h3>
        2F：あり / なし<br>
        2Fテーブル：あり / なし<br>
        梱包場：あり / なし<br>
        MJ倉庫：あり / なし
      </div>`;
    return;
  }

  if(currentTab==="notice"){
    const {data,error}=await client
      .from("shipments")
      .select("*")
      .eq("date",currentDate)
      .eq("category","notice")
      .order("id",{ascending:false});

    if(error){view.innerHTML=`<div class="card">${error.message}</div>`;return;}
    if(!data || data.length===0){view.innerHTML=`<div class="card">データなし</div>`;return;}

    data.forEach(item=>{
      view.innerHTML+=`
        <div class="card">
          <div class="item-title ${item.status==="重要"?"important":""}">${item.title||""}</div>
          <div class="item-content">${item.content||""}</div>

          <button class="icon-btn edit-btn" onclick='startEdit(${JSON.stringify(item)})'>✏️</button>
          <button class="icon-btn delete-btn" onclick="deleteItem(${item.id})">🗑️</button>
        </div>`;
    });
  }

  if(currentTab==="manage"){
    view.innerHTML=`
      <div class="card">
        <h3>${editId ? "編集" : "追加"}</h3>

        <select id="dateInput">
          ${dateList.map(d=>`<option>${d}</option>`).join("")}
        </select>

        <input id="title" placeholder="タイトル">
        <textarea id="content" placeholder="内容"></textarea>

        <select id="status">
          <option value="通常">通常</option>
          <option value="重要">重要</option>
        </select>

        <button class="active" onclick="${editId ? "saveEdit()" : "addData()"}">
          ${editId ? "保存" : "追加"}
        </button>

        ${editId ? `<button onclick="cancelEdit()">キャンセル</button>` : ""}
      </div>`;
  }
}

async function addData(){
  const {error}=await client.from("shipments").insert({
    date:document.getElementById("dateInput").value,
    category:"notice",
    title:document.getElementById("title").value,
    content:document.getElementById("content").value,
    status:document.getElementById("status").value
  });

  if(error){alert(error.message);return;}
  currentDate=document.getElementById("dateInput").value;
  setTab("notice");
}

function startEdit(item){
  editId=item.id;
  setTab("manage");

  setTimeout(()=>{
    document.getElementById("dateInput").value=item.date || currentDate;
    document.getElementById("title").value=item.title || "";
    document.getElementById("content").value=item.content || "";
    document.getElementById("status").value=item.status || "通常";
  },100);
}

async function saveEdit(){
  const {error}=await client.from("shipments")
    .update({
      date:document.getElementById("dateInput").value,
      title:document.getElementById("title").value,
      content:document.getElementById("content").value,
      status:document.getElementById("status").value
    })
    .eq("id",editId);

  if(error){alert(error.message);return;}

  currentDate=document.getElementById("dateInput").value;
  editId=null;
  setTab("notice");
}

function cancelEdit(){
  editId=null;
  setTab("notice");
}

async function deleteItem(id){
  if(!confirm("削除しますか？")) return;

  const {error}=await client.from("shipments").delete().eq("id",id);
  if(error){alert(error.message);return;}

  render();
}

setTab("notice");
</script>

</body>
</html>
