<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>出荷管理</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:#f3eee6;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  color:#111;
}

.container{
  max-width:430px;
  margin:auto;
  padding:10px 16px 80px;
}

h1{
  font-size:38px;
  font-weight:900;
  margin:8px 0 20px;
}

button{
  border:none;
  cursor:pointer;
}

.top-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:12px;
}

.top-tabs button{
  height:48px;
  border-radius:18px;
  background:#e6ddd4;
  color:#007aff;
  font-size:13px;
  font-weight:900;
  line-height:1.15;
}

.top-tabs .active{
  background:#c99657;
  color:#fff;
}

.week-row{
  display:grid;
  grid-template-columns:1fr .7fr 1fr;
  gap:8px;
  margin-bottom:10px;
}

.week-row button{
  height:44px;
  border-radius:18px;
  background:#e6ddd4;
  color:#007aff;
  font-size:15px;
  font-weight:900;
}

.date-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-bottom:14px;
}

.date-row button{
  height:50px;
  border-radius:18px;
  background:#e6ddd4;
  color:#007aff;
  font-size:17px;
  font-weight:900;
}

.date-row .active{
  background:#c99657;
  color:#fff;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:24px 22px 58px;
  position:relative;
  min-height:230px;
}

.notice-title{
  font-size:28px;
  font-weight:900;
  margin-bottom:22px;
}

.notice-name{
  font-size:20px;
  margin-bottom:12px;
}

.notice-body{
  font-size:18px;
  line-height:1.5;
}

.card-actions{
  position:absolute;
  right:18px;
  bottom:18px;
  display:flex;
  gap:10px;
}

.icon-btn{
  width:40px;
  height:40px;
  border-radius:50%;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.edit-btn{background:#efe7dc}
.delete-btn{background:#f8dede}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-content{
  width:88%;
  max-width:360px;
  background:#fff;
  border-radius:22px;
  padding:18px;
}

.modal input,
.modal textarea{
  width:100%;
  box-sizing:border-box;
  border:2px solid #e3ddd5;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  font-size:16px;
}

.modal textarea{
  height:100px;
  resize:none;
}

.save-btn{
  width:100%;
  height:48px;
  border-radius:16px;
  background:#c99657;
  color:#fff;
  font-size:17px;
  font-weight:900;
}

.close-btn{
  margin-top:8px;
  width:100%;
  height:40px;
  border-radius:14px;
  background:#ece6df;
  font-weight:700;
}
</style>
</head>

<body>

<div class="container">

<h1>出荷管理</h1>

<div class="top-tabs">
  <button class="active">注意事項</button>
  <button>出荷予定</button>
  <button>当日出荷</button>
  <button id="manageBtn">管理</button>
</div>

<div class="week-row">
  <button id="prevWeek">前週</button>
  <button id="calendarBtn">🗓</button>
  <button id="nextWeek">次週</button>
</div>

<div class="date-row" id="dateRow">
  <button class="active">5/4</button>
  <button>5/5</button>
  <button>5/6</button>
  <button>5/7</button>
  <button>5/8</button>
</div>

<div class="card">

  <div class="notice-title">クレーム</div>

  <div class="notice-name">○○様</div>

  <div class="notice-body">要検品</div>

  <div class="card-actions">
    <button class="icon-btn edit-btn" id="editBtn">✏️</button>
    <button class="icon-btn delete-btn" id="deleteBtn">🗑️</button>
  </div>

</div>

</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <input type="text" id="titleInput" placeholder="タイトル">
    <input type="text" id="nameInput" placeholder="名前">
    <textarea id="bodyInput" placeholder="内容"></textarea>
    <button class="save-btn" id="saveBtn">保存</button>
    <button class="close-btn" id="closeBtn">閉じる</button>
  </div>
</div>

<input type="date" id="hiddenDate" style="display:none">

<script>
const dateButtons = document.querySelectorAll('#dateRow button');

dateButtons.forEach(btn=>{
  btn.addEventListener('click',()=>{
    dateButtons.forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  });
});

const modal = document.getElementById('modal');
const titleEl = document.querySelector('.notice-title');
const nameEl = document.querySelector('.notice-name');
const bodyEl = document.querySelector('.notice-body');

document.getElementById('editBtn').addEventListener('click',()=>{
  document.getElementById('titleInput').value = titleEl.innerText;
  document.getElementById('nameInput').value = nameEl.innerText;
  document.getElementById('bodyInput').value = bodyEl.innerText;
  modal.style.display = 'flex';
});

document.getElementById('closeBtn').addEventListener('click',()=>{
  modal.style.display = 'none';
});

document.getElementById('saveBtn').addEventListener('click',()=>{
  titleEl.innerText = document.getElementById('titleInput').value;
  nameEl.innerText = document.getElementById('nameInput').value;
  bodyEl.innerText = document.getElementById('bodyInput').value;
  modal.style.display = 'none';
});

document.getElementById('deleteBtn').addEventListener('click',()=>{
  if(confirm('削除しますか？')){
    document.querySelector('.card').remove();
  }
});

document.getElementById('calendarBtn').addEventListener('click',()=>{
  const input = document.getElementById('hiddenDate');
  if(input.showPicker){
    input.showPicker();
  }else{
    input.click();
  }
});

document.getElementById('prevWeek').addEventListener('click',()=>{
  alert('前週へ');
});

document.getElementById('nextWeek').addEventListener('click',()=>{
  alert('次週へ');
});

document.getElementById('manageBtn').addEventListener('click',()=>{
  modal.style.display = 'flex';
});
</script>

</body>
</html>
