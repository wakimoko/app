<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>出荷管理</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:#f3eee6;
  font-family:"Hiragino Maru Gothic ProN","Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  -webkit-font-smoothing:antialiased;
  text-rendering:geometricPrecision;
  color:#111;
  overflow-x:hidden;
}

.container{
  max-width:430px;
  margin:auto;
  padding:4px 10px 24px;
  transform:scale(.90);
  transform-origin:top center;
}

h1{
  font-size:32px;
  font-weight:900;
  margin:6px 0 16px;
}

button{
  border:none;
  cursor:pointer;
  font-family:inherit;
}

.top-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:10px;
}

.top-tabs button{
  height:42px;
  border-radius:15px;
  background:#e6ddd4;
  color:#111;
  font-size:12px;
  font-weight:900;
}

#todayBtn{
  line-height:1.2;
  font-size:11px;
}

.active{
  background:#c99657!important;
  color:#fff!important;
}

.week-row{
  display:grid;
  grid-template-columns:1fr .7fr 1fr;
  gap:8px;
  margin-bottom:8px;
}

.week-row button{
  height:38px;
  border-radius:14px;
  background:#e6ddd4;
  color:#111;
  font-size:12px;
  font-weight:900;
}

.date-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-bottom:10px;
}

.date-row button{
  height:38px;
  border-radius:14px;
  background:#e6ddd4;
  color:#111;
  font-size:14px;
  font-weight:900;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:14px;
  position:relative;
  min-height:108px;
  margin-bottom:10px;
}

.group-title{
  font-size:19px;
  font-weight:900;
  margin-bottom:8px;
}

.place-row{
  display:grid;
  grid-template-columns:1fr 118px 90px;
  align-items:center;
  gap:8px;
  margin:7px 0;
}

.place-name{
  font-size:14px;
  font-weight:900;
}

.place-status,
.ship-status{
  display:flex;
  justify-content:flex-end;
  gap:7px;
}

.place-status button{
  width:52px;
  height:32px;
  border-radius:14px;
  background:#e6ddd4;
  color:#111;
  font-size:12px;
  font-weight:900;
}

.ship-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:14px 0;
}

.ship-name{
  font-size:19px;
  font-weight:900;
}

.ship-right{
  width:150px;
  margin-right:8px;
}

.ship-status button{
  width:56px;
  height:38px;
  border-radius:17px;
  background:#e6ddd4;
  color:#111;
  font-size:13px;
  font-weight:900;
}

.locked button{
  pointer-events:none;
  opacity:.88;
}

.divider{
  height:1px;
  background:#e2d7ca;
  margin:10px 0;
}

.photo-links{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  font-size:13px;
  font-weight:900;
  white-space:nowrap;
}

.photo-links span{
  color:#8b5e34;
  text-decoration:underline;
}

.today-info{
  text-align:center;
  font-size:14px;
  font-weight:900;
  line-height:1.7;
  margin:22px 0 16px;
  color:#3b332a;
}

.today-info .blue,
.today-date-title .blue{
  color:#007aff;
}

.today-date-title{
  text-align:center;
  font-size:20px;
  font-weight:900;
  margin-bottom:16px;
}

.notice-date{
  font-size:19px;
  font-weight:900;
  margin-bottom:10px;
  padding-right:90px;
}

.notice-name{
  font-size:15px;
  font-weight:900;
  margin-bottom:8px;
  padding-right:90px;
}

.notice-body{
  font-size:13px;
  line-height:1.5;
  white-space:pre-wrap;
  padding-right:90px;
}

.card-actions{
  position:absolute;
  right:18px;
  bottom:18px;
  display:flex;
  align-items:center;
  gap:8px;
  z-index:10;
}

.icon-btn{
  width:34px;
  height:34px;
  border-radius:50%;
  font-size:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.edit-btn{
  background:#efe7dc;
}

.delete-btn{
  background:#f8dede;
}

.add-btn,
.save-btn,
.mode-btn,
.line-btn{
  width:100%;
  height:44px;
  border-radius:15px;
  font-size:15px;
  font-weight:900;
  margin-top:8px;
  background:#c99657;
  color:#fff;
}

.cancel-btn{
  width:100%;
  height:40px;
  border-radius:14px;
  background:#e6ddd4;
  color:#111;
  font-size:14px;
  font-weight:900;
  margin-top:8px;
}

.meta{
  text-align:center;
  font-size:12px;
  font-weight:900;
  color:#7b6b5e;
  margin-top:12px;
}

.form-input,
.form-textarea{
  width:100%;
  border:2px solid #e3ddd5;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  font-size:16px;
  font-family:inherit;
}

.form-input{
  height:46px;
}

.form-textarea{
  height:100px;
  resize:none;
}

input,
textarea,
select{
  font-size:16px!important;
}

.report-title{
  font-size:20px;
  font-weight:900;
  margin-bottom:12px;
}

.report-line{
  font-size:14px;
  font-weight:800;
  line-height:1.7;
  white-space:pre-wrap;
}

.calendar-bg{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.25);
  z-index:1000;
}

.calendar-popup{
  display:none;
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:340px;
  background:#f3eee6;
  border-radius:26px;
  padding:18px;
  z-index:1001;
}

.calendar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.calendar-title{
  font-size:16px;
  font-weight:900;
}

.calendar-header button{
  width:34px;
  height:34px;
  border-radius:50%;
  background:#c99657;
  color:#fff;
  font-size:20px;
  font-weight:900;
}

.calendar-week,
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.calendar-week{
  margin-bottom:6px;
}

.calendar-week div{
  text-align:center;
  font-size:12px;
  font-weight:900;
  color:#8b7b6b;
}

.calendar-day,
.calendar-empty{
  height:38px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:800;
}

.calendar-day{
  background:#e6ddd4;
}

.calendar-day.active{
  background:#c99657;
  color:#fff;
}

.calendar-close{
  margin-top:14px;
  width:100%;
  height:40px;
  border-radius:14px;
  background:#e6ddd4;
  font-weight:900;
}
</style>
</head>

<body>

<div class="container">

<h1>出荷管理</h1>

<div class="top-tabs">
<button id="noticeBtn">注意事項</button>
<button id="shipBtn" class="active">出荷場所</button>
<button id="todayBtn">当日送り状<br>貼り残し</button>
<button id="reportBtn">日報</button>
</div>

<div id="scheduleArea">

<div class="week-row">
<button id="prevWeek">前週</button>
<button id="calendarBtn">🗓</button>
<button id="nextWeek">次週</button>
</div>

<div class="date-row" id="dateRow"></div>

</div>

<div id="mainArea"></div>

</div>

<div class="calendar-bg" id="calendarBg"></div>

<div class="calendar-popup" id="calendarPopup">

<div class="calendar-header">

<button id="calPrev">‹</button>

<div class="calendar-title" id="calendarTitle"></div>

<button id="calNext">›</button>

</div>

<div class="calendar-week">
<div>日</div>
<div>月</div>
<div>火</div>
<div>水</div>
<div>木</div>
<div>金</div>
<div>土</div>
</div>

<div class="calendar-grid" id="calendarGrid"></div>

<button class="calendar-close" id="calendarClose">
閉じる
</button>

</div>

<div id="attachMenu" style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.25);
z-index:99999;
align-items:flex-end;
justify-content:center;
">

<div style="
width:92%;
max-width:360px;
background:#4b4946;
color:#fff;
border-radius:18px;
margin-bottom:24px;
overflow:hidden;
font-size:22px;
font-weight:700;
">

<div onclick="openDropbox()" style="
padding:20px;
border-bottom:1px solid #666;
">
写真ライブラリ
</div>

<div onclick="openDropbox()" style="
padding:20px;
border-bottom:1px solid #666;
">
写真を撮る
</div>

<div onclick="openDropbox()" style="
padding:20px;
">
ファイルを選択
</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

const DROPBOX_LINK =
"https://www.dropbox.com/scl/fo/fquqg1cjqv0aq0y6fdy31/ABvsncXfzuukneSRy_qiBeo?rlkey=390kzz8a0cmuaf7xdclh3twtv&st=4mxiq5q8&dl=0";

const firebaseConfig = {

apiKey:"AIzaSyBTv3sXmIwGmg5iVBRjfwwqA6djwYO2CJQ",
authDomain:"shipment-app-b45dd.firebaseapp.com",
databaseURL:"https://shipment-app-b45dd-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"shipment-app-b45dd",
storageBucket:"shipment-app-b45dd.firebasestorage.app",
messagingSenderId:"995150359566",
appId:"1:995150359566:web:01e3ef86eec27ea66ae05f"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let weekStart = getMonday(new Date());
let selectedDate = new Date();

function openDropbox(){
closeAttachMenu();
window.open(DROPBOX_LINK,"_blank");
}

function showAttachMenu(){
attachMenu.style.display="flex";
}

function closeAttachMenu(){
attachMenu.style.display="none";
}

attachMenu.onclick=function(e){
if(e.target.id==="attachMenu"){
closeAttachMenu();
}
};

function formatDate(d){
return (d.getMonth()+1)+"/"+d.getDate();
}

function getMonday(date){
const d=new Date(date);
const day=d.getDay();
d.setDate(d.getDate()+(day===0?-6:1-day));
return d;
}

function sameDate(a,b){
return a.getFullYear()===b.getFullYear()
&& a.getMonth()===b.getMonth()
&& a.getDate()===b.getDate();
}

function renderDates(){

dateRow.innerHTML="";

for(let i=0;i<5;i++){

const d=new Date(weekStart);

d.setDate(weekStart.getDate()+i);

const btn=document.createElement("button");

btn.textContent=formatDate(d);

if(sameDate(d,selectedDate)){
btn.classList.add("active");
}

btn.onclick=()=>{

selectedDate=new Date(d);

renderDates();

renderShip();

};

dateRow.appendChild(btn);

}

}

function renderShip(){

mainArea.innerHTML=`

<div class="card">

<div class="group-title">
佐川急便
</div>

${placeRow("2F")}

<div class="divider"></div>

<div class="group-title">
福山通運
</div>

${placeRow("2F")}
${placeRow("梱包場")}
${placeRow("MJ倉庫")}

</div>

`;

}

function placeRow(name){

return `

<div class="place-row">

<div class="place-name">
${name}
</div>

<div class="place-status">
<button>あり</button>
<button class="active">なし</button>
</div>

<div class="photo-links">

<span onclick="openDropbox()">
写真表示
</span>

<span onclick="showAttachMenu()">
添付
</span>

</div>

</div>

`;

}

noticeBtn.onclick=()=>{
mainArea.innerHTML=`
<div class="card">
<div class="group-title">
注意事項
</div>

<div class="notice-body">
注意事項をここに入力
</div>
</div>
`;
};

todayBtn.onclick=()=>{
mainArea.innerHTML=`
<div class="card">
<div class="group-title">
当日送り状貼り残し
</div>

<div class="notice-body">
送り状確認
</div>
</div>
`;
};

reportBtn.onclick=()=>{
mainArea.innerHTML=`
<div class="card">
<div class="report-title">
日報
</div>

<div class="report-line">
出荷確認済み
</div>
</div>
`;
};

shipBtn.onclick=renderShip;

prevWeek.onclick=()=>{
weekStart.setDate(weekStart.getDate()-7);
renderDates();
};

nextWeek.onclick=()=>{
weekStart.setDate(weekStart.getDate()+7);
renderDates();
};

calendarBtn.onclick=()=>{
calendarBg.style.display="block";
calendarPopup.style.display="block";
};

calendarBg.onclick=()=>{
calendarBg.style.display="none";
calendarPopup.style.display="none";
};

calendarClose.onclick=()=>{
calendarBg.style.display="none";
calendarPopup.style.display="none";
};

renderDates();
renderShip();

</script>

</body>
</html>
