<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>出荷管理</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:#f4ede4;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  color:#111;
}

.app{
  max-width:430px;
  margin:auto;
  padding:22px 20px 40px;
}

h1{
  font-size:30px;
  font-weight:900;
  margin:18px 0 24px;
}

button{
  border:none;
  cursor:pointer;
}

.active{
  background:#be8b55!important;
  color:#fff!important;
}

.top-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:14px;
}

.top-tabs button{
  height:54px;
  border-radius:20px;
  background:#e6ddd4;
  font-size:14px;
  font-weight:900;
  white-space:nowrap;
}

.week-nav{
  display:grid;
  grid-template-columns:1fr .7fr 1fr;
  gap:10px;
  margin-bottom:12px;
}

.week-nav button{
  height:48px;
  border-radius:18px;
  background:#e6ddd4;
  font-size:15px;
  font-weight:900;
}

.dates{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  margin-bottom:16px;
}

.dates button{
  height:48px;
  border-radius:18px;
  background:#e6ddd4;
  font-size:16px;
  font-weight:900;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:10px 16px;
}

.ship-row{
  padding:14px 0 12px;
  border-bottom:1px solid #efe5dc;
}

.ship-row:last-child{
  border-bottom:none;
}

.ship-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.ship-left{
  display:flex;
  flex-direction:column;
}

.ship-company{
  font-size:22px;
  font-weight:900;
  line-height:1.1;
}

.ship-place{
  font-size:16px;
  font-weight:800;
  margin-top:4px;
}

.ship-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
}

.ship-status{
  display:flex;
  gap:10px;
}

.ship-status button{
  min-width:62px;
  height:38px;
  border-radius:999px;
  background:#e6ddd4;
  font-size:16px;
  font-weight:900;
  color:#111;
}

.photo-links{
  display:flex;
  gap:14px;
  margin-top:6px;
}

.photo-links button,
.photo-links label{
  background:none;
  padding:0;
  margin:0;
  font-size:11px;
  font-weight:700;
  color:#8b5d33;
  text-decoration:underline;
}

.photo-links input{
  display:none;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal img{
  max-width:90%;
  max-height:80%;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="app">

<h1>出荷管理</h1>

<div class="top-tabs">
  <button onclick="selectTab(this,'notice')">注意事項</button>
  <button class="active" onclick="selectTab(this,'ship')">出荷予定</button>
  <button onclick="selectTab(this,'today')">当日出荷</button>
  <button onclick="selectTab(this,'manage')">管理</button>
</div>

<div class="week-nav">
  <button onclick="moveWeek(-1)">前週</button>
  <button onclick="openCalendar()">🗓️</button>
  <button onclick="moveWeek(1)">次週</button>
</div>

<input type="date" id="calendarInput" style="display:none" onchange="changeDate(this.value)">

<div class="dates" id="dates"></div>

<div id="content"></div>

</div>

<div class="modal" id="modal" onclick="closePhoto()">
  <img id="modalImg">
</div>

<script>
let currentTab = "ship";
let weekStart = new Date(2026, 4, 4);
let currentDate = "";
const photos = {};

function formatDate(date){
  return (date.getMonth()+1) + "/" + date.getDate();
}

function renderDates(){
  const dates = document.getElementById("dates");
  dates.innerHTML = "";

  for(let i=0; i<5; i++){
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate()+i);

    const text = formatDate(d);

    if(!currentDate && i === 0){
      currentDate = text;
    }

    const btn = document.createElement("button");
    btn.textContent = text;

    if(text === currentDate){
      btn.classList.add("active");
    }

    btn.onclick = function(){
      currentDate = text;
      renderDates();
      renderContent();
    };

    dates.appendChild(btn);
  }
}

function selectTab(button, tab){
  currentTab = tab;

  document.querySelectorAll(".top-tabs button").forEach(btn=>{
    btn.classList.remove("active");
  });

  button.classList.add("active");

  renderContent();
}

function moveWeek(num){
  weekStart.setDate(weekStart.getDate() + 7*num);
  currentDate = "";
  renderDates();
  renderContent();
}

function openCalendar(){
  const input = document.getElementById("calendarInput");

  if(input.showPicker){
    input.showPicker();
  }else{
    input.click();
  }
}

function changeDate(value){
  if(!value) return;

  const d = new Date(value);
  currentDate = formatDate(d);

  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;

  weekStart = new Date(d);
  weekStart.setDate(d.getDate() + diff);

  renderDates();
  renderContent();
}

function toggleStatus(button){
  const group = button.parentElement;

  group.querySelectorAll("button").forEach(btn=>{
    btn.classList.remove("active");
  });

  button.classList.add("active");
}

function savePhoto(event,key){
  const file = event.target.files[0];
  if(!file) return;

  photos[key] = URL.createObjectURL(file);
  alert("写真を添付しました");
}

function showPhoto(key){
  if(!photos[key]){
    alert("写真がありません");
    return;
  }

  document.getElementById("modalImg").src = photos[key];
  document.getElementById("modal").style.display = "flex";
}

function closePhoto(){
  document.getElementById("modal").style.display = "none";
}

function row(name, floor, key, yesActive){
  return `
    <div class="ship-row">
      <div class="ship-top">
        <div class="ship-left">
          <div class="${floor ? "ship-company" : "ship-place"}">${name}</div>
          ${floor ? `<div class="ship-place">${floor}</div>` : ""}
        </div>

        <div class="ship-right">
          <div class="ship-status">
            <button class="${yesActive ? "active" : ""}" onclick="toggleStatus(this)">あり</button>
            <button class="${!yesActive ? "active" : ""}" onclick="toggleStatus(this)">なし</button>
          </div>

          <div class="photo-links">
            <button onclick="showPhoto('${key}')">写真表示</button>
            <label>
              添付
              <input type="file" accept="image/*" onchange="savePhoto(event,'${key}')">
            </label>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderContent(){
  const content = document.getElementById("content");

  if(currentTab === "ship"){
    content.innerHTML = `
      <div class="card">
        ${row("佐川急便","2F","sagawa",true)}
        ${row("福山通運","2F","fukuyama",true)}
        ${row("梱包場","","packing",false)}
        ${row("MJ倉庫","","mj",false)}
      </div>
    `;
    return;
  }

  if(currentTab === "notice"){
    content.innerHTML = `
      <div class="card">
        <div class="ship-row">
          <div class="ship-company">注意事項</div>
          <div class="ship-place">この日に注意する内容を表示します</div>
        </div>
      </div>
    `;
    return;
  }

  if(currentTab === "today"){
    content.innerHTML = `
      <div class="card">
        <div class="ship-row">
          <div class="ship-company">当日出荷</div>
          <div class="ship-place">本日分の出荷確認</div>
        </div>
      </div>
    `;
    return;
  }

  if(currentTab === "manage"){
    content.innerHTML = `
      <div class="card">
        <div class="ship-row">
          <div class="ship-company">管理</div>
          <div class="ship-place">編集画面はここに作成できます</div>
        </div>
      </div>
    `;
  }
}

renderDates();
renderContent();
</script>

</body>
</html>
