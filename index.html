<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出荷管理</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  padding:14px;
  background:#f6efe6;
  color:#111;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
}

h1{
  font-size:30px;
  margin:16px 0 18px;
  font-weight:900;
}

button{
  border:none;
  background:#e6ddd4;
  color:#111;
  font-weight:800;
}

.active{
  background:#b88a5a!important;
  color:#fff!important;
}

.top-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:10px;
}

.top-tabs button{
  padding:11px 0;
  border-radius:18px;
  font-size:14px;
}

#weekControls{
  display:grid;
  grid-template-columns:1fr .7fr 1fr;
  gap:8px;
  margin-bottom:8px;
}

#weekControls button{
  padding:10px 0;
  border-radius:18px;
  font-size:14px;
}

#dates{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-bottom:10px;
}

#dates button{
  padding:11px 0;
  border-radius:18px;
  font-size:14px;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:12px 16px;
  margin-top:10px;
}

.ship-row{
  position:relative;
  display:grid;
  grid-template-columns:1fr 68px 68px;
  column-gap:10px;
  align-items:center;
  padding:16px 0 28px;
  border-bottom:1px solid #eadfd5;
}

.ship-row:last-child{border-bottom:none}

.ship-left{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.ship-company{
  font-size:18px;
  font-weight:900;
  line-height:1.2;
}

.ship-place{
  font-size:18px;
  font-weight:800;
}

.ship-buttons{display:contents}

.ship-buttons button{
  width:68px;
  height:42px;
  border-radius:999px;
  font-size:17px;
  font-weight:800;
}

.photo-text-group{
  position:absolute;
  right:4px;
  bottom:6px;
  display:flex;
  gap:16px;
}

.photo-text{
  border:none;
  background:transparent;
  padding:0;
  margin:0;
  color:#6b4b2f;
  font-size:9px;
  font-weight:800;
  text-decoration:underline;
}

.photo-modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  z-index:9999;
  align-items:center;
  justify-content:center;
}

.photo-modal img{
  max-width:90%;
  max-height:80vh;
  border-radius:16px;
}

.photo-close{
  position:absolute;
  top:20px;
  right:20px;
  background:#fff;
  border-radius:10px;
  padding:10px 14px;
}
</style>
</head>

<body>

<h1>出荷管理</h1>

<div class="top-tabs">
  <button>注意事項</button>
  <button class="active">出荷予定</button>
  <button>当日出荷</button>
  <button>管理</button>
</div>

<div id="weekControls">
  <button>前週</button>
  <button>🗓️</button>
  <button>次週</button>
</div>

<div id="dates">
  <button class="active">5/4</button>
  <button>5/5</button>
  <button>5/6</button>
  <button>5/7</button>
  <button>5/8</button>
</div>

<div class="card">

  <div class="ship-row">
    <div class="ship-left">
      <div class="ship-company">佐川急便</div>
      <div class="ship-place">2F</div>
    </div>

    <button class="active">あり</button>
    <button>なし</button>

    <div class="photo-text-group">
      <button class="photo-text">写真表示</button>
      <label class="photo-text">添付<input type="file" hidden></label>
    </div>
  </div>

  <div class="ship-row">
    <div class="ship-left">
      <div class="ship-company">福山通運</div>
      <div class="ship-place">2F</div>
    </div>

    <button class="active">あり</button>
    <button>なし</button>

    <div class="photo-text-group">
      <button class="photo-text">写真表示</button>
      <label class="photo-text">添付<input type="file" hidden></label>
    </div>
  </div>

  <div class="ship-row">
    <div class="ship-left">
      <div class="ship-company">梱包場</div>
    </div>

    <button>あり</button>
    <button class="active">なし</button>

    <div class="photo-text-group">
      <button class="photo-text">写真表示</button>
      <label class="photo-text">添付<input type="file" hidden></label>
    </div>
  </div>

  <div class="ship-row">
    <div class="ship-left">
      <div class="ship-company">MJ倉庫</div>
    </div>

    <button>あり</button>
    <button class="active">なし</button>

    <div class="photo-text-group">
      <button class="photo-text">写真表示</button>
      <label class="photo-text">添付<input type="file" hidden></label>
    </div>
  </div>

</div>

</body>
</html>
