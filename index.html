<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Supabase Test</title>
</head>
<body>
  <h1>Supabaseデータ</h1>
  <pre id="output">開始...</pre>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const output = document.getElementById("output");

    window.onerror = function(message) {
      output.textContent = "JSエラー: " + message;
    };

    async function loadData() {
      output.textContent = "Supabase接続中...";

      const client = window.supabase.createClient(
        "https://bylottznuwuizncgfltd.supabase.co",
        "sb_publishable_VDryMJYXIZUwumf5gxxqyw__ivv1upf"
      );

      output.textContent = "データ取得中...";

      const { data, error } = await client
        .from("notices2")
        .select("*");

      if (error) {
        output.textContent = "Supabaseエラー: " + error.message;
        return;
      }

      output.textContent = JSON.stringify(data, null, 2);
    }

    loadData();
  </script>
</body>
</html>
