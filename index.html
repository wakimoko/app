<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>出荷管理</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:sans-serif;
  background:#f3eadf;
  color:#111;
}

.app{
  max-width:430px;
  margin:0 auto;
  padding:44px 22px 24px;
}

h1{
  font-size:34px;
  margin:0 0 30px;
  font-weight:900;
}

button{
  border:none;
  border-radius:22px;
  background:#ded6cd;
  color:#111;
  font-size:16px;
  font-weight:900;
  padding:12px 10px;
  cursor:pointer;
}

button.active{
  background:#bd8b55;
  color:white;
}

.tabs,
.week-nav,
.dates{
  display:flex;
  gap:12px;
}

.tabs{
  margin-bottom:18px;
}

.tabs button{
  flex:1;
  height:58px;
}

.week-nav{
  margin-bottom:14px;
}

.week-nav button{
  flex:1;
  height:56px;
}

.dates{
  margin-bottom:18px;
}

.dates button{
  flex:1;
  height:56px;
}

.card{
  background:white;
  border-radius:30px;
  padding:18px 22px;
}

.row{
  border-bottom:1px solid #e8ddd2;
  padding:26px 0;
}

.row:last-child{
  border-bottom:none;
}

.info h2{
  font-size:28px;
  margin:0 0 10px;
  font-weight:900;
}

.info p{
  font-size:22px;
  margin:0;
  font-weight:800;
}

.actions{
  display:flex;
  justify-content:flex-end;
  gap:12px;
  margin-top:18px;
}

.actions button{
  min-width:72px;
  height:52px;
}

.camera{
  min-width:64px !important;
  font-size:22px;
}
</style>
</head>

<body>

<div class="app">

  <h1>出荷管理</h1>

  <div class="tabs">
    <button>注意事項</button>
    <button class="active">出荷予定</button>
    <button>当日出荷</button>
    <button>管理</button>
  </div>

  <div class="week-nav">
    <button>前週</button>
    <button>🗓️</button>
    <button>次週</button>
  </div>

  <div class="dates">
    <button class="active">5/4</button>
    <button>5/5</button>
    <button>5/6</button>
    <button>5/7</button>
    <button>5/8</button>
  </div>

  <div class="card">

    <div class="row">

      <div class="info">
        <h2>佐川急便</h2>
        <p>2F</p>
      </div>

      <div class="actions">
        <button class="active">あり</button>
        <button>なし</button>
        <button class="camera">📷</button>
      </div>

    </div>

    <div class="row">

      <div class="info">
        <h2>福山通運</h2>
        <p>2F</p>
      </div>

      <div class="actions">
        <button class="active">あり</button>
        <button>なし</button>
        <button class="camera">📷</button>
      </div>

    </div>

    <div class="row">

      <div class="info">
        <h2>梱包場</h2>
      </div>

      <div class="actions">
        <button class="active">あり</button>
        <button>なし</button>
        <button class="camera">📷</button>
      </div>

    </div>

    <div class="row">

      <div class="info">
        <h2>MJ倉庫</h2>
      </div>

      <div class="actions">
        <button>あり</button>
        <button class="active">なし</button>
        <button class="camera">📷</button>
      </div>

    </div>

  </div>

</div>

<input
  type="file"
  accept="image/*"
  capture="environment"
  style="display:none;"
>

</body>
</html>
