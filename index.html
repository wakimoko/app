<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>出荷管理</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:#f3eee6;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  color:#111;
}

.container{
  max-width:430px;
  margin:auto;
  padding:10px 16px 80px;
}

h1{
  font-size:38px;
  font-weight:900;
  margin:8px 0 20px;
}

button{
  border:none;
  cursor:pointer;
  font-family:inherit;
}

.top-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:12px;
}

.top-tabs button{
  height:48px;
  border-radius:18px;
  background:#e6ddd4;
  color:#007aff;
  font-size:13px;
  font-weight:900;
  line-height:1.15;
}

.top-tabs .active,
.date-row .active{
  background:#c99657;
  color:#fff;
}

.week-row{
  display:grid;
  grid-template-columns:1fr .7fr 1fr;
  gap:8px;
  margin-bottom:10px;
}

.week-row button{
  height:44px;
  border-radius:18px;
  background:#e6ddd4;
  color:#007aff;
  font-size:15px;
  font-weight:900;
}

.calendar-wrap{
  position:relative;
  overflow:hidden;
}

.calendar-wrap input{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  opacity:0;
}

.date-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:7px;
  margin-bottom:12px;
}

.date-row button{
  height:44px;
  border-radius:16px;
  background:#e6ddd4;
  color:#007aff;
  font-size:15px;
  font-weight:900;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:18px 18px 52px;
  position:relative;
  min-height:170px;
}

.notice-title{
  font-size:22px;
  font-weight:900;
  margin-bottom:16px;
}

.notice-name{
  font-size:16px;
  margin-bottom:10px;
}

.notice-body{
  font-size:15px;
  line-height:1.4;
  white-space:pre-wrap;
}

.card-actions{
  position:absolute;
  right:14px;
  bottom:14px;
  display:flex;
  gap:8px;
}

.icon-btn{
  width:34px;
  height:34px;
  border-radius:50%;
  font-size:15px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.edit-btn{background:#efe7dc}
.delete-btn{background:#f8dede}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-content{
  width:88%;
  max-width:360px;
  background:#fff;
  border-radius:22px;
  padding:18px;
}

.modal input,
.modal textarea{
  width:100%;
  box-sizing:border-box;
  border:2px solid #e3ddd5;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  font-size:16px;
}

.modal textarea{
  height:150px;
  resize:none;
}

.save-btn{
  width:100%;
  height:48px;
  border-radius:16px;
  background:#c99657;
  color:#fff;
  font-size:17px;
  font-weight:900;
}

.close-btn{
  margin-top:8px;
  width:100%;
  height:40px;
  border-radius:14px;
  background:#ece6df;
  font-weight:700;
}
</style>
</head>

<body>

<div class="container">

<h1>出荷管理</h1>

<div class="top-tabs">
  <button class="active">注意事項</button>
  <button>出荷予定</button>
  <button>当日出荷</button>
  <button id="manageBtn">管理</button>
</div>

<div class="week-row">
  <button id="prevWeek">前週</button>

  <button id="calendarBtn" class="calendar-wrap">
    🗓
    <input type="date" id="hiddenDate">
  </button>

  <button id="nextWeek">次週</button>
</div>

<div class="date-row" id="dateRow"></div>

<div class="card">
  <div class="notice-title">クレーム</div>
  <div class="notice-name">○○様</div>
  <div class="notice-body">要検品</div>

  <div class="card-actions">
    <button class="icon-btn edit-btn" id="editBtn">✏️</button>
    <button class="icon-btn delete-btn" id="deleteBtn">🗑️</button>
  </div>
</div>

</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent">
    <input type="text" id="titleInput" placeholder="タイトル">
    <input type="text" id="nameInput" placeholder="名前">
    <textarea id="bodyInput" placeholder="内容"></textarea>
    <button class="save-btn" id="saveBtn">保存</button>
    <button class="close-btn" id="closeBtn">閉じる</button>
  </div>
</div>

<script>
let weekStart = new Date(2026,4,4);

function getMonday(date){
  const d = new Date(date);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d;
}

function formatDate(date){
  return (date.getMonth()+1) + "/" + date.getDate();
}

function renderDates(selectedDate){
  const dateRow = document.getElementById("dateRow");
  dateRow.innerHTML = "";

  for(let i=0;i<5;i++){
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate()+i);

    const btn = document.createElement("button");
    btn.textContent = formatDate(d);

    if(
      selectedDate
      ? d.getMonth() === selectedDate.getMonth() && d.getDate() === selectedDate.getDate()
      : i === 0
    ){
      btn.classList.add("active");
    }

    btn.onclick = ()=>{
      document.querySelectorAll("#dateRow button").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
    };

    dateRow.appendChild(btn);
  }
}

document.getElementById("prevWeek").onclick = ()=>{
  weekStart.setDate(weekStart.getDate()-7);
  renderDates();
};

document.getElementById("nextWeek").onclick = ()=>{
  weekStart.setDate(weekStart.getDate()+7);
  renderDates();
};

document.getElementById("hiddenDate").onchange = (e)=>{
  if(!e.target.value) return;
  const selected = new Date(e.target.value);
  weekStart = getMonday(selected);
  renderDates(selected);
};

const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");
const titleEl = document.querySelector(".notice-title");
const nameEl = document.querySelector(".notice-name");
const bodyEl = document.querySelector(".notice-body");

modalContent.onclick = (e)=>{
  e.stopPropagation();
};

modal.onclick = ()=>{
  modal.style.display = "none";
};

document.getElementById("editBtn").onclick = ()=>{
  document.getElementById("titleInput").value = titleEl.innerText;
  document.getElementById("nameInput").value = nameEl.innerText;
  document.getElementById("bodyInput").value = bodyEl.innerText;
  modal.style.display = "flex";
};

document.getElementById("manageBtn").onclick = ()=>{
  document.getElementById("titleInput").value = "";
  document.getElementById("nameInput").value = "";
  document.getElementById("bodyInput").value = "";
  modal.style.display = "flex";
};

document.getElementById("closeBtn").onclick = ()=>{
  modal.style.display = "none";
};

document.getElementById("saveBtn").onclick = ()=>{
  titleEl.innerText = document.getElementById("titleInput").value || "無題";
  nameEl.innerText = document.getElementById("nameInput").value || "";
  bodyEl.innerText = document.getElementById("bodyInput").value || "";
  modal.style.display = "none";
};

document.getElementById("deleteBtn").onclick = ()=>{
  if(confirm("削除しますか？")){
    document.querySelector(".card").remove();
  }
};

renderDates();
</script>

</body>
</html>
