<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>出荷管理</title>

<style>
body{
  margin:0;
  background:#e9e3d9;
  font-family:sans-serif;
  color:#111;
}

.container{
  padding:24px 18px 40px;
}

.title{
  font-size:64px;
  font-weight:900;
  margin-bottom:24px;
}

.top-buttons,
.week-buttons,
.date-buttons{
  display:flex;
  gap:14px;
  margin-bottom:18px;
}

.menu-btn{
  flex:1;
  border:none;
  border-radius:28px;
  background:#ddd6cf;
  padding:22px 0;
  font-size:22px;
  font-weight:700;
}

.active{
  background:#c79255;
  color:#fff;
}

.calendar-btn{
  width:90px;
  border:none;
  border-radius:28px;
  background:#ddd6cf;
  font-size:28px;
}

.date-btn{
  width:90px;
  height:90px;
  border:none;
  border-radius:28px;
  background:#ddd6cf;
  font-size:26px;
  font-weight:700;
}

.card{
  background:#f4f4f4;
  border-radius:34px;
  padding:22px 18px;
}

.row{
  padding:18px 0;
  border-bottom:1px solid #ddd0c2;
}

.row:last-child{
  border-bottom:none;
}

.row-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.place-wrap{
  padding-left:8px;
}

.place{
  font-size:30px;
  font-weight:900;
  line-height:1.2;
}

.floor{
  font-size:24px;
  font-weight:700;
  margin-top:4px;
}

.status-wrap{
  display:flex;
  gap:14px;
}

.status-btn{
  width:150px;
  height:70px;
  border:none;
  border-radius:999px;
  font-size:28px;
  font-weight:800;
  background:#e6dfd7;
}

.status-active{
  background:#c79255;
  color:#fff;
}

.bottom-links{
  display:flex;
  justify-content:flex-end;
  gap:26px;
  margin-top:12px;
  padding-right:8px;
}

.link-btn{
  border:none;
  background:none;
  color:#9a6a35;
  font-size:16px;
  font-weight:700;
  text-decoration:underline;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  width:90%;
  background:#fff;
  border-radius:20px;
  padding:20px;
}

.modal-img{
  width:100%;
  border-radius:14px;
}

.close-btn{
  width:100%;
  margin-top:14px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#c79255;
  color:#fff;
  font-size:18px;
  font-weight:700;
}
</style>
</head>

<body>

<div class="container">

<div class="title">出荷管理</div>

<div class="top-buttons">
  <button class="menu-btn">注意事項</button>
  <button class="menu-btn active">出荷予定</button>
  <button class="menu-btn">当日出荷</button>
  <button class="menu-btn">管理</button>
</div>

<div class="week-buttons">
  <button class="menu-btn">前週</button>

  <button class="calendar-btn" onclick="openCalendar()">🗓️</button>

  <input
    type="date"
    id="calendarInput"
    style="display:none"
    onchange="changeDate(this.value)"
  >

  <button class="menu-btn">次週</button>
</div>

<div class="date-buttons">
  <button class="date-btn active">5/4</button>
  <button class="date-btn">5/5</button>
  <button class="date-btn">5/6</button>
  <button class="date-btn">5/7</button>
  <button class="date-btn">5/8</button>
</div>

<div class="card">

  <!-- 佐川 -->
  <div class="row">

    <div class="row-top">

      <div class="place-wrap">
        <div class="place">佐川急便</div>
        <div class="floor">2F</div>
      </div>

      <div class="status-wrap">
        <button class="status-btn status-active">あり</button>
        <button class="status-btn">なし</button>
      </div>

    </div>

    <div class="bottom-links">
      <button class="link-btn" onclick="showPhoto('https://picsum.photos/600/400?1')">
        写真表示
      </button>

      <button class="link-btn" onclick="uploadPhoto()">
        添付
      </button>
    </div>

  </div>

  <!-- 福山 -->
  <div class="row">

    <div class="row-top">

      <div class="place-wrap">
        <div class="place">福山通運</div>
        <div class="floor">2F</div>
      </div>

      <div class="status-wrap">
        <button class="status-btn status-active">あり</button>
        <button class="status-btn">なし</button>
      </div>

    </div>

    <div class="bottom-links">
      <button class="link-btn" onclick="showPhoto('https://picsum.photos/600/400?2')">
        写真表示
      </button>

      <button class="link-btn" onclick="uploadPhoto()">
        添付
      </button>
    </div>

  </div>

  <!-- 梱包場 -->
  <div class="row">

    <div class="row-top">

      <div class="place-wrap">
        <div class="floor">梱包場</div>
      </div>

      <div class="status-wrap">
        <button class="status-btn">あり</button>
        <button class="status-btn status-active">なし</button>
      </div>

    </div>

    <div class="bottom-links">
      <button class="link-btn" onclick="showPhoto('https://picsum.photos/600/400?3')">
        写真表示
      </button>

      <button class="link-btn" onclick="uploadPhoto()">
        添付
      </button>
    </div>

  </div>

  <!-- MJ -->
  <div class="row">

    <div class="row-top">

      <div class="place-wrap">
        <div class="floor">MJ倉庫</div>
      </div>

      <div class="status-wrap">
        <button class="status-btn">あり</button>
        <button class="status-btn status-active">なし</button>
      </div>

    </div>

    <div class="bottom-links">
      <button class="link-btn" onclick="showPhoto('https://picsum.photos/600/400?4')">
        写真表示
      </button>

      <button class="link-btn" onclick="uploadPhoto()">
        添付
      </button>
    </div>

  </div>

</div>

</div>

<!-- モーダル -->
<div class="modal" id="photoModal">

  <div class="modal-content">

    <img id="modalImg" class="modal-img" src="">

    <button class="close-btn" onclick="closePhoto()">
      閉じる
    </button>

  </div>

</div>

<script>

function openCalendar(){
  const input = document.getElementById("calendarInput");

  if(input.showPicker){
    input.showPicker();
  }else{
    input.click();
  }
}

function changeDate(value){

  if(!value) return;

  const date = new Date(value);

  const month = date.getMonth() + 1;
  const day = date.getDate();

  alert(month + "/" + day + " を選択しました");
}

function showPhoto(src){

  document.getElementById("modalImg").src = src;

  document.getElementById("photoModal").style.display = "flex";
}

function closePhoto(){

  document.getElementById("photoModal").style.display = "none";
}

function uploadPhoto(){

  alert("写真添付");
}

</script>

</body>
</html>
