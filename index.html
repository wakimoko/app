<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>出荷管理</title>

<style>
body{
  font-size:16px;
  margin:0;
  padding:20px;
  font-family:sans-serif;
  background:#f7f2ec;
  color:#000;
}

/* タブ */
.tabs button{
  margin-right:8px;
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:#e6ddd4;
  font-size:14px;
}
.active{
  background:#a9744f !important;
  color:white;
}

/* 日付 */
.dates button{
  margin:4px;
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:#eee;
  font-size:14px;
}
.date-active{
  background:#a9744f;
  color:white;
}

/* カード */
.card{
  background:white;
  border-radius:12px;
  padding:16px;
  margin-top:16px;
}

/* 重要 */
.important{
  color:red;
  font-weight:bold;
}

/* 👍 */
.like{
  border:none;
  border-radius:20px;
  padding:6px 12px;
  margin-top:10px;
  font-size:14px;
}
.like-on{
  background:#c8a98a;
}
.like-off{
  background:#eee;
}
</style>
</head>

<body>

<h2>出荷管理</h2>

<div class="tabs">
  <button onclick="setTab('notice')" id="tab_notice">注意事項</button>
  <button onclick="setTab('ship')" id="tab_ship">出荷予定</button>
  <button onclick="setTab('manage')" id="tab_manage">管理</button>
</div>

<div class="dates" id="dates"></div>

<div id="view"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const client = window.supabase.createClient(
  "https://bylottznuwuizncgfltd.supabase.co",
  "sb_publishable_VDryMJYXIZUwumf5gxxqyw__ivv1upf"
);

let currentTab = "notice";
let currentDate = "";
let weekOffset = 0;

/* 日付 */
function loadDates(){
  const box = document.getElementById("dates");
  box.innerHTML="";

  let today = new Date();
  let monday = new Date(today);
  monday.setDate(today.getDate() - today.getDay() + 1 + weekOffset*7);

  for(let i=0;i<5;i++){
    let d = new Date(monday);
    d.setDate(monday.getDate()+i);

    let val = d.toISOString().slice(0,10);
    let text = `${d.getMonth()+1}/${d.getDate()}`;

    let btn = document.createElement("button");
    btn.textContent=text;

    btn.onclick=()=>{
      currentDate = val;
      render();
    };

    if(val === currentDate){
      btn.classList.add("date-active");
    }

    box.appendChild(btn);
  }

  if(!currentDate){
    currentDate = monday.toISOString().slice(0,10);
  }
}

/* タブ */
function setTab(tab){
  currentTab=tab;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab_"+tab).classList.add("active");
  render();
}

/* 表示 */
async function render(){

  loadDates();

  const view = document.getElementById("view");

  if(currentTab==="notice"){

    const {data} = await client
      .from("shipments")
      .select("*")
      .eq("date", currentDate);

    view.innerHTML="";

    if(!data || data.length===0){
      view.innerHTML="<div class='card'>注意事項はありません</div>";
      return;
    }

    data.forEach(item=>{
      view.innerHTML += `
      <div class="card">
        <div class="${item.status==='重要'?'important':''}">
          ${item.title || ""}
        </div>
        <div>${item.content || ""}</div>

        <button class="like ${item.liked?'like-on':'like-off'}"
          onclick="toggleLike(${item.id}, ${item.likes||0}, ${item.liked})">
          👍 ×${item.likes||0}
        </button>
      </div>
      `;
    });
  }

  if(currentTab==="manage"){
    view.innerHTML=`
      <div class="card">
        <h3>管理</h3>

        <select id="dateSelect"></select><br><br>

        <input id="title" placeholder="タイトル"><br><br>
        <input id="content" placeholder="内容"><br><br>

        <select id="status">
          <option>通常</option>
          <option>重要</option>
        </select><br><br>

        <button onclick="add()">追加</button>
      </div>
    `;

    let select = document.getElementById("dateSelect");

    let today = new Date();
    for(let i=0;i<7;i++){
      let d = new Date(today);
      d.setDate(today.getDate()+i);

      let val = d.toISOString().slice(0,10);

      let opt = document.createElement("option");
      opt.value = val;
      opt.textContent = val;

      select.appendChild(opt);
    }
  }
}

/* 👍 */
async function toggleLike(id, likes, liked){

  const newLikes = liked ? likes-1 : likes+1;

  await client
    .from("shipments")
    .update({
      likes:newLikes,
      liked:!liked
    })
    .eq("id", id);

  render();
}

/* 追加 */
async function add(){

  const date = document.getElementById("dateSelect").value;

  await client.from("shipments").insert({
    date:date,
    title:document.getElementById("title").value,
    content:document.getElementById("content").value,
    status:document.getElementById("status").value,
    likes:0,
    liked:false
  });

  alert("追加した！");
  render();
}

/* 初期 */
setTab("notice");

</script>

</body>
</html>
