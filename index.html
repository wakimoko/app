<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>出荷管理</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:#f3eee6;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  color:#111;
}

.container{
  max-width:430px;
  margin:auto;
  padding:10px 16px 80px;
}

h1{
  font-size:38px;
  font-weight:900;
  margin:8px 0 20px;
}

button{
  border:none;
  cursor:pointer;
  font-family:inherit;
}

.top-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:12px;
}

.top-tabs button{
  height:48px;
  border-radius:18px;
  background:#e6ddd4;
  color:#007aff;
  font-size:13px;
  font-weight:900;
}

.top-tabs .active,
.date-row .active{
  background:#c99657;
  color:#fff;
}

.week-row{
  display:grid;
  grid-template-columns:1fr .7fr 1fr;
  gap:8px;
  margin-bottom:10px;
}

.week-row button{
  height:44px;
  border-radius:18px;
  background:#e6ddd4;
  color:#007aff;
  font-size:15px;
  font-weight:900;
}

.date-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:7px;
  margin-bottom:12px;
}

.date-row button{
  height:44px;
  border-radius:16px;
  background:#e6ddd4;
  color:#007aff;
  font-size:15px;
  font-weight:900;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:18px 18px 52px;
  position:relative;
  min-height:170px;
}

.notice-title{
  font-size:22px;
  font-weight:900;
  margin-bottom:16px;
}

.notice-name{
  font-size:16px;
  margin-bottom:10px;
}

.notice-body{
  font-size:15px;
  line-height:1.4;
  white-space:pre-wrap;
}

.card-actions{
  position:absolute;
  right:14px;
  bottom:14px;
  display:flex;
  gap:8px;
}

.icon-btn{
  width:34px;
  height:34px;
  border-radius:50%;
  font-size:15px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.edit-btn{background:#efe7dc}
.delete-btn{background:#f8dede}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-content{
  width:88%;
  max-width:360px;
  background:#fff;
  border-radius:22px;
  padding:18px;
}

.modal input,
.modal textarea{
  width:100%;
  border:2px solid #e3ddd5;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  font-size:16px;
}

.modal textarea{
  height:150px;
  resize:none;
}

.save-btn{
  width:100%;
  height:48px;
  border-radius:16px;
  background:#c99657;
  color:#fff;
  font-size:17px;
  font-weight:900;
}

.close-btn{
  margin-top:8px;
  width:100%;
  height:40px;
  border-radius:14px;
  background:#ece6df;
  font-weight:700;
}

.calendar-bg{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.25);
  z-index:1000;
}

.calendar-popup{
  display:none;
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:340px;
  background:#f3eee6;
  border-radius:26px;
  padding:18px;
  z-index:1001;
  box-shadow:0 12px 35px rgba(0,0,0,.25);
}

.calendar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.calendar-title{
  font-size:18px;
  font-weight:900;
}

.calendar-header button{
  width:34px;
  height:34px;
  border-radius:50%;
  background:#c99657;
  color:#fff;
  font-size:20px;
  font-weight:900;
}

.calendar-week,
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.calendar-week{
  margin-bottom:6px;
}

.calendar-week div{
  text-align:center;
  font-size:12px;
  font-weight:900;
  color:#8b7b6b;
}

.calendar-day,
.calendar-empty{
  height:38px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
}

.calendar-day{
  background:#e6ddd4;
}

.calendar-day.active{
  background:#c99657;
  color:#fff;
}

.calendar-close{
  margin-top:14px;
  width:100%;
  height:40px;
  border-radius:14px;
  background:#e6ddd4;
  font-weight:900;
}
</style>
</head>

<body>

<div class="container">

<h1>出荷管理</h1>

<div class="top-tabs">
  <button id="noticeBtn" class="active">注意事項</button>
  <button id="shipBtn">出荷予定</button>
  <button id="todayBtn">当日出荷</button>
  <button id="manageBtn">管理</button>
</div>

<div class="week-row">
  <button id="prevWeek">前週</button>
  <button id="calendarBtn">🗓</button>
  <button id="nextWeek">次週</button>
</div>

<div class="date-row" id="dateRow"></div>

<div class="card">
  <div class="notice-title">クレーム</div>
  <div class="notice-name">○○様</div>
  <div class="notice-body">要検品</div>

  <div class="card-actions">
    <button class="icon-btn edit-btn" id="editBtn">✏️</button>
    <button class="icon-btn delete-btn" id="deleteBtn">🗑️</button>
  </div>
</div>

</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent">
    <input type="text" id="titleInput" placeholder="日付選択">
    <input type="text" id="nameInput" placeholder="タイトル">
    <textarea id="bodyInput" placeholder="内容"></textarea>
    <button class="save-btn" id="saveBtn">保存</button>
    <button class="close-btn" id="closeBtn">閉じる</button>
  </div>
</div>

<div class="calendar-bg" id="calendarBg"></div>

<div class="calendar-popup" id="calendarPopup">
  <div class="calendar-header">
    <button id="calPrev">‹</button>
    <div class="calendar-title" id="calendarTitle"></div>
    <button id="calNext">›</button>
  </div>

  <div class="calendar-week">
    <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
  </div>

  <div class="calendar-grid" id="calendarGrid"></div>

  <button class="calendar-close" id="calendarClose">閉じる</button>
</div>

<script>
let weekStart = new Date(2026,4,4);
let selectedDate = new Date(2026,4,4);
let calendarMonth = new Date(2026,4,1);

function setActiveTab(btn){
  document.querySelectorAll(".top-tabs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function getMonday(date){
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
  return d;
}

function formatDate(date){
  return (date.getMonth()+1) + "/" + date.getDate();
}

function sameDate(a,b){
  return a && b &&
    a.getFullYear()===b.getFullYear() &&
    a.getMonth()===b.getMonth() &&
    a.getDate()===b.getDate();
}

function renderDates(){
  const row = document.getElementById("dateRow");
  row.innerHTML = "";

  for(let i=0;i<5;i++){
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate()+i);

    const btn = document.createElement("button");
    btn.textContent = formatDate(d);

    if(sameDate(d, selectedDate)) btn.classList.add("active");

    btn.onclick = ()=>{
      selectedDate = new Date(d);
      renderDates();
    };

    row.appendChild(btn);
  }
}

document.getElementById("prevWeek").onclick = ()=>{
  weekStart.setDate(weekStart.getDate()-7);
  selectedDate = new Date(weekStart);
  renderDates();
};

document.getElementById("nextWeek").onclick = ()=>{
  weekStart.setDate(weekStart.getDate()+7);
  selectedDate = new Date(weekStart);
  renderDates();
};

function openCalendar(){
  document.getElementById("calendarBg").style.display = "block";
  document.getElementById("calendarPopup").style.display = "block";
  calendarMonth = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
  renderCalendar();
}

function closeCalendar(){
  document.getElementById("calendarBg").style.display = "none";
  document.getElementById("calendarPopup").style.display = "none";
}

function renderCalendar(){
  const grid = document.getElementById("calendarGrid");
  const title = document.getElementById("calendarTitle");

  grid.innerHTML = "";

  const year = calendarMonth.getFullYear();
  const month = calendarMonth.getMonth();

  title.textContent = `${year}年 ${month+1}月`;

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month+1, 0).getDate();

  for(let i=0;i<firstDay;i++){
    const empty = document.createElement("div");
    empty.className = "calendar-empty";
    grid.appendChild(empty);
  }

  for(let day=1;day<=lastDate;day++){
    const d = new Date(year, month, day);
    const cell = document.createElement("div");

    cell.className = "calendar-day";
    cell.textContent = day;

    if(sameDate(d, selectedDate)) cell.classList.add("active");

    cell.onclick = ()=>{
      selectedDate = new Date(d);
      weekStart = getMonday(selectedDate);
      renderDates();
      closeCalendar();
    };

    grid.appendChild(cell);
  }
}

document.getElementById("calendarBtn").onclick = openCalendar;
document.getElementById("calendarBg").onclick = closeCalendar;
document.getElementById("calendarClose").onclick = closeCalendar;

document.getElementById("calPrev").onclick = ()=>{
  calendarMonth.setMonth(calendarMonth.getMonth()-1);
  renderCalendar();
};

document.getElementById("calNext").onclick = ()=>{
  calendarMonth.setMonth(calendarMonth.getMonth()+1);
  renderCalendar();
};

const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");
const titleEl = document.querySelector(".notice-title");
const nameEl = document.querySelector(".notice-name");
const bodyEl = document.querySelector(".notice-body");

modalContent.onclick = e=>e.stopPropagation();
modal.onclick = ()=>modal.style.display = "none";

document.getElementById("editBtn").onclick = ()=>{
  document.getElementById("titleInput").value = titleEl.innerText;
  document.getElementById("nameInput").value = nameEl.innerText;
  document.getElementById("bodyInput").value = bodyEl.innerText;
  modal.style.display = "flex";
};

document.getElementById("manageBtn").onclick = ()=>{
  setActiveTab(document.getElementById("manageBtn"));

  document.getElementById("titleInput").value = "";
  document.getElementById("nameInput").value = "";
  document.getElementById("bodyInput").value = "";

  document.getElementById("titleInput").placeholder = "日付選択";
  document.getElementById("nameInput").placeholder = "タイトル";
  document.getElementById("bodyInput").placeholder = "内容";

  modal.style.display = "flex";
};

document.getElementById("noticeBtn").onclick = ()=>{
  setActiveTab(document.getElementById("noticeBtn"));
};

document.getElementById("shipBtn").onclick = ()=>{
  setActiveTab(document.getElementById("shipBtn"));
};

document.getElementById("todayBtn").onclick = ()=>{
  setActiveTab(document.getElementById("todayBtn"));
};

document.getElementById("closeBtn").onclick = ()=>{
  modal.style.display = "none";
};

document.getElementById("saveBtn").onclick = ()=>{
  titleEl.innerText = document.getElementById("titleInput").value || "無題";
  nameEl.innerText = document.getElementById("nameInput").value || "";
  bodyEl.innerText = document.getElementById("bodyInput").value || "";
  modal.style.display = "none";
  setActiveTab(document.getElementById("noticeBtn"));
};

document.getElementById("deleteBtn").onclick = ()=>{
  if(confirm("削除しますか？")){
    document.querySelector(".card").remove();
  }
};

renderDates();
</script>

</body>
</html>
