<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>出荷管理</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:#f3eee6;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  color:#111;
}

.container{
  max-width:430px;
  margin:auto;
  padding:12px 16px 70px;
}

h1{
  font-size:34px;
  font-weight:900;
  margin:8px 0 18px;
}

button{
  border:none;
  cursor:pointer;
  font-family:inherit;
}

.top-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:12px;
}

.top-tabs button{
  height:44px;
  border-radius:16px;
  background:#e6ddd4;
  color:#007aff;
  font-size:13px;
  font-weight:900;
}

.active{
  background:#c99657!important;
  color:#fff!important;
}

.week-row{
  display:grid;
  grid-template-columns:1fr .7fr 1fr;
  gap:10px;
  margin-bottom:10px;
}

.week-row button{
  height:40px;
  border-radius:16px;
  background:#e6ddd4;
  color:#007aff;
  font-size:13px;
  font-weight:900;
}

.date-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  margin-bottom:12px;
}

.date-row button{
  height:40px;
  border-radius:16px;
  background:#e6ddd4;
  color:#007aff;
  font-size:16px;
  font-weight:900;
}

.card{
  background:#fff;
  border-radius:22px;
  padding:14px;
  position:relative;
  min-height:150px;
}

.ship-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  padding:10px 0;
}

.ship-row:first-child{padding-top:0}
.ship-row:last-child{padding-bottom:0}

.ship-name{
  font-size:20px;
  font-weight:900;
  line-height:1.1;
}

.ship-name.small{
  font-size:15px;
}

.ship-floor{
  font-size:15px;
  font-weight:900;
  margin-top:4px;
}

.ship-right{
  width:160px;
  margin-right:12px;
  text-align:right;
}

.ship-status{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  margin-bottom:7px;
}

.ship-status button{
  width:58px;
  height:40px;
  border-radius:18px;
  background:#e6ddd4;
  color:#111;
  font-size:14px;
  font-weight:900;
  white-space:nowrap;
}

.ship-links{
  display:flex;
  justify-content:flex-end;
  gap:14px;
  font-size:11px;
  font-weight:800;
  color:#8b5d33;
  text-decoration:underline;
}

.divider{
  height:1px;
  background:#e2d7ca;
  margin:10px 0;
}

.notice-title{
  font-size:20px;
  font-weight:900;
  margin-bottom:12px;
}

.notice-name{
  font-size:15px;
  margin-bottom:8px;
}

.notice-body{
  font-size:14px;
  line-height:1.5;
  white-space:pre-wrap;
}

.card-actions{
  position:absolute;
  right:14px;
  bottom:14px;
  display:flex;
  gap:8px;
}

.icon-btn{
  width:34px;
  height:34px;
  border-radius:50%;
  font-size:15px;
}

.edit-btn{background:#efe7dc}
.delete-btn{background:#f8dede}

.form-input,
.form-textarea{
  width:100%;
  border:2px solid #e3ddd5;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  font-size:15px;
}

.form-input{height:50px}
.form-textarea{height:120px;resize:none}

.save-btn{
  width:100%;
  height:46px;
  border-radius:16px;
  background:#c99657;
  color:#fff;
  font-size:16px;
  font-weight:900;
}

.calendar-bg{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.25);
  z-index:1000;
}

.calendar-popup{
  display:none;
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:340px;
  background:#f3eee6;
  border-radius:26px;
  padding:18px;
  z-index:1001;
}

.calendar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.calendar-title{
  font-size:16px;
  font-weight:900;
}

.calendar-header button{
  width:34px;
  height:34px;
  border-radius:50%;
  background:#c99657;
  color:#fff;
  font-size:20px;
  font-weight:900;
}

.calendar-week,
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.calendar-week{margin-bottom:6px}

.calendar-week div{
  text-align:center;
  font-size:12px;
  font-weight:900;
  color:#8b7b6b;
}

.calendar-day,
.calendar-empty{
  height:38px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:800;
}

.calendar-day{background:#e6ddd4}
.calendar-day.active{background:#c99657;color:#fff}

.calendar-close{
  margin-top:14px;
  width:100%;
  height:40px;
  border-radius:14px;
  background:#e6ddd4;
  font-weight:900;
}
</style>
</head>

<body>

<div class="container">

<h1>出荷管理</h1>

<div class="top-tabs">
  <button id="noticeBtn">注意事項</button>
  <button id="shipBtn" class="active">出荷予定</button>
  <button id="todayBtn">当日出荷</button>
  <button id="manageBtn">管理</button>
</div>

<div id="scheduleArea">
  <div class="week-row">
    <button id="prevWeek">前週</button>
    <button id="calendarBtn">🗓</button>
    <button id="nextWeek">次週</button>
  </div>
  <div class="date-row" id="dateRow"></div>
</div>

<div id="mainArea"></div>

</div>

<div class="calendar-bg" id="calendarBg"></div>

<div class="calendar-popup" id="calendarPopup">
  <div class="calendar-header">
    <button id="calPrev">‹</button>
    <div class="calendar-title" id="calendarTitle"></div>
    <button id="calNext">›</button>
  </div>
  <div class="calendar-week">
    <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
  </div>
  <div class="calendar-grid" id="calendarGrid"></div>
  <button class="calendar-close" id="calendarClose">閉じる</button>
</div>

<script>
let weekStart = new Date(2026,4,4);
let selectedDate = new Date(2026,4,4);
let calendarMonth = new Date(2026,4,1);
let calendarTarget = "week";

let notices = JSON.parse(localStorage.getItem("noticesByDate") || "{}");
let shipData = JSON.parse(localStorage.getItem("shipData") || "{}");

function formatDate(d){
  return (d.getMonth()+1)+"/"+d.getDate();
}

function sameDate(a,b){
  return a&&b&&
    a.getFullYear()===b.getFullYear()&&
    a.getMonth()===b.getMonth()&&
    a.getDate()===b.getDate();
}

function getMonday(date){
  const d=new Date(date);
  const day=d.getDay();
  d.setDate(d.getDate()+(day===0?-6:1-day));
  return d;
}

function setActiveTab(btn){
  document.querySelectorAll(".top-tabs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function refreshCurrentTab(){
  if(noticeBtn.classList.contains("active")) renderNotice();
  if(shipBtn.classList.contains("active")) renderShip();
  if(todayBtn.classList.contains("active")) renderToday();
}

function renderDates(){
  dateRow.innerHTML="";
  for(let i=0;i<5;i++){
    const d=new Date(weekStart);
    d.setDate(weekStart.getDate()+i);

    const btn=document.createElement("button");
    btn.textContent=formatDate(d);

    if(sameDate(d,selectedDate)){
      btn.classList.add("active");
    }

    btn.onclick=()=>{
      selectedDate=new Date(d);
      renderDates();
      refreshCurrentTab();
    };

    dateRow.appendChild(btn);
  }
}

function shipKey(type){
  return type+"_"+formatDate(selectedDate);
}

function getShipStatus(type,name){
  const key=shipKey(type);
  if(!shipData[key]) shipData[key]={};
  if(!shipData[key][name]) shipData[key][name]="なし";
  return shipData[key][name];
}

function saveShipStatus(type,name,status){
  const key=shipKey(type);
  if(!shipData[key]) shipData[key]={};
  shipData[key][name]=status;
  localStorage.setItem("shipData",JSON.stringify(shipData));
}

function shipmentRow(type,name,floor){
  const status=getShipStatus(type,name);
  const small=name==="梱包場"||name==="MJ倉庫"?"small":"";

  return `
    <div class="ship-row">
      <div>
        <div class="ship-name ${small}">${name}</div>
        ${floor?`<div class="ship-floor">${floor}</div>`:""}
      </div>

      <div class="ship-right">
        <div class="ship-status" data-type="${type}" data-name="${name}">
          <button class="${status==="あり"?"active":""}" onclick="toggleShip(this,'あり')">あり</button>
          <button class="${status==="なし"?"active":""}" onclick="toggleShip(this,'なし')">なし</button>
        </div>

        <div class="ship-links">
          <span onclick="alert('写真表示')">写真表示</span>
          <span onclick="alert('添付')">添付</span>
        </div>
      </div>
    </div>
  `;
}

function renderShip(){
  setActiveTab(shipBtn);
  scheduleArea.style.display="block";

  mainArea.innerHTML=`
    <div class="card">
      ${shipmentRow("ship","佐川急便","2F")}
      <div class="divider"></div>
      ${shipmentRow("ship","福山通運","2F")}
      <div class="divider"></div>
      ${shipmentRow("ship","梱包場","")}
      <div class="divider"></div>
      ${shipmentRow("ship","MJ倉庫","")}
    </div>
  `;
}

function renderToday(){
  setActiveTab(todayBtn);
  scheduleArea.style.display="block";

  mainArea.innerHTML=`
    <div class="card">
      ${shipmentRow("today","佐川急便","2F")}
      <div class="divider"></div>
      ${shipmentRow("today","福山通運","2F")}
      <div class="divider"></div>
      ${shipmentRow("today","梱包場","")}
      <div class="divider"></div>
      ${shipmentRow("today","MJ倉庫","")}
    </div>
  `;
}

function toggleShip(btn,status){
  const group=btn.parentElement;
  group.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  saveShipStatus(group.dataset.type,group.dataset.name,status);
}

function renderNotice(){
  setActiveTab(noticeBtn);
  scheduleArea.style.display="block";

  const key=formatDate(selectedDate);
  const item=notices[key];

  mainArea.innerHTML=item?`
    <div class="card">
      <div class="notice-title">${key}</div>
      <div class="notice-name">${item.title}</div>
      <div class="notice-body">${item.body}</div>
      <div class="card-actions">
        <button class="icon-btn edit-btn" onclick="renderManage()">✏️</button>
        <button class="icon-btn delete-btn" onclick="deleteNotice()">🗑️</button>
      </div>
    </div>
  `:`
    <div class="card">
      <div class="notice-title">${key}</div>
      <div class="notice-name">注意事項なし</div>
      <div class="notice-body">この日の注意事項はありません</div>
      <div class="card-actions">
        <button class="icon-btn edit-btn" onclick="renderManage()">✏️</button>
      </div>
    </div>
  `;
}

function renderManage(){
  setActiveTab(manageBtn);
  scheduleArea.style.display="none";

  const key=formatDate(selectedDate);
  const item=notices[key]||{title:"",body:""};

  mainArea.innerHTML=`
    <div class="card">
      <input class="form-input" id="dateInput" placeholder="日付選択" readonly value="${key}">
      <input class="form-input" id="titleInput" placeholder="タイトル" value="${item.title}">
      <textarea class="form-textarea" id="bodyInput" placeholder="内容">${item.body}</textarea>
      <button class="save-btn" onclick="saveNotice()">保存</button>
    </div>
  `;

  dateInput.onclick=()=>openCalendar("input");
}

function saveNotice(){
  const key=dateInput.value;
  notices[key]={
    title:titleInput.value||"",
    body:bodyInput.value||""
  };

  localStorage.setItem("noticesByDate",JSON.stringify(notices));

  selectedDate=parseDateKey(key);
  weekStart=getMonday(selectedDate);
  renderDates();
  renderNotice();
}

function deleteNotice(){
  const key=formatDate(selectedDate);
  if(confirm("削除しますか？")){
    delete notices[key];
    localStorage.setItem("noticesByDate",JSON.stringify(notices));
    renderNotice();
  }
}

function parseDateKey(key){
  const [m,d]=key.split("/").map(Number);
  return new Date(selectedDate.getFullYear(),m-1,d);
}

noticeBtn.onclick=renderNotice;
shipBtn.onclick=renderShip;
todayBtn.onclick=renderToday;
manageBtn.onclick=renderManage;

prevWeek.onclick=()=>{
  weekStart.setDate(weekStart.getDate()-7);
  selectedDate=new Date(weekStart);
  renderDates();
  refreshCurrentTab();
};

nextWeek.onclick=()=>{
  weekStart.setDate(weekStart.getDate()+7);
  selectedDate=new Date(weekStart);
  renderDates();
  refreshCurrentTab();
};

function openCalendar(target="week"){
  calendarTarget=target;
  calendarBg.style.display="block";
  calendarPopup.style.display="block";
  calendarMonth=new Date(selectedDate.getFullYear(),selectedDate.getMonth(),1);
  renderCalendar();
}

function closeCalendar(){
  calendarBg.style.display="none";
  calendarPopup.style.display="none";
}

function renderCalendar(){
  calendarGrid.innerHTML="";

  const y=calendarMonth.getFullYear();
  const m=calendarMonth.getMonth();

  calendarTitle.textContent=`${y}年 ${m+1}月`;

  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++){
    const e=document.createElement("div");
    e.className="calendar-empty";
    calendarGrid.appendChild(e);
  }

  for(let day=1;day<=last;day++){
    const d=new Date(y,m,day);
    const cell=document.createElement("div");
    cell.className="calendar-day";
    cell.textContent=day;

    if(sameDate(d,selectedDate)){
      cell.classList.add("active");
    }

    cell.onclick=()=>{
      selectedDate=new Date(d);
      weekStart=getMonday(selectedDate);

      if(calendarTarget==="input"){
        dateInput.value=formatDate(selectedDate);
      }else{
        renderDates();
        refreshCurrentTab();
      }

      closeCalendar();
    };

    calendarGrid.appendChild(cell);
  }
}

calendarBtn.onclick=()=>openCalendar("week");
calendarBg.onclick=closeCalendar;
calendarClose.onclick=closeCalendar;

calPrev.onclick=()=>{
  calendarMonth.setMonth(calendarMonth.getMonth()-1);
  renderCalendar();
};

calNext.onclick=()=>{
  calendarMonth.setMonth(calendarMonth.getMonth()+1);
  renderCalendar();
};

renderDates();
renderShip();
</script>

</body>
</html>
