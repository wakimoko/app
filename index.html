<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>出荷管理</title>

<style>

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  background:#f4ede4;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  color:#111;
}

.app{
  max-width:430px;
  margin:auto;
  padding:24px 20px 40px;
}

h1{
  font-size:54px;
  font-weight:900;
  margin:12px 0 30px;
}

/* 上タブ */

.top-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:18px;
}

.top-tabs button{
  height:88px;
  min-width:0;

  border:none;
  border-radius:26px;

  background:#e6ddd4;

  font-size:20px;
  font-weight:900;

  writing-mode:horizontal-tb;
  white-space:nowrap;

  color:#111;
}

.top-tabs .active{
  background:#be8b55;
  color:#fff;
}

/* 週 */

.week-nav{
  display:grid;
  grid-template-columns:1fr .7fr 1fr;
  gap:14px;
  margin-bottom:18px;
}

.week-nav button{
  height:82px;
  border:none;
  border-radius:24px;
  background:#e6ddd4;
  font-size:22px;
  font-weight:900;
}

/* 日付 */

.dates{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:14px;
  margin-bottom:22px;
}

.dates button{
  height:82px;
  border:none;
  border-radius:24px;
  background:#e6ddd4;
  font-size:24px;
  font-weight:900;
}

.dates .active{
  background:#be8b55;
  color:#fff;
}

/* カード */

.card{
  background:#fff;
  border-radius:34px;
  padding:10px 18px;
}

/* 行 */

.ship-row{
  padding:24px 0 18px;
  border-bottom:2px solid #efe5dc;
}

.ship-row:last-child{
  border-bottom:none;
}

.ship-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

/* 左 */

.ship-left{
  display:flex;
  flex-direction:column;
}

.ship-company{
  font-size:28px;
  font-weight:900;
  line-height:1.1;
}

.ship-place{
  font-size:20px;
  font-weight:800;
  margin-top:10px;
}

/* 右 */

.ship-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
}

/* ありなし */

.ship-status{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
}

.ship-status button{
  min-width:92px;
  height:58px;

  border:none;
  border-radius:999px;

  background:#e6ddd4;
  color:#111;

  font-size:22px;
  font-weight:900;
}

.ship-status .active{
  background:#be8b55;
  color:#fff;
}

/* 写真 */

.photo-links{
  display:flex;
  gap:18px;
  margin-top:12px;
}

.photo-links button,
.photo-links label{
  border:none;
  background:none;
  padding:0;
  margin:0;

  color:#8b5d33;

  font-size:14px;
  font-weight:700;

  text-decoration:underline;
}

.photo-links input{
  display:none;
}

</style>
</head>

<body>

<div class="app">

<h1>出荷管理</h1>

<div class="top-tabs">
  <button>注意事項</button>
  <button class="active">出荷予定</button>
  <button>当日出荷</button>
  <button>管理</button>
</div>

<div class="week-nav">
  <button>前週</button>
  <button>🗓️</button>
  <button>次週</button>
</div>

<div class="dates">
  <button class="active">5/4</button>
  <button>5/5</button>
  <button>5/6</button>
  <button>5/7</button>
  <button>5/8</button>
</div>

<div class="card">

  <!-- 佐川 -->
  <div class="ship-row">

    <div class="ship-top">

      <div class="ship-left">
        <div class="ship-company">佐川急便</div>
        <div class="ship-place">2F</div>
      </div>

      <div class="ship-right">

        <div class="ship-status">
          <button class="active">あり</button>
          <button>なし</button>
        </div>

        <div class="photo-links">
          <button>写真表示</button>

          <label>
            添付
            <input type="file" accept="image/*">
          </label>
        </div>

      </div>

    </div>

  </div>

  <!-- 福山 -->
  <div class="ship-row">

    <div class="ship-top">

      <div class="ship-left">
        <div class="ship-company">福山通運</div>
        <div class="ship-place">2F</div>
      </div>

      <div class="ship-right">

        <div class="ship-status">
          <button class="active">あり</button>
          <button>なし</button>
        </div>

        <div class="photo-links">
          <button>写真表示</button>

          <label>
            添付
            <input type="file" accept="image/*">
          </label>
        </div>

      </div>

    </div>

  </div>

  <!-- 梱包場 -->
  <div class="ship-row">

    <div class="ship-top">

      <div class="ship-left">
        <div class="ship-company">梱包場</div>
        <div class="ship-place">2F</div>
      </div>

      <div class="ship-right">

        <div class="ship-status">
          <button>あり</button>
          <button class="active">なし</button>
        </div>

        <div class="photo-links">
          <button>写真表示</button>

          <label>
            添付
            <input type="file" accept="image/*">
          </label>
        </div>

      </div>

    </div>

  </div>

  <!-- MJ -->
  <div class="ship-row">

    <div class="ship-top">

      <div class="ship-left">
        <div class="ship-company">MJ倉庫</div>
        <div class="ship-place">2F</div>
      </div>

      <div class="ship-right">

        <div class="ship-status">
          <button>あり</button>
          <button class="active">なし</button>
        </div>

        <div class="photo-links">
          <button>写真表示</button>

          <label>
            添付
            <input type="file" accept="image/*">
          </label>
        </div>

      </div>

    </div>

  </div>

</div>

</div>

</body>
</html>
