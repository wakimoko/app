<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>出荷管理</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  background:#f3eee6;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  color:#111;
}

.container{
  max-width:430px;
  margin:auto;
  padding:10px 16px 80px;
}

/* タイトル */

h1{
  font-size:38px;
  font-weight:900;
  margin:8px 0 20px;
}

/* ボタン共通 */

button{
  border:none;
  cursor:pointer;
  font-family:inherit;
}

/* 上メニュー */

.top-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:12px;
}

.top-tabs button{
  height:48px;
  border-radius:18px;
  background:#e6ddd4;
  color:#007aff;
  font-size:13px;
  font-weight:900;
  line-height:1.15;
}

.top-tabs .active{
  background:#c99657;
  color:#fff;
}

/* 前週次週 */

.week-row{
  display:grid;
  grid-template-columns:1fr .7fr 1fr;
  gap:8px;
  margin-bottom:10px;
}

.week-row button{
  height:44px;
  border-radius:18px;
  background:#e6ddd4;
  color:#007aff;
  font-size:15px;
  font-weight:900;
}

/* 日付 */

.date-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:7px;
  margin-bottom:12px;
}

.date-row button{
  height:44px;
  border-radius:16px;
  background:#e6ddd4;
  color:#007aff;
  font-size:15px;
  font-weight:900;
}

.date-row .active{
  background:#c99657;
  color:#fff;
}

/* カード */

.card{
  background:#fff;
  border-radius:22px;
  padding:18px 18px 52px;
  position:relative;
  min-height:170px;
}

.notice-title{
  font-size:22px;
  font-weight:900;
  margin-bottom:16px;
}

.notice-name{
  font-size:16px;
  margin-bottom:10px;
}

.notice-body{
  font-size:15px;
  line-height:1.4;
  white-space:pre-wrap;
}

/* 編集削除 */

.card-actions{
  position:absolute;
  right:14px;
  bottom:14px;
  display:flex;
  gap:8px;
}

.icon-btn{
  width:34px;
  height:34px;
  border-radius:50%;
  font-size:15px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.edit-btn{
  background:#efe7dc;
}

.delete-btn{
  background:#f8dede;
}

/* モーダル */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-content{
  width:88%;
  max-width:360px;
  background:#fff;
  border-radius:22px;
  padding:18px;
}

.modal input,
.modal textarea{
  width:100%;
  box-sizing:border-box;
  border:2px solid #e3ddd5;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  font-size:16px;
}

.modal textarea{
  height:100px;
  resize:none;
}

.save-btn{
  width:100%;
  height:48px;
  border-radius:16px;
  background:#c99657;
  color:#fff;
  font-size:17px;
  font-weight:900;
}

.close-btn{
  margin-top:8px;
  width:100%;
  height:40px;
  border-radius:14px;
  background:#ece6df;
  font-weight:700;
}
</style>
</head>

<body>

<div class="container">

<h1>出荷管理</h1>

<!-- 上タブ -->

<div class="top-tabs">
  <button class="active">注意事項</button>
  <button>出荷予定</button>
  <button>当日出荷</button>
  <button id="manageBtn">管理</button>
</div>

<!-- 前週次週 -->

<div class="week-row">
  <button id="prevWeek">前週</button>

  <button id="calendarBtn">🗓</button>

  <button id="nextWeek">次週</button>
</div>

<!-- 日付 -->

<div class="date-row" id="dateRow"></div>

<!-- カード -->

<div class="card">

  <div class="notice-title">クレーム</div>

  <div class="notice-name">○○様</div>

  <div class="notice-body">要検品</div>

  <div class="card-actions">

    <button class="icon-btn edit-btn" id="editBtn">
      ✏️
    </button>

    <button class="icon-btn delete-btn" id="deleteBtn">
      🗑️
    </button>

  </div>

</div>

</div>

<!-- モーダル -->

<div class="modal" id="modal">

  <div class="modal-content">

    <input type="text"
           id="titleInput"
           placeholder="タイトル">

    <input type="text"
           id="nameInput"
           placeholder="名前">

    <textarea id="bodyInput"
              placeholder="内容"></textarea>

    <button class="save-btn" id="saveBtn">
      保存
    </button>

    <button class="close-btn" id="closeBtn">
      閉じる
    </button>

  </div>

</div>

<!-- hidden calendar -->

<input type="date"
       id="hiddenDate"
       style="display:none">

<script>

/* 週開始 */

let weekStart = new Date(2026,4,4);

/* 月曜取得 */

function getMonday(date){

  const d = new Date(date);

  const day = d.getDay();

  const diff = day === 0 ? -6 : 1 - day;

  d.setDate(d.getDate() + diff);

  return d;
}

/* 日付文字 */

function formatDate(date){

  return (date.getMonth()+1)
    + "/"
    + date.getDate();
}

/* 日付描画 */

function renderDates(selectedDate){

  const dateRow =
    document.getElementById("dateRow");

  dateRow.innerHTML = "";

  for(let i=0;i<5;i++){

    const d = new Date(weekStart);

    d.setDate(
      weekStart.getDate()+i
    );

    const btn =
      document.createElement("button");

    btn.textContent =
      formatDate(d);

    if(
      selectedDate
      ?
      d.getMonth() === selectedDate.getMonth()
      &&
      d.getDate() === selectedDate.getDate()
      :
      i === 0
    ){
      btn.classList.add("active");
    }

    btn.onclick = ()=>{

      document
      .querySelectorAll("#dateRow button")
      .forEach(b=>{
        b.classList.remove("active");
      });

      btn.classList.add("active");
    };

    dateRow.appendChild(btn);
  }
}

/* 前週 */

document
.getElementById("prevWeek")
.onclick = ()=>{

  weekStart.setDate(
    weekStart.getDate()-7
  );

  renderDates();
};

/* 次週 */

document
.getElementById("nextWeek")
.onclick = ()=>{

  weekStart.setDate(
    weekStart.getDate()+7
  );

  renderDates();
};

/* カレンダー */

document
.getElementById("calendarBtn")
.onclick = ()=>{

  const input =
    document.getElementById("hiddenDate");

  if(input.showPicker){
    input.showPicker();
  }else{
    input.click();
  }
};

/* 日付変更 */

document
.getElementById("hiddenDate")
.onchange = (e)=>{

  if(!e.target.value) return;

  const selected =
    new Date(e.target.value);

  weekStart =
    getMonday(selected);

  renderDates(selected);
};

/* モーダル */

const modal =
  document.getElementById("modal");

const titleEl =
  document.querySelector(".notice-title");

const nameEl =
  document.querySelector(".notice-name");

const bodyEl =
  document.querySelector(".notice-body");

/* 編集 */

document
.getElementById("editBtn")
.onclick = ()=>{

  document
  .getElementById("titleInput")
  .value = titleEl.innerText;

  document
  .getElementById("nameInput")
  .value = nameEl.innerText;

  document
  .getElementById("bodyInput")
  .value = bodyEl.innerText;

  modal.style.display = "flex";
};

/* 管理 */

document
.getElementById("manageBtn")
.onclick = ()=>{

  document
  .getElementById("titleInput")
  .value = "";

  document
  .getElementById("nameInput")
  .value = "";

  document
  .getElementById("bodyInput")
  .value = "";

  modal.style.display = "flex";
};

/* 閉じる */

document
.getElementById("closeBtn")
.onclick = ()=>{

  modal.style.display = "none";
};

/* 保存 */

document
.getElementById("saveBtn")
.onclick = ()=>{

  titleEl.innerText =
    document
    .getElementById("titleInput")
    .value || "無題";

  nameEl.innerText =
    document
    .getElementById("nameInput")
    .value || "";

  bodyEl.innerText =
    document
    .getElementById("bodyInput")
    .value || "";

  modal.style.display = "none";
};

/* 削除 */

document
.getElementById("deleteBtn")
.onclick = ()=>{

  if(confirm("削除しますか？")){

    document
    .querySelector(".card")
    .remove();
  }
};

/* 初期表示 */

renderDates();

</script>

</body>
</html>
