<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出荷管理</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  background:#f5efe6;
  font-family:sans-serif;
  color:#111;
}

.container{
  max-width:430px;
  margin:auto;
  padding:24px;
}

.title{
  font-size:64px;
  font-weight:900;
  margin-bottom:28px;
}

.top-buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:18px;
}

.top-buttons button{
  height:120px;
  border:none;
  border-radius:34px;
  background:#e6ded5;
  font-size:24px;
  font-weight:900;
}

.top-buttons .active{
  background:#c89457;
  color:#fff;
}

.week-buttons{
  display:grid;
  grid-template-columns:1.3fr .9fr 1.3fr;
  gap:14px;
  margin-bottom:18px;
}

.week-buttons button{
  height:110px;
  border:none;
  border-radius:34px;
  background:#e6ded5;
  font-size:24px;
  font-weight:900;
}

.date-buttons{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:14px;
  margin-bottom:26px;
}

.date-buttons button{
  height:110px;
  border:none;
  border-radius:34px;
  background:#e6ded5;
  font-size:28px;
  font-weight:900;
}

.date-buttons .active{
  background:#c89457;
  color:#fff;
}

.card{
  background:#fff;
  border-radius:38px;
  padding:24px;
}

.ship-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:30px 0;
  border-bottom:1px solid #e5ddd4;
}

.ship-row:last-child{
  border-bottom:none;
}

.ship-left{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding-left:12px;
}

.company{
  font-size:34px;
  font-weight:900;
  line-height:1;
}

.place{
  font-size:24px;
  font-weight:900;
  line-height:1;
}

.ship-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:16px;
}

.ship-buttons{
  display:flex;
  gap:18px;
}

.ship-buttons button{
  width:150px;
  height:74px;
  border:none;
  border-radius:999px;
  background:#e6ded5;
  font-size:32px;
  font-weight:900;
}

.ship-buttons .active{
  background:#c89457;
  color:#fff;
}

.photo-links{
  display:flex;
  gap:26px;
  padding-right:6px;
}

.photo-links button,
.photo-links label{
  border:none;
  background:none;
  font-size:18px;
  font-weight:900;
  color:#9a6a3d;
  text-decoration:underline;
}

.photo-links input{
  display:none;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">出荷管理</div>

  <div class="top-buttons">
    <button>注意事項</button>
    <button class="active">出荷予定</button>
    <button>当日出荷</button>
    <button>管理</button>
  </div>

  <div class="week-buttons">
    <button>前週</button>
    <button>🗓️</button>
    <button>次週</button>
  </div>

  <div class="date-buttons">
    <button class="active">5/4</button>
    <button>5/5</button>
    <button>5/6</button>
    <button>5/7</button>
    <button>5/8</button>
  </div>

  <div class="card">

    <div class="ship-row">

      <div class="ship-left">
        <div class="company">佐川急便</div>
        <div class="place">2F</div>
      </div>

      <div class="ship-right">

        <div class="ship-buttons">
          <button class="active">あり</button>
          <button>なし</button>
        </div>

        <div class="photo-links">
          <button>写真表示</button>

          <label>
            添付
            <input type="file" accept="image/*">
          </label>
        </div>

      </div>

    </div>

    <div class="ship-row">

      <div class="ship-left">
        <div class="company">福山通運</div>
        <div class="place">2F</div>
      </div>

      <div class="ship-right">

        <div class="ship-buttons">
          <button class="active">あり</button>
          <button>なし</button>
        </div>

        <div class="photo-links">
          <button>写真表示</button>

          <label>
            添付
            <input type="file" accept="image/*">
          </label>
        </div>

      </div>

    </div>

    <div class="ship-row">

      <div class="ship-left">
        <div class="place">梱包場</div>
      </div>

      <div class="ship-right">

        <div class="ship-buttons">
          <button>あり</button>
          <button class="active">なし</button>
        </div>

        <div class="photo-links">
          <button>写真表示</button>

          <label>
            添付
            <input type="file" accept="image/*">
          </label>
        </div>

      </div>

    </div>

    <div class="ship-row">

      <div class="ship-left">
        <div class="place">MJ倉庫</div>
      </div>

      <div class="ship-right">

        <div class="ship-buttons">
          <button>あり</button>
          <button class="active">なし</button>
        </div>

        <div class="photo-links">
          <button>写真表示</button>

          <label>
            添付
            <input type="file" accept="image/*">
          </label>
        </div>

      </div>

    </div>

  </div>

</div>

</body>
</html>
