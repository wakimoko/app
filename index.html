<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出荷管理</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;padding:20px;background:#f7f2ec;font-family:-apple-system}
h1{font-size:28px;margin:20px 0}

button{
  border:none;
  border-radius:16px;
  padding:12px 16px;
  margin:5px;
  background:#e8dfd6;
  color:#000;
  font-size:15px;
}

.active{background:#a9744f;color:#fff}

.card{
  background:#fff;
  border-radius:18px;
  padding:18px;
  margin-top:14px;
}

.like{
  background:#c8a98a;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>出荷管理</h1>

<div>
  <button id="tab_notice" onclick="setTab('notice')">注意事項</button>
  <button id="tab_ship" onclick="setTab('ship')">出荷予定</button>
  <button id="tab_manage" onclick="setTab('manage')">管理</button>
</div>

<div id="dates"></div>
<div id="view"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const supabase = window.supabase.createClient(
  "https://bylottznuwuizncgfltd.supabase.co",
  "sb_publishable_VDryMJYXIZUwumf5gxxqyw__ivv1upf"
);

let currentTab = "notice";
let currentDate = "5/4";
const dates = ["5/4","5/5","5/6","5/7","5/8"];

function setTab(tab){
  currentTab = tab;
  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab_"+tab).classList.add("active");
  renderDates();
  render();
}

function renderDates(){
  const box = document.getElementById("dates");
  box.innerHTML = "";

  if(currentTab === "manage"){
    box.style.display = "none";
    return;
  }

  box.style.display = "block";

  dates.forEach(d=>{
    const btn = document.createElement("button");
    btn.textContent = d;
    if(d === currentDate) btn.classList.add("active");

    btn.onclick = ()=>{
      currentDate = d;
      renderDates();
      render();
    };

    box.appendChild(btn);
  });
}

async function render(){
  const view = document.getElementById("view");
  view.innerHTML = "";

  if(currentTab === "notice"){
    const {data} = await supabase
      .from("shipments")
      .select("*")
      .eq("date", currentDate)
      .eq("category","notice")
      .order("id",{ascending:false});

    if(!data || data.length === 0){
      view.innerHTML = `<div class="card">注意事項はありません</div>`;
      return;
    }

    data.forEach(item=>{
      view.innerHTML += `
        <div class="card">
          <b>${item.title || ""}</b><br>
          ${item.content || ""}
          <button class="like" onclick="like(${item.id})">
            👍 ×${item.liked || 0}
          </button>
        </div>
      `;
    });
  }

  if(currentTab === "manage"){
    view.innerHTML = `
      <div class="card">
        <select id="date">
          <option>5/4</option>
          <option>5/5</option>
          <option>5/6</option>
          <option>5/7</option>
          <option>5/8</option>
        </select>

        <input id="title" placeholder="タイトル">
        <textarea id="content" placeholder="内容"></textarea>

        <button class="active" onclick="add()">追加</button>
      </div>
    `;
  }
}

async function add(){
  await supabase.from("shipments").insert({
    date: document.getElementById("date").value,
    category:"notice",
    title: document.getElementById("title").value,
    content: document.getElementById("content").value,
    liked:0
  });

  setTab("notice");
}

async function like(id){
  await supabase.rpc("increment_like",{row_id:id});
}

/* 🔥リアルタイム更新（ここが神） */
supabase
  .channel("realtime")
  .on(
    "postgres_changes",
    { event:"UPDATE", schema:"public", table:"shipments" },
    payload => {
      render();
    }
  )
  .subscribe();

setTab("notice");

</script>
</body>
</html>
