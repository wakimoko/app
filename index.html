<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>出荷管理</title>
</head>
<body>
  <h1>出荷管理</h1>

  <input id="title" placeholder="タイトル"><br><br>
  <input id="content" placeholder="内容"><br><br>

  <select id="status">
    <option value="通常">通常</option>
    <option value="重要">重要</option>
  </select><br><br>

  <button onclick="addData()">追加する</button>

  <hr>
  <div id="message"></div>
  <div id="list">読み込み中...</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const client = window.supabase.createClient(
      "https://bylottznuwuizncgfltd.supabase.co",
      "sb_publishable_VDryMJYXIZUwumf5gxxqyw__ivv1upf"
    );

    async function loadData() {
      const list = document.getElementById("list");
      const message = document.getElementById("message");

      const { data, error } = await client
        .from("shipments")
        .select("*")
        .order("id", { ascending: false });

      if (error) {
        message.textContent = "読み込みエラー: " + error.message;
        return;
      }

      list.innerHTML = "";

      data.forEach(item => {
        const div = document.createElement("div");
        div.style.border = "1px solid #ccc";
        div.style.padding = "10px";
        div.style.margin = "10px";

        div.innerHTML = `
          <b>${item.title || ""}</b><br>
          ${item.content || ""}<br>
          ${item.status || ""}
        `;

        list.appendChild(div);
      });
    }

    async function addData() {
      const title = document.getElementById("title").value;
      const content = document.getElementById("content").value;
      const status = document.getElementById("status").value;
      const message = document.getElementById("message");

      message.textContent = "追加中...";

      const { error } = await client
        .from("shipments")
        .insert([{ title, content, status }]);

      if (error) {
        message.textContent = "追加エラー: " + error.message;
        return;
      }

      message.textContent = "追加しました";
      document.getElementById("title").value = "";
      document.getElementById("content").value = "";
      loadData();
    }

    loadData();
  </script>
</body>
</html>
