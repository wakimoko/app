<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>出荷管理</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: sans-serif;
  background: #f3eadf;
  color: #111;
}

.app {
  max-width: 430px;
  margin: 0 auto;
  padding: 44px 22px 24px;
}

h1 {
  font-size: 34px;
  margin: 0 0 30px;
  font-weight: 900;
}

button {
  border: none;
  border-radius: 22px;
  background: #ded6cd;
  color: #111;
  font-size: 16px;
  font-weight: 900;
  padding: 12px 10px;
}

button.active {
  background: #bd8b55;
  color: white;
}

.tabs, .week-nav, .dates, .actions {
  display: flex;
  gap: 10px;
}

.tabs {
  margin-bottom: 18px;
}

.tabs button {
  flex: 1;
  height: 52px;
  font-size: 15px;
}

.week-nav {
  margin-bottom: 14px;
}

.week-nav button {
  flex: 1;
  height: 48px;
}

.dates {
  overflow-x: auto;
  padding-bottom: 8px;
  margin-bottom: 16px;
}

.dates button {
  min-width: 68px;
  height: 52px;
  flex-shrink: 0;
}

.card {
  background: white;
  border-radius: 28px;
  padding: 22px 20px;
}

.row {
  border-bottom: 1px solid #e8ddd2;
  padding: 18px 0;
}

.row:last-child {
  border-bottom: none;
}

.row h2 {
  font-size: 26px;
  margin: 0 0 8px;
  font-weight: 900;
}

.row p {
  font-size: 20px;
  margin: 0 0 12px;
  font-weight: 800;
}

.actions {
  justify-content: flex-end;
}

.actions button {
  min-width: 58px;
  height: 46px;
}

.camera {
  font-size: 18px;
}
</style>
</head>

<body>
<div class="app">
  <h1>出荷管理</h1>

  <div class="tabs">
    <button>注意事項</button>
    <button class="active">出荷予定</button>
    <button>当日出荷</button>
    <button>管理</button>
  </div>

  <div class="week-nav">
    <button>前週</button>
    <button>🗓️</button>
    <button>次週</button>
  </div>

  <div class="dates">
    <button class="active">5/4</button>
    <button>5/5</button>
    <button>5/6</button>
    <button>5/7</button>
    <button>5/8</button>
    <button>5/9</button>
    <button>5/10</button>
  </div>

  <div class="card">
    <div class="row">
      <h2>佐川急便</h2>
      <p>2F</p>
      <div class="actions">
        <button class="active">あり</button>
        <button>なし</button>
        <button class="camera">📷</button>
      </div>
    </div>

    <div class="row">
      <h2>福山通運</h2>
      <p>2F</p>
      <div class="actions">
        <button class="active">あり</button>
        <button>なし</button>
        <button class="camera">📷</button>
      </div>
    </div>

    <div class="row">
      <h2>梱包場</h2>
      <div class="actions">
        <button class="active">あり</button>
        <button>なし</button>
        <button class="camera">📷</button>
      </div>
    </div>

    <div class="row">
      <h2>MJ倉庫</h2>
      <div class="actions">
        <button>あり</button>
        <button class="active">なし</button>
        <button class="camera">📷</button>
      </div>
    </div>
  </div>
</div>

<input id="cameraInput" type="file" accept="image/*" capture="environment" style="display:none;">

<script>
document.querySelectorAll(".tabs button").forEach(button => {
  button.addEventListener("click", () => {
    document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
    button.classList.add("active");
  });
});

document.querySelectorAll(".dates button").forEach(button => {
  button.addEventListener("click", () => {
    document.querySelectorAll(".dates button").forEach(b => b.classList.remove("active"));
    button.classList.add("active");
  });
});

document.querySelectorAll(".actions button:not(.camera)").forEach(button => {
  button.addEventListener("click", () => {
    const group = button.parentElement;
    group.querySelectorAll("button:not(.camera)").forEach(b => b.classList.remove("active"));
    button.classList.add("active");
  });
});

document.querySelectorAll(".camera").forEach(button => {
  button.addEventListener("click", () => {
    document.getElementById("cameraInput").click();
  });
});
</script>
</body>
</html>
