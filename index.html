<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>出荷管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  font-family:sans-serif;
  background:#f5efe7;
  margin:0;
  padding:20px;
}

h1{margin-bottom:20px;}

.tab button{
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:15px;
  background:#ddd;
}

.active{
  background:#b88a5a;
  color:white;
}

.date button{
  margin:5px;
  padding:10px;
  border:none;
  border-radius:15px;
  background:#ddd;
}

.card{
  background:#eee;
  padding:15px;
  border-radius:15px;
  margin-top:15px;
}

.important{
  color:red;
}

.like{
  margin-top:10px;
  padding:8px 15px;
  border:none;
  border-radius:15px;
  background:#b88a5a;
  color:white;
}
</style>
</head>

<body>

<h1>出荷管理</h1>

<div class="tab">
  <button onclick="setTab('notice')" id="tab_notice">注意事項</button>
  <button onclick="setTab('ship')" id="tab_ship">出荷予定</button>
  <button onclick="setTab('today')" id="tab_today">当日出荷</button>
  <button onclick="setTab('manage')" id="tab_manage">管理</button>
</div>

<div class="date">
  <button onclick="setDate('5/4')">5/4</button>
  <button onclick="setDate('5/5')">5/5</button>
  <button onclick="setDate('5/6')">5/6</button>
  <button onclick="setDate('5/7')">5/7</button>
  <button onclick="setDate('5/8')">5/8</button>
</div>

<div id="view"></div>

<!-- 管理画面 -->
<div id="manageArea" style="display:none;margin-top:20px;">
  <h3>追加</h3>

  <input id="title" placeholder="タイトル"><br><br>
  <textarea id="content" placeholder="内容"></textarea><br><br>

  <select id="status">
    <option value="通常">通常</option>
    <option value="重要">重要</option>
  </select><br><br>

  <button onclick="addData()">追加</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://あなたのURL.supabase.co",
  "あなたのanonキー"
);

let currentTab="notice";
let currentDate="5/4";

function setTab(tab){
  currentTab=tab;
  document.getElementById("manageArea").style.display =
    tab==="manage" ? "block" : "none";
  render();
}

function setDate(date){
  currentDate=date;
  render();
}

async function render(){
  const view=document.getElementById("view");
  view.innerHTML="";

  // 出荷予定（固定）
  if(currentTab==="ship"){
    view.innerHTML=`
      <div class="card">
        <h3>出荷予定</h3>
        <p><b>佐川急便</b><br>2F</p>
        <p><b>福山通運</b><br>2F / 梱包場 / MJ倉庫</p>
      </div>
    `;
    return;
  }

  // DB取得
  let {data,error} = await supabase
    .from("shipments")
    .select("*")
    .eq("date",currentDate);

  if(error){
    view.innerHTML="エラー";
    return;
  }

  // 注意事項
  if(currentTab==="notice"){
    let list=data.filter(d=>d.category==="notice");

    if(list.length===0){
      view.innerHTML='<div class="card">データなし</div>';
      return;
    }

    list.sort((a,b)=>{
      if(a.status==="重要") return -1;
      if(b.status==="重要") return 1;
      return 0;
    });

    list.forEach(item=>{
      view.innerHTML+=`
        <div class="card">
          <b class="${item.status==="重要"?"important":""}">
            ${item.title||""}
          </b><br>
          ${item.content||""}
          <button class="like"
            onclick="like(${item.id},${item.likes||0})">
            👍 ×${item.likes||0}
          </button>
        </div>
      `;
    });
  }

  // 当日出荷（チェック）
  if(currentTab==="today"){
    let list=data.filter(d=>d.category==="today");

    if(list.length===0){
      view.innerHTML='<div class="card">データなし</div>';
      return;
    }

    list.forEach(item=>{
      view.innerHTML+=`
        <div class="card">
          <h3>${item.title}</h3>

          2F:
          <input type="checkbox" ${item.floor_2f?"checked":""}
          onchange="toggleCheck(${item.id},'floor_2f',this.checked)"><br>

          2Fテーブル:
          <input type="checkbox" ${item.table_2f?"checked":""}
          onchange="toggleCheck(${item.id},'table_2f',this.checked)"><br>

          梱包場:
          <input type="checkbox" ${item.packing?"checked":""}
          onchange="toggleCheck(${item.id},'packing',this.checked)"><br>

          MJ倉庫:
          <input type="checkbox" ${item.mj?"checked":""}
          onchange="toggleCheck(${item.id},'mj',this.checked)">
        </div>
      `;
    });
  }
}

async function addData(){
  await supabase.from("shipments").insert({
    date:currentDate,
    category:"notice",
    title:document.getElementById("title").value,
    content:document.getElementById("content").value,
    status:document.getElementById("status").value,
    likes:0
  });

  alert("追加した");
  render();
}

async function like(id,likes){
  await supabase.from("shipments")
    .update({likes:likes+1})
    .eq("id",id);

  render();
}

async function toggleCheck(id,column,value){
  let obj={};
  obj[column]=value;

  await supabase.from("shipments")
    .update(obj)
    .eq("id",id);

  render();
}

render();
</script>

</body>
</html>
