<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>出荷管理</title>

<style>
body{
  margin:0;
  padding:20px;
  font-family:sans-serif;
  background:#f7f2ec;
  color:#3b2a22;
}

/* タブ */
.tabs button{
  margin-right:8px;
  padding:8px 14px;
  border:none;
  border-radius:12px;
  background:#e6ddd4;
}
.active{
  background:#a9744f !important;
  color:white;
}

/* 日付 */
.dates button{
  margin:4px;
  padding:6px 10px;
  border:none;
  border-radius:10px;
  background:#eee;
}
.date-active{
  background:#a9744f;
  color:white;
}

/* カード */
.card{
  background:white;
  border-radius:12px;
  padding:16px;
  margin-top:16px;
  box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

/* 重要 */
.important{
  color:red;
  font-weight:bold;
}

/* 👍 */
.like{
  border:none;
  border-radius:20px;
  padding:6px 14px;
  margin-top:8px;
  transition:all 0.15s;
  font-weight:600;
}
.like-on{
  background:#c8a98a;
  transform:scale(1.1);
}
.like-off{
  background:#eee;
}

/* 出荷予定 */
.row{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}
.toggle button{
  margin-left:6px;
  border:none;
  border-radius:12px;
  padding:5px 10px;
}
.on{
  background:#a9744f;
  color:white;
}
.off{
  background:#eee;
}
</style>
</head>

<body>

<h2>出荷管理</h2>

<!-- タブ -->
<div class="tabs">
  <button onclick="setTab('notice')" id="tab_notice">注意事項</button>
  <button onclick="setTab('ship')" id="tab_ship">出荷予定</button>
  <button onclick="setTab('today')" id="tab_today">当日確認</button>
  <button onclick="setTab('manage')" id="tab_manage">管理</button>
</div>

<!-- 日付 -->
<div class="dates" id="dates"></div>

<!-- 表示 -->
<div id="view"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const client = window.supabase.createClient(
  "https://bylottznuwuizncgfltd.supabase.co",
  "sb_publishable_VDryMJYXIZUwumf5gxxqyw__ivv1upf"
);

let currentTab = "notice";
let currentDate = "";
let weekOffset = 0;

/* 月〜金生成 */
function loadDates(){
  const box = document.getElementById("dates");
  box.innerHTML = "";

  let today = new Date();
  let day = today.getDay();
  let monday = new Date(today);
  monday.setDate(today.getDate() - day + 1 + weekOffset*7);

  // 前週
  let prev = document.createElement("button");
  prev.textContent="前週";
  prev.onclick=()=>{weekOffset--;loadDates();};
  box.appendChild(prev);

  for(let i=0;i<5;i++){
    let d = new Date(monday);
    d.setDate(monday.getDate()+i);

    let text = `${d.getMonth()+1}/${d.getDate()}`;
    let val = d.toISOString().slice(0,10);

    let btn = document.createElement("button");
    btn.textContent = text;
    btn.onclick = ()=>{
      currentDate = val;
      render();
    };

    if(currentDate===val){
      btn.classList.add("date-active");
    }

    box.appendChild(btn);
  }

  // 来週
  let next = document.createElement("button");
  next.textContent="来週";
  next.onclick=()=>{weekOffset++;loadDates();};
  box.appendChild(next);
}

/* タブ */
function setTab(tab){
  currentTab = tab;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab_"+tab).classList.add("active");
  render();
}

/* 表示 */
async function render(){

  const view = document.getElementById("view");

  if(currentTab==="notice"){

    const {data} = await client
      .from("shipments")
      .select("*")
      .eq("date", currentDate);

    view.innerHTML="";

    if(!data || data.length===0){
      view.innerHTML="<div class='card'>注意事項はありません</div>";
      return;
    }

    data.forEach(item=>{
      view.innerHTML += `
        <div class="card">
          <div class="${item.status==='重要'?'important':''}">
            ${item.title || ""}
          </div>
          <div>${item.content || ""}</div>

          <button class="like ${item.liked?'like-on':'like-off'}"
            onclick="toggleLike(${item.id},${item.likes||0},${item.liked})">
            👍 ×${item.likes||0}
          </button>
        </div>
      `;
    });
  }

  if(currentTab==="ship"){
    view.innerHTML = `
    <div class="card">
      <h3>出荷予定</h3>

      ${row("佐川急便","2F")}
      ${row("福山通運","2F")}
      ${row("福山通運","梱包場")}
      ${row("福山通運","MJ倉庫")}
    </div>
    `;
  }

  if(currentTab==="manage"){
    view.innerHTML=`
    <div class="card">
      <h3>管理</h3>

      <select id="dateSelect"></select><br><br>

      <input id="title" placeholder="タイトル"><br><br>
      <input id="content" placeholder="内容"><br><br>

      <select id="status">
        <option>通常</option>
        <option>重要</option>
      </select><br><br>

      <button onclick="add()">追加する</button>
    </div>
    `;

    // 日付選択
    const select = document.getElementById("dateSelect");

    let today = new Date();
    for(let i=0;i<14;i++){
      let d = new Date(today);
      d.setDate(today.getDate()+i);

      let val = d.toISOString().slice(0,10);
      let opt = document.createElement("option");
      opt.value = val;
      opt.textContent = val;
      select.appendChild(opt);
    }
  }
}

/* 出荷 */
function row(company,place){
  return `
  <div class="row">
    <div>${company}<br>${place}</div>
    <div class="toggle">
      <button class="on">あり</button>
      <button class="off">なし</button>
    </div>
  </div>
  `;
}

/* 👍 */
async function toggleLike(id, likes, liked){
  await client.from("shipments").update({
    likes: liked?likes-1:likes+1,
    liked: !liked
  }).eq("id", id);

  render();
}

/* 追加 */
async function add(){

  const date = document.getElementById("dateSelect").value;

  await client.from("shipments").insert({
    date: date,
    title: document.getElementById("title").value,
    content: document.getElementById("content").value,
    status: document.getElementById("status").value,
    likes:0,
    liked:false
  });

  alert("追加した！");
  render();
}

/* 初期 */
currentDate = new Date().toISOString().slice(0,10);
loadDates();
setTab("notice");

</script>

</body>
</html>
