<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>出荷管理</title>

<style>
body{
  margin:0;
  background:#e9e4db;
  font-family:sans-serif;
  color:#111;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1{
  font-size:56px;
  margin:10px 0 30px;
  font-weight:900;
}

.tabs{
  display:flex;
  gap:16px;
  margin-bottom:40px;
}

.tab{
  flex:1;
  border:none;
  border-radius:22px;
  padding:18px 10px;
  font-size:20px;
  font-weight:bold;
  background:#e3ddd5;
  color:#1473ff;
}

.tab.active{
  background:#d39b52;
  color:white;
}

.notice{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  line-height:1.7;
  margin-bottom:25px;
}

.ship-date{
  text-align:center;
  font-size:56px;
  font-weight:900;
  margin-bottom:35px;
}

.ship-date span{
  color:#1473ff;
}

.card{
  background:white;
  border-radius:34px;
  padding:20px;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:35px 10px;
  border-bottom:1px solid #ddd2c5;
}

.row:last-child{
  border-bottom:none;
}

.place{
  font-size:28px;
  font-weight:900;
}

.btns{
  display:flex;
  gap:14px;
}

.toggle{
  border:none;
  border-radius:22px;
  padding:16px 28px;
  font-size:22px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.off{
  background:#e7e0d8;
  color:#111;
}

.on{
  background:#d39b52;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<h1>出荷管理</h1>

<div class="tabs">
  <button class="tab">注意事項</button>
  <button class="tab">出荷場所</button>
  <button class="tab active">当日送り状貼り残し</button>
  <button class="tab">管理</button>
</div>

<div class="notice">
  このページは翌日の出荷日を表示しています<br>
  <span id="todayText"></span>
</div>

<div class="ship-date">
  出荷日：<span id="shipDateText"></span>
</div>

<div class="card" id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  set,
  onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTv3sXmIwGmg5iVBRjfwwqA6djwYO2CJQ",
  authDomain: "shipment-app-b45dd.firebaseapp.com",
  databaseURL: "https://shipment-app-b45dd-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "shipment-app-b45dd",
  storageBucket: "shipment-app-b45dd.firebasestorage.app",
  messagingSenderId: "995150359566",
  appId: "1:995150359566:web:01e3ef86eec27ea66ae05f"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const places = [
  "2F（家具）",
  "2F（テーブル）",
  "梱包場",
  "MJ倉庫"
];

const week = ["日","月","火","水","木","金","土"];

const baseDate = new Date();

function getNextShipDate() {

  const d = new Date(baseDate);

  do{
    d.setDate(d.getDate() + 1);
  }while(
    d.getDay() === 0 ||
    d.getDay() === 6
  );

  return d;
}

const shipDate = getNextShipDate();

const month = shipDate.getMonth() + 1;
const day = shipDate.getDate();
const weekText = week[shipDate.getDay()];

const todayMonth = baseDate.getMonth() + 1;
const todayDay = baseDate.getDate();

document.getElementById("todayText").innerHTML =
`（本日：${todayMonth}/${todayDay} → 出荷日：<span style="color:#1473ff">${month}/${day}</span>）`;

document.getElementById("shipDateText").innerHTML =
`${month}/${day}（${weekText}）`;

const list = document.getElementById("list");

function createRow(name, value){

  const row = document.createElement("div");
  row.className = "row";

  row.innerHTML = `
    <div class="place">${name}</div>

    <div class="btns">
      <button class="toggle ${value === "あり" ? "on":"off"}">
        あり
      </button>

      <button class="toggle ${value === "なし" ? "on":"off"}">
        なし
      </button>
    </div>
  `;

  const buttons = row.querySelectorAll(".toggle");

  buttons[0].onclick = () => {
    saveData(name,"あり");
  };

  buttons[1].onclick = () => {
    saveData(name,"なし");
  };

  return row;
}

function render(data){

  list.innerHTML = "";

  places.forEach(place => {

    const value = data?.[place] || "なし";

    list.appendChild(
      createRow(place,value)
    );

  });

}

function saveData(place,value){

  set(
    ref(db,`shipment/${month}-${day}/${place}`),
    value
  );

}

onValue(
  ref(db,`shipment/${month}-${day}`),
  snapshot => {

    render(snapshot.val());

  }
);

</script>

</body>
</html>
