<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>出荷管理</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:#f4ede4;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  color:#111;
}

.app{
  max-width:430px;
  margin:auto;
  padding:22px 20px 40px;
}

h1{
  font-size:30px;
  font-weight:900;
  margin:18px 0 24px;
}

.top-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:14px;
}

.top-tabs button,
.week-nav button,
.dates button{
  border:none;
  background:#e6ddd4;
  font-weight:900;
}

.top-tabs button{
  height:54px;
  border-radius:20px;
  font-size:14px;
  white-space:nowrap;
}

.active{
  background:#be8b55!important;
  color:#fff!important;
}

.week-nav{
  display:grid;
  grid-template-columns:1fr .7fr 1fr;
  gap:10px;
  margin-bottom:12px;
}

.week-nav button{
  height:48px;
  border-radius:18px;
  font-size:15px;
}

.dates{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  margin-bottom:16px;
}

.dates button{
  height:48px;
  border-radius:18px;
  font-size:16px;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:10px 16px;
}

.ship-row{
  padding:14px 0 12px;
  border-bottom:1px solid #efe5dc;
}

.ship-row:last-child{
  border-bottom:none;
}

.ship-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.ship-left{
  display:flex;
  flex-direction:column;
}

.ship-company{
  font-size:22px;
  font-weight:900;
  line-height:1.1;
}

.ship-place{
  font-size:16px;
  font-weight:800;
  margin-top:4px;
}

.ship-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
}

.ship-status{
  display:flex;
  gap:10px;
}

.ship-status button{
  min-width:62px;
  height:38px;
  border:none;
  border-radius:999px;
  background:#e6ddd4;
  font-size:16px;
  font-weight:900;
  color:#111;
}

.photo-links{
  display:flex;
  gap:14px;
  margin-top:6px;
}

.photo-links button,
.photo-links label{
  border:none;
  background:none;
  padding:0;
  margin:0;
  font-size:11px;
  font-weight:700;
  color:#8b5d33;
  text-decoration:underline;
}

.photo-links input{
  display:none;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal img{
  max-width:90%;
  max-height:80%;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="app">

<h1>出荷管理</h1>

<div class="top-tabs">
  <button onclick="selectTab(this)">注意事項</button>
  <button class="active" onclick="selectTab(this)">出荷予定</button>
  <button onclick="selectTab(this)">当日出荷</button>
  <button onclick="selectTab(this)">管理</button>
</div>

<div class="week-nav">
  <button onclick="alert('前週')">前週</button>
  <button onclick="alert('日付選択')">🗓️</button>
  <button onclick="alert('次週')">次週</button>
</div>

<div class="dates">
  <button class="active" onclick="selectDate(this)">5/4</button>
  <button onclick="selectDate(this)">5/5</button>
  <button onclick="selectDate(this)">5/6</button>
  <button onclick="selectDate(this)">5/7</button>
  <button onclick="selectDate(this)">5/8</button>
</div>

<div class="card">

  <div class="ship-row">
    <div class="ship-top">
      <div class="ship-left">
        <div class="ship-company">佐川急便</div>
        <div class="ship-place">2F</div>
      </div>
      <div class="ship-right">
        <div class="ship-status">
          <button class="active" onclick="toggleStatus(this)">あり</button>
          <button onclick="toggleStatus(this)">なし</button>
        </div>
        <div class="photo-links">
          <button onclick="showPhoto('sagawa')">写真表示</button>
          <label>添付<input type="file" accept="image/*" onchange="savePhoto(event,'sagawa')"></label>
        </div>
      </div>
    </div>
  </div>

  <div class="ship-row">
    <div class="ship-top">
      <div class="ship-left">
        <div class="ship-company">福山通運</div>
        <div class="ship-place">2F</div>
      </div>
      <div class="ship-right">
        <div class="ship-status">
          <button class="active" onclick="toggleStatus(this)">あり</button>
          <button onclick="toggleStatus(this)">なし</button>
        </div>
        <div class="photo-links">
          <button onclick="showPhoto('fukuyama')">写真表示</button>
          <label>添付<input type="file" accept="image/*" onchange="savePhoto(event,'fukuyama')"></label>
        </div>
      </div>
    </div>
  </div>

  <div class="ship-row">
    <div class="ship-top">
      <div class="ship-left">
        <div class="ship-place">梱包場</div>
      </div>
      <div class="ship-right">
        <div class="ship-status">
          <button onclick="toggleStatus(this)">あり</button>
          <button class="active" onclick="toggleStatus(this)">なし</button>
        </div>
        <div class="photo-links">
          <button onclick="showPhoto('packing')">写真表示</button>
          <label>添付<input type="file" accept="image/*" onchange="savePhoto(event,'packing')"></label>
        </div>
      </div>
    </div>
  </div>

  <div class="ship-row">
    <div class="ship-top">
      <div class="ship-left">
        <div class="ship-place">MJ倉庫</div>
      </div>
      <div class="ship-right">
        <div class="ship-status">
          <button onclick="toggleStatus(this)">あり</button>
          <button class="active" onclick="toggleStatus(this)">なし</button>
        </div>
        <div class="photo-links">
          <button onclick="showPhoto('mj')">写真表示</button>
          <label>添付<input type="file" accept="image/*" onchange="savePhoto(event,'mj')"></label>
        </div>
      </div>
    </div>
  </div>

</div>

</div>

<div class="modal" id="modal" onclick="closePhoto()">
  <img id="modalImg">
</div>

<script>
const photos = {};

function selectTab(button){
  document.querySelectorAll(".top-tabs button").forEach(btn=>{
    btn.classList.remove("active");
  });
  button.classList.add("active");
}

function selectDate(button){
  document.querySelectorAll(".dates button").forEach(btn=>{
    btn.classList.remove("active");
  });
  button.classList.add("active");
}

function toggleStatus(button){
  const group = button.parentElement;
  group.querySelectorAll("button").forEach(btn=>{
    btn.classList.remove("active");
  });
  button.classList.add("active");
}

function savePhoto(event,key){
  const file = event.target.files[0];
  if(!file) return;

  photos[key] = URL.createObjectURL(file);
  alert("写真を添付しました");
}

function showPhoto(key){
  if(!photos[key]){
    alert("写真がありません");
    return;
  }

  document.getElementById("modalImg").src = photos[key];
  document.getElementById("modal").style.display = "flex";
}

function closePhoto(){
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
