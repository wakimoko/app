<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>出荷管理</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:#f3eee6;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  color:#111;
  font-size:14px;
}

.container{
  max-width:430px;
  margin:auto;
  padding:10px 16px 80px;
}

h1{
  font-size:34px;
  font-weight:900;
  margin:8px 0 18px;
}

button{
  border:none;
  cursor:pointer;
  font-family:inherit;
}

.top-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:12px;
}

.top-tabs button{
  height:44px;
  border-radius:16px;
  background:#e6ddd4;
  color:#007aff;
  font-size:12px;
  font-weight:900;
}

.active{
  background:#c99657!important;
  color:#fff!important;
}

.week-row{
  display:grid;
  grid-template-columns:1fr .7fr 1fr;
  gap:8px;
  margin-bottom:10px;
}

.week-row button{
  height:40px;
  border-radius:18px;
  background:#e6ddd4;
  color:#007aff;
  font-size:14px;
  font-weight:900;
}

.date-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:7px;
  margin-bottom:12px;
}

.date-row button{
  height:40px;
  border-radius:16px;
  background:#e6ddd4;
  color:#007aff;
  font-size:14px;
  font-weight:900;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:16px;
  position:relative;
  min-height:160px;
}

.notice-title{
  font-size:20px;
  font-weight:900;
  margin-bottom:14px;
}

.notice-name{
  font-size:15px;
  margin-bottom:10px;
}

.notice-body{
  font-size:14px;
  line-height:1.5;
  white-space:pre-wrap;
}

.card-actions{
  position:absolute;
  right:14px;
  bottom:14px;
  display:flex;
  gap:8px;
}

.icon-btn{
  width:34px;
  height:34px;
  border-radius:50%;
  font-size:15px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.edit-btn{background:#efe7dc}
.delete-btn{background:#f8dede}

.form-input,
.form-textarea{
  width:100%;
  border:2px solid #e3ddd5;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  font-size:15px;
}

.form-input{height:50px}
.form-textarea{height:120px;resize:none}

.save-btn{
  width:100%;
  height:46px;
  border-radius:16px;
  background:#c99657;
  color:#fff;
  font-size:16px;
  font-weight:900;
}

/* 出荷予定 */

.ship-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
}

.ship-name{
  font-size:24px;
  font-weight:900;
  line-height:1.1;
}

.ship-name.small{
  font-size:18px;
}

.ship-floor{
  font-size:18px;
  font-weight:900;
  margin-top:6px;
}

.ship-right{
  text-align:right;
}

.ship-status{
  display:flex;
  gap:10px;
  margin-bottom:8px;
}

.ship-status button{
  width:66px;
  height:50px;
  border-radius:22px;
  font-size:18px;
  font-weight:900;
  background:#e6ddd4;
  color:#111;
  writing-mode:horizontal-tb;
  text-orientation:mixed;
  white-space:nowrap;
  display:flex;
  align-items:center;
  justify-content:center;
}

.ship-links{
  display:flex;
  justify-content:flex-end;
  gap:14px;
  font-size:13px;
  font-weight:900;
  color:#8b5d33;
  text-decoration:underline;
}

.divider{
  height:1px;
  background:#e2d7ca;
  margin:16px 0;
}

/* カレンダー */

.calendar-bg{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.25);
  z-index:1000;
}

.calendar-popup{
  display:none;
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:340px;
  background:#f3eee6;
  border-radius:26px;
  padding:18px;
  z-index:1001;
  box-shadow:0 12px 35px rgba(0,0,0,.25);
}

.calendar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.calendar-title{
  font-size:16px;
  font-weight:900;
}

.calendar-header button{
  width:34px;
  height:34px;
  border-radius:50%;
  background:#c99657;
  color:#fff;
  font-size:20px;
  font-weight:900;
}

.calendar-week,
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.calendar-week{margin-bottom:6px}

.calendar-week div{
  text-align:center;
  font-size:12px;
  font-weight:900;
  color:#8b7b6b;
}

.calendar-day,
.calendar-empty{
  height:38px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:800;
}

.calendar-day{background:#e6ddd4}
.calendar-day.active{background:#c99657;color:#fff}

.calendar-close{
  margin-top:14px;
  width:100%;
  height:40px;
  border-radius:14px;
  background:#e6ddd4;
  font-weight:900;
}
</style>
</head>

<body>

<div class="container">

<h1>出荷管理</h1>

<div class="top-tabs">
  <button id="noticeBtn" class="active">注意事項</button>
  <button id="shipBtn">出荷予定</button>
  <button id="todayBtn">当日出荷</button>
  <button id="manageBtn">管理</button>
</div>

<div id="scheduleArea">
  <div class="week-row">
    <button id="prevWeek">前週</button>
    <button id="calendarBtn">🗓</button>
    <button id="nextWeek">次週</button>
  </div>

  <div class="date-row" id="dateRow"></div>
</div>

<div id="mainArea"></div>

</div>

<div class="calendar-bg" id="calendarBg"></div>

<div class="calendar-popup" id="calendarPopup">
  <div class="calendar-header">
    <button id="calPrev">‹</button>
    <div class="calendar-title" id="calendarTitle"></div>
    <button id="calNext">›</button>
  </div>

  <div class="calendar-week">
    <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
  </div>

  <div class="calendar-grid" id="calendarGrid"></div>

  <button class="calendar-close" id="calendarClose">閉じる</button>
</div>

<script>
let weekStart = new Date(2026,4,4);
let selectedDate = new Date(2026,4,5);
let calendarMonth = new Date(2026,4,1);
let calendarTarget = "week";

let notices = JSON.parse(localStorage.getItem("noticesByDate") || "{}");
let shipData = JSON.parse(localStorage.getItem("shipData") || "{}");

function saveAll(){
  localStorage.setItem("noticesByDate", JSON.stringify(notices));
}

function saveShipAll(){
  localStorage.setItem("shipData", JSON.stringify(shipData));
}

function setActiveTab(btn){
  document.querySelectorAll(".top-tabs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function formatDate(date){
  return (date.getMonth()+1) + "/" + date.getDate();
}

function sameDate(a,b){
  return a && b &&
    a.getFullYear()===b.getFullYear() &&
    a.getMonth()===b.getMonth() &&
    a.getDate()===b.getDate();
}

function getMonday(date){
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
  return d;
}

function refreshCurrentTab(){
  if(document.getElementById("noticeBtn").classList.contains("active")) renderNotice();
  if(document.getElementById("shipBtn").classList.contains("active")) renderShip();
  if(document.getElementById("todayBtn").classList.contains("active")) renderToday();
}

function renderDates(){
  const row = document.getElementById("dateRow");
  row.innerHTML = "";

  for(let i=0;i<5;i++){
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate()+i);

    const btn = document.createElement("button");
    btn.textContent = formatDate(d);

    if(sameDate(d, selectedDate)) btn.classList.add("active");

    btn.onclick = ()=>{
      selectedDate = new Date(d);
      renderDates();
      refreshCurrentTab();
    };

    row.appendChild(btn);
  }
}

/* 注意事項 */

function renderNotice(){
  setActiveTab(document.getElementById("noticeBtn"));
  document.getElementById("scheduleArea").style.display = "block";

  const key = formatDate(selectedDate);
  const item = notices[key];

  if(!item){
    document.getElementById("mainArea").innerHTML = `
      <div class="card">
        <div class="notice-title">${key}</div>
        <div class="notice-name">注意事項なし</div>
        <div class="notice-body">この日の注意事項はありません</div>
        <div class="card-actions">
          <button class="icon-btn edit-btn" onclick="renderManage()">✏️</button>
        </div>
      </div>
    `;
    return;
  }

  document.getElementById("mainArea").innerHTML = `
    <div class="card">
      <div class="notice-title">${key}</div>
      <div class="notice-name">${item.title}</div>
      <div class="notice-body">${item.body}</div>

      <div class="card-actions">
        <button class="icon-btn edit-btn" onclick="renderManage()">✏️</button>
        <button class="icon-btn delete-btn" onclick="deleteNotice()">🗑️</button>
      </div>
    </div>
  `;
}

/* 管理 */

function renderManage(){
  setActiveTab(document.getElementById("manageBtn"));
  document.getElementById("scheduleArea").style.display = "none";

  const key = formatDate(selectedDate);
  const item = notices[key] || {title:"", body:""};

  document.getElementById("mainArea").innerHTML = `
    <div class="card">
      <input class="form-input" id="dateInput" placeholder="日付選択" readonly value="${key}">
      <input class="form-input" id="titleInput" placeholder="タイトル" value="${item.title}">
      <textarea class="form-textarea" id="bodyInput" placeholder="内容">${item.body}</textarea>
      <button class="save-btn" onclick="saveNotice()">保存</button>
    </div>
  `;

  document.getElementById("dateInput").onclick = ()=>{
    openCalendar("input");
  };
}

function saveNotice(){
  const key = document.getElementById("dateInput").value;

  notices[key] = {
    title: document.getElementById("titleInput").value || "",
    body: document.getElementById("bodyInput").value || ""
  };

  saveAll();

  selectedDate = parseDateKey(key);
  weekStart = getMonday(selectedDate);
  renderDates();
  renderNotice();
}

function deleteNotice(){
  const key = formatDate(selectedDate);

  if(confirm("削除しますか？")){
    delete notices[key];
    saveAll();
    renderNotice();
  }
}

function parseDateKey(key){
  const [m,d] = key.split("/").map(Number);
  return new Date(selectedDate.getFullYear(), m-1, d);
}

/* 出荷予定・当日出荷 */

function shipKey(type){
  return type + "_" + formatDate(selectedDate);
}

function getShipStatus(type,name){
  const key = shipKey(type);

  if(!shipData[key]){
    shipData[key] = {};
  }

  if(!shipData[key][name]){
    shipData[key][name] = "なし";
  }

  return shipData[key][name];
}

function saveShipStatus(type,name,status){
  const key = shipKey(type);

  if(!shipData[key]){
    shipData[key] = {};
  }

  shipData[key][name] = status;
  saveShipAll();
}

function renderShip(){
  setActiveTab(document.getElementById("shipBtn"));
  document.getElementById("scheduleArea").style.display = "block";

  document.getElementById("mainArea").innerHTML = `
    <div class="card">
      ${shipmentRow("ship","佐川急便","2F")}
      <div class="divider"></div>
      ${shipmentRow("ship","福山通運","2F")}
      <div class="divider"></div>
      ${shipmentRow("ship","梱包場","")}
      <div class="divider"></div>
      ${shipmentRow("ship","MJ倉庫","")}
    </div>
  `;
}

function renderToday(){
  setActiveTab(document.getElementById("todayBtn"));
  document.getElementById("scheduleArea").style.display = "block";

  document.getElementById("mainArea").innerHTML = `
    <div class="card">
      ${shipmentRow("today","佐川急便","2F")}
      <div class="divider"></div>
      ${shipmentRow("today","福山通運","2F")}
      <div class="divider"></div>
      ${shipmentRow("today","梱包場","")}
      <div class="divider"></div>
      ${shipmentRow("today","MJ倉庫","")}
    </div>
  `;
}

function shipmentRow(type,name,floor){
  const status = getShipStatus(type,name);

  const smallClass =
    name === "梱包場" || name === "MJ倉庫"
      ? "small"
      : "";

  return `
    <div class="ship-row">
      <div>
        <div class="ship-name ${smallClass}">${name}</div>
        ${floor ? `<div class="ship-floor">${floor}</div>` : ""}
      </div>

      <div class="ship-right">
        <div class="ship-status" data-type="${type}" data-name="${name}">
          <button class="${status === "あり" ? "active" : ""}" onclick="toggleShip(this,'あり')">あり</button>
          <button class="${status === "なし" ? "active" : ""}" onclick="toggleShip(this,'なし')">なし</button>
        </div>

        <div class="ship-links">
          <span onclick="alert('写真表示')">写真表示</span>
          <span onclick="alert('添付')">添付</span>
        </div>
      </div>
    </div>
  `;
}

function toggleShip(btn,status){
  const group = btn.parentElement;
  const type = group.dataset.type;
  const name = group.dataset.name;

  group.querySelectorAll("button").forEach(b=>{
    b.classList.remove("active");
  });

  btn.classList.add("active");

  saveShipStatus(type,name,status);
}

/* タブ */

document.getElementById("noticeBtn").onclick = renderNotice;
document.getElementById("shipBtn").onclick = renderShip;
document.getElementById("todayBtn").onclick = renderToday;
document.getElementById("manageBtn").onclick = renderManage;

/* 週移動 */

document.getElementById("prevWeek").onclick = ()=>{
  weekStart.setDate(weekStart.getDate()-7);
  selectedDate = new Date(weekStart);
  renderDates();
  refreshCurrentTab();
};

document.getElementById("nextWeek").onclick = ()=>{
  weekStart.setDate(weekStart.getDate()+7);
  selectedDate = new Date(weekStart);
  renderDates();
  refreshCurrentTab();
};

/* カレンダー */

function openCalendar(target="week"){
  calendarTarget = target;
  document.getElementById("calendarBg").style.display = "block";
  document.getElementById("calendarPopup").style.display = "block";
  calendarMonth = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
  renderCalendar();
}

function closeCalendar(){
  document.getElementById("calendarBg").style.display = "none";
  document.getElementById("calendarPopup").style.display = "none";
}

function renderCalendar(){
  const grid = document.getElementById("calendarGrid");
  const title = document.getElementById("calendarTitle");
  grid.innerHTML = "";

  const year = calendarMonth.getFullYear();
  const month = calendarMonth.getMonth();

  title.textContent = `${year}年 ${month+1}月`;

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month+1, 0).getDate();

  for(let i=0;i<firstDay;i++){
    const empty = document.createElement("div");
    empty.className = "calendar-empty";
    grid.appendChild(empty);
  }

  for(let day=1;day<=lastDate;day++){
    const d = new Date(year, month, day);
    const cell = document.createElement("div");

    cell.className = "calendar-day";
    cell.textContent = day;

    if(sameDate(d, selectedDate)) cell.classList.add("active");

    cell.onclick = ()=>{
      selectedDate = new Date(d);
      weekStart = getMonday(selectedDate);

      if(calendarTarget === "input"){
        document.getElementById("dateInput").value = formatDate(selectedDate);
      }else{
        renderDates();
        refreshCurrentTab();
      }

      closeCalendar();
    };

    grid.appendChild(cell);
  }
}

document.getElementById("calendarBtn").onclick = ()=>openCalendar("week");
document.getElementById("calendarBg").onclick = closeCalendar;
document.getElementById("calendarClose").onclick = closeCalendar;

document.getElementById("calPrev").onclick = ()=>{
  calendarMonth.setMonth(calendarMonth.getMonth()-1);
  renderCalendar();
};

document.getElementById("calNext").onclick = ()=>{
  calendarMonth.setMonth(calendarMonth.getMonth()+1);
  renderCalendar();
};

renderDates();
renderNotice();
</script>

</body>
</html>
