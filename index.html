<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>出荷管理</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:#f3eee6;
  font-family:"Hiragino Maru Gothic ProN","Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  -webkit-font-smoothing:antialiased;
  text-rendering:geometricPrecision;
  color:#111;
  overflow-x:hidden;
}

.container{
  max-width:430px;
  margin:auto;
  padding:4px 10px 24px;
  transform:scale(.90);
  transform-origin:top center;
}

h1{
  font-size:32px;
  font-weight:900;
  margin:6px 0 16px;
}

button{
  border:none;
  cursor:pointer;
  font-family:inherit;
}

.top-tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:10px;
}

.top-tabs button{
  height:42px;
  border-radius:15px;
  background:#e6ddd4;
  color:#111;
  font-size:12px;
  font-weight:900;
}

#todayBtn{
  line-height:1.2;
  font-size:11px;
}

.active{
  background:#c99657!important;
  color:#fff!important;
}

.week-row{
  display:grid;
  grid-template-columns:1fr .7fr 1fr;
  gap:8px;
  margin-bottom:8px;
}

.week-row button{
  height:38px;
  border-radius:14px;
  background:#e6ddd4;
  color:#111;
  font-size:12px;
  font-weight:900;
}

.date-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-bottom:10px;
}

.date-row button{
  height:38px;
  border-radius:14px;
  background:#e6ddd4;
  color:#111;
  font-size:14px;
  font-weight:900;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:14px;
  position:relative;
  min-height:108px;
  margin-bottom:10px;
}

.group-title{
  font-size:19px;
  font-weight:900;
  margin-bottom:8px;
}

.place-row{
  display:grid;
  grid-template-columns:1fr 118px;
  align-items:center;
  gap:8px;
  margin:7px 0;
}

.place-name{
  font-size:14px;
  font-weight:900;
}

.place-status,
.ship-status{
  display:flex;
  justify-content:flex-end;
  gap:7px;
}

.place-status button{
  width:52px;
  height:32px;
  border-radius:14px;
  background:#e6ddd4;
  color:#111;
  font-size:12px;
  font-weight:900;
}

.ship-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:14px 0;
}

.ship-name{
  font-size:19px;
  font-weight:900;
}

.ship-right{
  width:150px;
  margin-right:8px;
}

.ship-status button{
  width:56px;
  height:38px;
  border-radius:17px;
  background:#e6ddd4;
  color:#111;
  font-size:13px;
  font-weight:900;
}

.locked button{
  pointer-events:none;
  opacity:.88;
}

.divider{
  height:1px;
  background:#e2d7ca;
  margin:10px 0;
}

.today-info{
  text-align:center;
  font-size:14px;
  font-weight:900;
  line-height:1.7;
  margin:22px 0 16px;
  color:#3b332a;
}

.today-info .blue,
.today-date-title .blue{
  color:#007aff;
}

.today-date-title{
  text-align:center;
  font-size:20px;
  font-weight:900;
  margin-bottom:16px;
}

.notice-date{
  font-size:19px;
  font-weight:900;
  margin-bottom:10px;
  padding-right:90px;
}

.notice-name{
  font-size:15px;
  font-weight:900;
  margin-bottom:8px;
  padding-right:90px;
}

.notice-body{
  font-size:13px;
  line-height:1.5;
  white-space:pre-wrap;
  padding-right:90px;
}

.card-actions{
  position:absolute;
  right:18px;
  bottom:18px;
  display:flex;
  align-items:center;
  gap:8px;
  z-index:10;
}

.icon-btn{
  width:34px;
  height:34px;
  border-radius:50%;
  font-size:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.edit-btn{background:#efe7dc}
.delete-btn{background:#f8dede}

.add-btn,
.save-btn,
.mode-btn,
.line-btn{
  width:100%;
  height:44px;
  border-radius:15px;
  font-size:15px;
  font-weight:900;
  margin-top:8px;
}

.add-btn,
.save-btn,
.mode-btn{
  background:#c99657;
  color:#fff;
}

.line-btn{
  background:#06c755;
  color:#fff;
}

.cancel-btn{
  width:100%;
  height:40px;
  border-radius:14px;
  background:#e6ddd4;
  color:#111;
  font-size:14px;
  font-weight:900;
  margin-top:8px;
}

.meta{
  text-align:center;
  font-size:12px;
  font-weight:900;
  color:#7b6b5e;
  margin-top:12px;
}

.form-input,
.form-textarea{
  width:100%;
  border:2px solid #e3ddd5;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  font-size:16px;
  font-family:inherit;
}

.form-input{
  height:46px;
}

.form-textarea{
  height:100px;
  resize:none;
}

input,
textarea,
select{
  font-size:16px!important;
}
  .calendar-bg{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.25);
  z-index:1000;
}

.calendar-popup{
  display:none;
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:340px;
  background:#f3eee6;
  border-radius:26px;
  padding:18px;
  z-index:1001;
}

.calendar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.calendar-title{
  font-size:16px;
  font-weight:900;
}

.calendar-header button{
  width:34px;
  height:34px;
  border-radius:50%;
  background:#c99657;
  color:#fff;
  font-size:20px;
  font-weight:900;
}

.calendar-week,
.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.calendar-week{
  margin-bottom:6px;
}

.calendar-week div{
  text-align:center;
  font-size:12px;
  font-weight:900;
  color:#8b7b6b;
}

.calendar-day,
.calendar-empty{
  height:38px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:800;
}

.calendar-day{
  background:#e6ddd4;
}

.calendar-day.active{
  background:#c99657;
  color:#fff;
}

.calendar-close{
  margin-top:14px;
  width:100%;
  height:40px;
  border-radius:14px;
  background:#e6ddd4;
  font-weight:900;
}
</style>
</head>

<body>

<div class="container">

<h1>出荷管理</h1>

<div class="top-tabs">
  <button id="noticeBtn">注意事項</button>
  <button id="shipBtn" class="active">出荷場所</button>
  <button id="todayBtn">当日送り状<br>貼り残し</button>
</div>

<div id="scheduleArea">
  <div class="week-row">
    <button id="prevWeek">前週</button>
    <button id="calendarBtn">🗓</button>
    <button id="nextWeek">次週</button>
  </div>

  <div class="date-row" id="dateRow"></div>
</div>

<div id="mainArea"></div>

</div>

<div class="calendar-bg" id="calendarBg"></div>

<div class="calendar-popup" id="calendarPopup">

  <div class="calendar-header">
    <button id="calPrev">‹</button>
    <div class="calendar-title" id="calendarTitle"></div>
    <button id="calNext">›</button>
  </div>

  <div class="calendar-week">
    <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
  </div>

  <div class="calendar-grid" id="calendarGrid"></div>

  <button class="calendar-close" id="calendarClose">
    閉じる
  </button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
/* 前回送ったJS完成版をここにそのまま続けて貼る */
</script>

</body>
</html>
