<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>出荷管理</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:#f3eee6;
  font-family:"Hiragino Maru Gothic ProN","Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  -webkit-font-smoothing:antialiased;
  text-rendering:geometricPrecision;
  color:#111;
  overflow-x:hidden;
}

.container{
  max-width:430px;
  margin:auto;
  padding:8px 12px 40px;
  transform:scale(.94);
  transform-origin:top center;
}

h1{font-size:32px;font-weight:900;margin:6px 0 16px}
button{border:none;cursor:pointer;font-family:inherit}

.top-tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:10px;
}

.top-tabs button{
  height:42px;
  border-radius:15px;
  background:#e6ddd4;
  color:#111;
  font-size:12px;
  font-weight:900;
}

#todayBtn{line-height:1.2;font-size:11px}
.active{background:#c99657!important;color:#fff!important}

.week-row{
  display:grid;
  grid-template-columns:1fr .7fr 1fr;
  gap:8px;
  margin-bottom:8px;
}

.week-row button{
  height:38px;
  border-radius:14px;
  background:#e6ddd4;
  color:#111;
  font-size:12px;
  font-weight:900;
}

.date-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-bottom:10px;
}

.date-row button{
  height:38px;
  border-radius:14px;
  background:#e6ddd4;
  color:#111;
  font-size:14px;
  font-weight:900;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:14px;
  position:relative;
  min-height:108px;
  margin-bottom:10px;
}

.group-title{font-size:19px;font-weight:900;margin-bottom:8px}

.place-row{
  display:grid;
  grid-template-columns:1fr 118px;
  align-items:center;
  gap:8px;
  margin:7px 0;
}

.place-name{font-size:14px;font-weight:900}

.place-status,.ship-status{
  display:flex;
  justify-content:flex-end;
  gap:7px;
}

.place-status button{
  width:52px;
  height:32px;
  border-radius:14px;
  background:#e6ddd4;
  color:#111;
  font-size:12px;
  font-weight:900;
}

.ship-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:14px 0;
}

.ship-name{font-size:19px;font-weight:900}
.ship-right{width:150px;margin-right:8px}

.ship-status button{
  width:56px;
  height:38px;
  border-radius:17px;
  background:#e6ddd4;
  color:#111;
  font-size:13px;
  font-weight:900;
}

.locked button{
  pointer-events:none;
  opacity:.88;
}

.divider{
  height:1px;
  background:#e2d7ca;
  margin:10px 0;
}

.today-info{
  text-align:center;
  font-size:14px;
  font-weight:900;
  line-height:1.7;
  margin:22px 0 16px;
  color:#3b332a;
}

.today-info .blue,.today-date-title .blue{color:#007aff}

.today-date-title{
  text-align:center;
  font-size:20px;
  font-weight:900;
  margin-bottom:16px;
}

.notice-date{
  font-size:19px;
  font-weight:900;
  margin-bottom:10px;
  padding-right:90px;
}

.notice-name{
  font-size:15px;
  font-weight:900;
  margin-bottom:8px;
  padding-right:90px;
}

.notice-body{
  font-size:13px;
  line-height:1.5;
  white-space:pre-wrap;
  padding-right:90px;
}

.card-actions{
  position:absolute;
  right:18px;
  bottom:18px;
  display:flex;
  align-items:center;
  gap:8px;
  z-index:10;
}

.icon-btn{
  width:34px;
  height:34px;
  border-radius:50%;
  font-size:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.edit-btn{background:#efe7dc}
.delete-btn{background:#f8dede}

.add-btn,.save-btn,.mode-btn,.line-btn{
  width:100%;
  height:44px;
  border-radius:15px;
  font-size:15px;
  font-weight:900;
  margin-top:8px;
}

.add-btn,.save-btn,.mode-btn{
  background:#c99657;
  color:#fff;
}

.line-btn{
  background:#06c755;
  color:#fff;
}

.cancel-btn{
  width:100%;
  height:40px;
  border-radius:14px;
  background:#e6ddd4;
  color:#111;
  font-size:14px;
  font-weight:900;
  margin-top:8px;
}

.meta{
  text-align:center;
  font-size:12px;
  font-weight:900;
  color:#7b6b5e;
  margin-top:12px;
}

.form-input,.form-textarea{
  width:100%;
  border:2px solid #e3ddd5;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  font-size:15px;
  font-family:inherit;
}

.form-input{height:48px}
.form-textarea{height:115px;resize:none}

.calendar-bg{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.25);
  z-index:1000;
}

.calendar-popup{
  display:none;
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:340px;
  background:#f3eee6;
  border-radius:26px;
  padding:18px;
  z-index:1001;
}

.calendar-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.calendar-title{font-size:16px;font-weight:900}

.calendar-header button{
  width:34px;
  height:34px;
  border-radius:50%;
  background:#c99657;
  color:#fff;
  font-size:20px;
  font-weight:900;
}

.calendar-week,.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.calendar-week{margin-bottom:6px}

.calendar-week div{
  text-align:center;
  font-size:12px;
  font-weight:900;
  color:#8b7b6b;
}

.calendar-day,.calendar-empty{
  height:38px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:800;
}

.calendar-day{background:#e6ddd4}
.calendar-day.active{background:#c99657;color:#fff}

.calendar-close{
  margin-top:14px;
  width:100%;
  height:40px;
  border-radius:14px;
  background:#e6ddd4;
  font-weight:900;
}
</style>
</head>

<body>

<div class="container">
  <h1>出荷管理</h1>

  <div class="top-tabs">
    <button id="noticeBtn">注意事項</button>
    <button id="shipBtn" class="active">出荷場所</button>
    <button id="todayBtn">当日送り状<br>貼り残し</button>
  </div>

  <div id="scheduleArea">
    <div class="week-row">
      <button id="prevWeek">前週</button>
      <button id="calendarBtn">🗓</button>
      <button id="nextWeek">次週</button>
    </div>
    <div class="date-row" id="dateRow"></div>
  </div>

  <div id="mainArea"></div>
</div>

<div class="calendar-bg" id="calendarBg"></div>

<div class="calendar-popup" id="calendarPopup">
  <div class="calendar-header">
    <button id="calPrev">‹</button>
    <div class="calendar-title" id="calendarTitle"></div>
    <button id="calNext">›</button>
  </div>
  <div class="calendar-week">
    <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
  </div>
  <div class="calendar-grid" id="calendarGrid"></div>
  <button class="calendar-close" id="calendarClose">閉じる</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBTv3sXmIwGmg5iVBRjfwwqA6djwYO2CJQ",
  authDomain: "shipment-app-b45dd.firebaseapp.com",
  databaseURL: "https://shipment-app-b45dd-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "shipment-app-b45dd",
  storageBucket: "shipment-app-b45dd.firebasestorage.app",
  messagingSenderId: "995150359566",
  appId: "1:995150359566:web:01e3ef86eec27ea66ae05f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let weekStart = getMonday(new Date());
let selectedDate = new Date();
let baseDate = new Date();
let calendarMonth = new Date();
let calendarTarget = "week";
let editingNoticeId = null;

let shipData = {};
let notices = {};
let metaData = {};

let shipEditMode = false;
let todayEditMode = false;
let tempShipData = {};
let tempTodayData = {};
let lastLineText = "";

const holidays = [
  "2025-01-01","2025-01-13","2025-02-11","2025-02-23",
  "2025-03-20","2025-04-29","2025-05-03","2025-05-04",
  "2025-05-05","2025-05-06","2025-07-21","2025-08-11",
  "2025-09-15","2025-09-23","2025-10-13","2025-11-03",
  "2025-11-23","2025-11-24",
  "2026-01-01","2026-01-12","2026-02-11","2026-02-23",
  "2026-03-20","2026-04-29","2026-05-03","2026-05-04",
  "2026-05-05","2026-05-06","2026-07-20","2026-08-11",
  "2026-09-21","2026-09-22","2026-09-23","2026-10-12",
  "2026-11-03","2026-11-23"
];

function formatDate(d){
  return (d.getMonth()+1)+"/"+d.getDate();
}

function fullDateKey(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,"0");
  const day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}

function weekday(d){
  return ["日","月","火","水","木","金","土"][d.getDay()];
}

function nowText(){
  const d = new Date();
  return `${formatDate(d)} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function isHoliday(d){
  return holidays.includes(fullDateKey(d));
}

function isClosedDay(d){
  return d.getDay()===0 || d.getDay()===6 || isHoliday(d);
}

function getBusinessToday(fromDate){
  const d = new Date(fromDate);
  while(isClosedDay(d)){
    d.setDate(d.getDate() - 1);
  }
  return d;
}

function getNextShipDate(fromDate){
  const d = new Date(fromDate);
  d.setDate(d.getDate()+1);
  while(isClosedDay(d)){
    d.setDate(d.getDate()+1);
  }
  return d;
}

function getMonday(date){
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() + (day===0 ? -6 : 1-day));
  return d;
}

function sameDate(a,b){
  return a.getFullYear()===b.getFullYear()
    && a.getMonth()===b.getMonth()
    && a.getDate()===b.getDate();
}

function setActiveTab(btn){
  document.querySelectorAll(".top-tabs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function renderDates(){
  dateRow.innerHTML = "";

  for(let i=0;i<5;i++){
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate()+i);

    const btn = document.createElement("button");
    btn.textContent = formatDate(d);

    if(sameDate(d,selectedDate)) btn.classList.add("active");

    btn.onclick = ()=>{
      selectedDate = new Date(d);
      baseDate = new Date(d);
      editingNoticeId = null;
      shipEditMode = false;
      todayEditMode = false;
      renderDates();
      refreshCurrentTab();
    };

    dateRow.appendChild(btn);
  }
}

function refreshCurrentTab(){
  if(shipBtn.classList.contains("active")) renderShip();
  if(todayBtn.classList.contains("active")) renderToday();
  if(noticeBtn.classList.contains("active")) renderNotice();
}

function dataKey(type,name){
  return type+"_"+fullDateKey(selectedDate)+"_"+name;
}

function getStatus(type,name,temp){
  const key = dataKey(type,name);
  if(temp && temp[key]) return temp[key];
  return shipData[key] || "なし";
}

function setTempStatus(type,name,status,temp){
  const key = dataKey(type,name);
  temp[key] = status;
}

function getMetaKey(type){
  return type+"_"+fullDateKey(selectedDate);
}

function getLastUpdate(type){
  return metaData[getMetaKey(type)]?.updatedAt || "未保存";
}

function lineShare(text){
  location.href = "https://line.me/R/msg/text/?" + encodeURIComponent(text);
}

function controlArea(type,pageName){
  const last = getLastUpdate(type);

  return `
    <div class="meta">最終更新：${last}</div>

    ${type==="ship" && !shipEditMode ? `<button class="mode-btn" onclick="startShipEdit()">編集</button>` : ""}
    ${type==="ship" && shipEditMode ? `<button class="save-btn" onclick="saveShipEdit()">保存</button><button class="cancel-btn" onclick="cancelShipEdit()">キャンセル</button>` : ""}

    ${type==="today" && !todayEditMode ? `<button class="mode-btn" onclick="startTodayEdit()">編集</button>` : ""}
    ${type==="today" && todayEditMode ? `<button class="save-btn" onclick="saveTodayEdit()">保存</button><button class="cancel-btn" onclick="cancelTodayEdit()">キャンセル</button>` : ""}

    <button class="line-btn" onclick="lineShare('出荷管理が更新されました\\nページ：${pageName}\\n日付：${formatDate(selectedDate)}\\n最終更新：${last}')">
      LINEで共有
    </button>
  `;
}

function placeRow(type,label){
  const status = getStatus(type,label,tempShipData);
  const lockedClass = shipEditMode ? "" : "locked";

  return `
    <div class="place-row">
      <div class="place-name">${label.split("_").pop()}</div>
      <div class="place-status ${lockedClass}" data-type="${type}" data-name="${label}">
        <button class="${status==="あり"?"active":""}" onclick="togglePlace(this,'あり')">あり</button>
        <button class="${status==="なし"?"active":""}" onclick="togglePlace(this,'なし')">なし</button>
      </div>
    </div>
  `;
}

function shipGroup(title,items){
  return `
    <div>
      <div class="group-title">${title}</div>
      ${items.map(item=>placeRow("ship",title+"_"+item)).join("")}
    </div>
  `;
}

function renderShip(){
  setActiveTab(shipBtn);
  scheduleArea.style.display = "block";

  selectedDate = new Date(baseDate);
  weekStart = getMonday(selectedDate);
  renderDates();

  mainArea.innerHTML = `
    <div class="card">
      ${shipGroup("佐川急便",["2F"])}
      <div class="divider"></div>
      ${shipGroup("福山通運",["2F","梱包場","MJ倉庫"])}
      <div class="divider"></div>
      ${shipGroup("フレックス来社",["2F","梱包場","MJ倉庫"])}
      ${controlArea("ship","出荷場所")}
    </div>
  `;
}

function startShipEdit(){
  tempShipData = {};
  shipEditMode = true;
  renderShip();
}

function cancelShipEdit(){
  tempShipData = {};
  shipEditMode = false;
  renderShip();
}

function saveShipEdit(){
  const updates = {};
  Object.keys(tempShipData).forEach(key=>{
    updates["shipData/"+key] = tempShipData[key];
  });
  updates["meta/"+getMetaKey("ship")] = {updatedAt:nowText()};

  db.ref().update(updates);
  tempShipData = {};
  shipEditMode = false;
}

function todayRow(type,name){
  const status = getStatus(type,name,tempTodayData);
  const lockedClass = todayEditMode ? "" : "locked";

  return `
    <div class="ship-row">
      <div class="ship-name">${name}</div>
      <div class="ship-right">
        <div class="ship-status ${lockedClass}" data-type="${type}" data-name="${name}">
          <button class="${status==="あり"?"active":""}" onclick="toggleShip(this,'あり')">あり</button>
          <button class="${status==="なし"?"active":""}" onclick="toggleShip(this,'なし')">なし</button>
        </div>
      </div>
    </div>
  `;
}

function renderToday(){
  setActiveTab(todayBtn);
  scheduleArea.style.display = "none";

  const today = getBusinessToday(new Date());
  const shipDate = getNextShipDate(today);

  selectedDate = new Date(shipDate);

  mainArea.innerHTML = `
    <div class="today-info">
      このページは翌日の出荷日を表示しています<br>
      （本日：${formatDate(today)} → 出荷日：<span class="blue">${formatDate(shipDate)}</span>）
    </div>

    <div class="today-date-title">
      出荷日：<span class="blue">${formatDate(shipDate)}（${weekday(shipDate)}）</span>
    </div>

    <div class="card">
      ${todayRow("today","2F（家具）")}
      <div class="divider"></div>
      ${todayRow("today","2F（テーブル）")}
      <div class="divider"></div>
      ${todayRow("today","梱包場")}
      <div class="divider"></div>
      ${todayRow("today","MJ倉庫")}
      ${controlArea("today","当日送り状貼り残し")}
    </div>
  `;
}

function startTodayEdit(){
  tempTodayData = {};
  todayEditMode = true;
  renderToday();
}

function cancelTodayEdit(){
  tempTodayData = {};
  todayEditMode = false;
  renderToday();
}

function saveTodayEdit(){
  const updates = {};
  Object.keys(tempTodayData).forEach(key=>{
    updates["shipData/"+key] = tempTodayData[key];
  });
  updates["meta/"+getMetaKey("today")] = {updatedAt:nowText()};

  db.ref().update(updates);
  tempTodayData = {};
  todayEditMode = false;
}

function togglePlace(btn,status){
  if(!shipEditMode) return;
  const group = btn.parentElement;
  setTempStatus(group.dataset.type,group.dataset.name,status,tempShipData);
  renderShip();
}

function toggleShip(btn,status){
  if(!todayEditMode) return;
  const group = btn.parentElement;
  setTempStatus(group.dataset.type,group.dataset.name,status,tempTodayData);
  renderToday();
}

function noticeKey(){
  return fullDateKey(selectedDate);
}

function getNoticeList(){
  const key = noticeKey();
  const dayNotices = notices[key] || {};

  return Object.entries(dayNotices)
    .map(([id,item])=>({id,...item}))
    .sort((a,b)=>(a.createdAt || 0)-(b.createdAt || 0));
}

function renderNotice(){
  setActiveTab(noticeBtn);
  scheduleArea.style.display = "block";

  selectedDate = new Date(baseDate);
  weekStart = getMonday(selectedDate);
  renderDates();

  const list = getNoticeList();

  if(list.length===0){
    mainArea.innerHTML = `
      <div class="card">
        <div class="notice-date">${formatDate(selectedDate)}</div>
        <div class="notice-name">注意事項なし</div>
        <div class="notice-body">この日の注意事項はありません</div>
      </div>
      <button class="add-btn" onclick="renderNoticeForm()">＋ 新規追加</button>
    `;
    return;
  }

  mainArea.innerHTML = `
    ${list.map(item=>`
      <div class="card">
        <div class="notice-date">${formatDate(selectedDate)}</div>
        <div class="notice-name">${item.title || ""}</div>
        <div class="notice-body">${item.body || ""}</div>
        <div class="card-actions">
          <button class="icon-btn edit-btn" onclick="editNotice('${item.id}')">✏️</button>
          <button class="icon-btn delete-btn" onclick="deleteNotice('${item.id}')">🗑️</button>
        </div>
      </div>
    `).join("")}
    <button class="add-btn" onclick="renderNoticeForm()">＋ 新規追加</button>
  `;
}

function renderNoticeForm(){
  const key = noticeKey();

  const item =
    editingNoticeId &&
    notices[key] &&
    notices[key][editingNoticeId]
      ? notices[key][editingNoticeId]
      : {title:"",body:""};

  mainArea.innerHTML = `
    <div class="card">
      <input class="form-input" id="titleInput" placeholder="タイトル" value="${item.title || ""}">
      <textarea class="form-textarea" id="bodyInput" placeholder="内容">${item.body || ""}</textarea>
      <button class="save-btn" onclick="saveNotice()">保存</button>
      <button class="cancel-btn" onclick="cancelNoticeForm()">キャンセル</button>
    </div>
  `;
}

function editNotice(id){
  editingNoticeId = id;
  renderNoticeForm();
}

function cancelNoticeForm(){
  editingNoticeId = null;
  renderNotice();
}

function saveNotice(){
  const key = noticeKey();

  const id =
    editingNoticeId ||
    db.ref("notices/"+key).push().key;

  const oldItem =
    notices[key] && notices[key][id]
      ? notices[key][id]
      : {};

  db.ref("notices/"+key+"/"+id).set({
    title:titleInput.value || "",
    body:bodyInput.value || "",
    createdAt:oldItem.createdAt || Date.now()
  });

  editingNoticeId = null;
  renderNotice();
}

function deleteNotice(id){
  const key = noticeKey();

  if(confirm("削除しますか？")){
    db.ref("notices/"+key+"/"+id).remove();
  }
}

function openCalendar(target="week"){
  calendarTarget = target;
  calendarBg.style.display = "block";
  calendarPopup.style.display = "block";

  calendarMonth = new Date(
    selectedDate.getFullYear(),
    selectedDate.getMonth(),
    1
  );

  renderCalendar();
}

function closeCalendar(){
  calendarBg.style.display = "none";
  calendarPopup.style.display = "none";
}

function renderCalendar(){
  calendarGrid.innerHTML = "";

  const y = calendarMonth.getFullYear();
  const m = calendarMonth.getMonth();

  calendarTitle.textContent = `${y}年 ${m+1}月`;

  const first = new Date(y,m,1).getDay();
  const last = new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++){
    const e = document.createElement("div");
    e.className = "calendar-empty";
    calendarGrid.appendChild(e);
  }

  for(let day=1;day<=last;day++){
    const d = new Date(y,m,day);

    const cell = document.createElement("div");
    cell.className = "calendar-day";
    cell.textContent = day;

    if(sameDate(d,selectedDate)) cell.classList.add("active");

    cell.onclick = ()=>{
      selectedDate = new Date(d);
      baseDate = new Date(d);
      weekStart = getMonday(selectedDate);
      editingNoticeId = null;
      shipEditMode = false;
      todayEditMode = false;

      renderDates();
      refreshCurrentTab();
      closeCalendar();
    };

    calendarGrid.appendChild(cell);
  }
}

noticeBtn.onclick = renderNotice;
shipBtn.onclick = renderShip;
todayBtn.onclick = renderToday;

prevWeek.onclick = ()=>{
  weekStart.setDate(weekStart.getDate()-7);
  selectedDate = new Date(weekStart);
  baseDate = new Date(selectedDate);
  editingNoticeId = null;
  renderDates();
  refreshCurrentTab();
};

nextWeek.onclick = ()=>{
  weekStart.setDate(weekStart.getDate()+7);
  selectedDate = new Date(weekStart);
  baseDate = new Date(selectedDate);
  editingNoticeId = null;
  renderDates();
  refreshCurrentTab();
};

calendarBtn.onclick = ()=>openCalendar("week");
calendarBg.onclick = closeCalendar;
calendarClose.onclick = closeCalendar;

calPrev.onclick = ()=>{
  calendarMonth.setMonth(calendarMonth.getMonth()-1);
  renderCalendar();
};

calNext.onclick = ()=>{
  calendarMonth.setMonth(calendarMonth.getMonth()+1);
  renderCalendar();
};

db.ref("shipData").on("value", snapshot=>{
  shipData = snapshot.val() || {};
  refreshCurrentTab();
});

db.ref("notices").on("value", snapshot=>{
  notices = snapshot.val() || {};
  refreshCurrentTab();
});

db.ref("meta").on("value", snapshot=>{
  metaData = snapshot.val() || {};
  refreshCurrentTab();
});

renderDates();
renderShip();
</script>

</body>
</html>
