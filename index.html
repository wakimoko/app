<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>出荷管理</title>

<style>
body{
  margin:0;
  padding:24px;
  font-family:sans-serif;
  background:#f7f2ec;
  color:#3b2a22;
}

.item{
  border-bottom:1px solid #e2d6ca;
  padding:16px 0;
}

.title{
  font-weight:bold;
  font-size:20px;
}

.like-btn{
  border:none;
  border-radius:20px;
  padding:6px 14px;
  font-weight:600;
  transition:all 0.15s ease;
}

.like-off{
  background:#eee;
  color:#555;
  transform:scale(1);
}

.like-on{
  background:#c8a98a;
  color:#3e2f23;
  transform:scale(1.1);
}
</style>
</head>

<body>

<h2>注意事項</h2>

<div id="list">読み込み中...</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const client = window.supabase.createClient(
  "https://bylottznuwuizncgfltd.supabase.co",
  "sb_publishable_VDryMJYXIZUwumf5gxxqyw__ivv1upf"
);

// データ取得
async function loadData(){

  const {data,error} = await client
    .from("shipments")
    .select("*")
    .order("id",{ascending:false});

  const list = document.getElementById("list");

  if(error){
    list.textContent = error.message;
    return;
  }

  list.innerHTML = "";

  data.forEach(item=>{

    const div = document.createElement("div");
    div.className = "item";

    const likedClass = item.liked ? "like-on" : "like-off";

    div.innerHTML = `
      <div class="title">${item.title || ""}</div>
      <div>${item.content || ""}</div>

      <button 
        class="like-btn ${likedClass}"
        onclick="toggleLike(${item.id}, ${item.likes || 0}, ${item.liked})"
      >
        👍 ×${item.likes || 0}
      </button>
    `;

    list.appendChild(div);
  });
}


// いいね処理
async function toggleLike(id, currentLikes, liked){

  let newLikes = liked ? currentLikes - 1 : currentLikes + 1;

  await client
    .from("shipments")
    .update({
      likes: newLikes,
      liked: !liked
    })
    .eq("id", id);

  loadData();
}

loadData();

</script>
</body>
</html>
