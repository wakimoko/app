<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>出荷管理</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: sans-serif;
    background: #f3eadf;
    color: #111;
  }

  .app {
    max-width: 430px;
    margin: 0 auto;
    padding: 36px 20px 24px;
  }

  h1 {
    font-size: 34px;
    margin: 0 0 28px;
    font-weight: 900;
  }

  .tabs,
  .week-nav,
  .dates,
  .actions {
    display: flex;
    gap: 10px;
  }

  button {
    border: none;
    border-radius: 20px;
    background: #ddd5cc;
    color: #111;
    font-size: 16px;
    font-weight: 800;
    padding: 12px 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  button.active {
    background: #bd8b55;
    color: white;
  }

  .tabs {
    margin-bottom: 16px;
  }

  .tabs button {
    flex: 1;
    min-width: 0;
    height: 52px;
    font-size: 15px;
  }

  .week-nav {
    margin-bottom: 14px;
  }

  .week-nav button {
    flex: 1;
    height: 48px;
  }

  .dates {
    overflow-x: auto;
    padding-bottom: 8px;
    margin-bottom: 16px;
  }

  .dates button {
    min-width: 64px;
    height: 52px;
    flex-shrink: 0;
  }

  .card {
    background: white;
    border-radius: 26px;
    padding: 20px;
  }

  .row {
    border-bottom: 1px solid #e8ddd2;
    padding: 16px 0;
  }

  .row:last-child {
    border-bottom: none;
  }

  .row h2 {
    font-size: 25px;
    margin: 0 0 8px;
    font-weight: 900;
  }

  .row p {
    font-size: 20px;
    margin: 0 0 12px;
    font-weight: 800;
  }

  .actions {
    justify-content: flex-end;
  }

  .actions button {
    min-width: 58px;
    height: 46px;
    font-size: 16px;
    padding: 10px;
  }

  .camera {
    font-size: 18px;
  }
</style>
</head>

<body>
<div class="app">
  <h1>出荷管理</h1>

  <div class="tabs">
    <button onclick="selectButton(this)">注意事項</button>
    <button class="active" onclick="selectButton(this)">出荷予定</button>
    <button onclick="selectButton(this)">当日出荷</button>
    <button onclick="selectButton(this)">管理</button>
  </div>

  <div class="week-nav">
    <button onclick="alert('前週へ')">前週</button>
    <button onclick="alert('日付選択')">🗓️</button>
    <button onclick="alert('次週へ')">次週</button>
  </div>

  <div class="dates">
    <button class="active" onclick="selectButton(this)">5/4</button>
    <button onclick="selectButton(this)">5/5</button>
    <button onclick="selectButton(this)">5/6</button>
    <button onclick="selectButton(this)">5/7</button>
    <button onclick="selectButton(this)">5/8</button>
    <button onclick="selectButton(this)">5/9</button>
    <button onclick="selectButton(this)">5/10</button>
  </div>

  <div class="card">
    <div class="row">
      <h2>佐川急便</h2>
      <p>2F</p>
      <div class="actions">
        <button class="active" onclick="toggleYesNo(this)">あり</button>
        <button onclick="toggleYesNo(this)">なし</button>
        <button class="camera" onclick="openCamera()">📷</button>
      </div>
    </div>

    <div class="row">
      <h2>福山通運</h2>
      <p>2F</p>
      <div class="actions">
        <button class="active" onclick="toggleYesNo(this)">あり</button>
        <button onclick="toggleYesNo(this)">なし</button>
        <button class="camera" onclick="openCamera()">📷</button>
      </div>
    </div>

    <div class="row">
      <h2>梱包場</h2>
      <div class="actions">
        <button class="active" onclick="toggleYesNo(this)">あり</button>
        <button onclick="toggleYesNo(this)">なし</button>
        <button class="camera" onclick="openCamera()">📷</button>
      </div>
    </div>

    <div class="row">
      <h2>MJ倉庫</h2>
      <div class="actions">
        <button onclick="toggleYesNo(this)">あり</button>
        <button class="active" onclick="toggleYesNo(this)">なし</button>
        <button class="camera" onclick="openCamera()">📷</button>
      </div>
    </div>
  </div>
</div>

<input id="cameraInput" type="file" accept="image/*" capture="environment" style="display:none;">

<script>
  function selectButton(button) {
    const group = button.parentElement;
    group.querySelectorAll("button").forEach(btn => {
      btn.classList.remove("active");
    });
    button.classList.add("active");
  }

  function toggleYesNo(button) {
    const group = button.parentElement;
    group.querySelectorAll("button").forEach(btn => {
      if (!btn.classList.contains("camera")) {
        btn.classList.remove("active");
      }
    });
    button.classList.add("active");
  }

  function openCamera() {
    document.getElementById("cameraInput").click();
  }
</script>
</body>
</html>
