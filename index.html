<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>出荷管理</title>

<style>

body{
  margin:0;
  background:#f3eee6;
  font-family:sans-serif;
  color:#111;
}

.container{
  max-width:430px;
  margin:auto;
  padding:14px 16px 90px;
}

/* タイトル */

h1{
  font-size:48px;
  font-weight:900;
  margin:8px 0 24px;
  letter-spacing:-1px;
}

/* 共通ボタン */

button{
  border:none;
  cursor:pointer;
  transition:.2s;
}

button:active{
  transform:scale(.96);
}

/* 上タブ */

.top-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:14px;
}

.top-tabs button{
  height:60px;
  border-radius:22px;
  background:#e6ddd4;
  color:#007aff;
  font-size:16px;
  font-weight:900;
  line-height:1.25;
}

.top-tabs .active{
  background:#c99657;
  color:#fff;
}

/* 前週次週 */

.week-row{
  display:grid;
  grid-template-columns:1fr .7fr 1fr;
  gap:10px;
  margin-bottom:12px;
}

.week-row button{
  height:54px;
  border-radius:22px;
  background:#e6ddd4;
  color:#007aff;
  font-size:17px;
  font-weight:900;
}

/* 日付 */

.date-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  margin-bottom:18px;
}

.date-row button{
  height:68px;
  border-radius:24px;
  background:#e6ddd4;
  color:#007aff;
  font-size:20px;
  font-weight:900;
}

.date-row .active{
  background:#c99657;
  color:#fff;
}

/* カード */

.card{
  background:#fff;
  border-radius:30px;
  padding:22px 22px 74px;
  position:relative;
  min-height:180px;
}

.notice-title{
  font-size:28px;
  font-weight:900;
  margin-bottom:16px;
}

.notice-name{
  font-size:20px;
  margin-bottom:8px;
}

.notice-body{
  font-size:18px;
  line-height:1.5;
}

/* 編集削除 */

.card-actions{
  position:absolute;
  right:18px;
  bottom:18px;
  display:flex;
  gap:10px;
}

.icon-btn{
  width:42px;
  height:42px;
  border-radius:50%;
  font-size:18px;
}

.edit-btn{
  background:#efe7dc;
}

.delete-btn{
  background:#f8dede;
}

/* モーダル */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.modal-content{
  width:88%;
  max-width:360px;
  background:#fff;
  border-radius:24px;
  padding:20px;
}

.modal h2{
  margin-top:0;
}

.modal input,
.modal textarea{
  width:100%;
  box-sizing:border-box;
  border:2px solid #e3ddd5;
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
  font-size:16px;
}

.modal textarea{
  height:110px;
  resize:none;
}

.save-btn{
  width:100%;
  height:52px;
  border-radius:18px;
  background:#c99657;
  color:#fff;
  font-size:18px;
  font-weight:900;
}

.close-btn{
  margin-top:10px;
  width:100%;
  height:44px;
  border-radius:16px;
  background:#ece6df;
  font-weight:700;
}

</style>
</head>

<body>

<div class="container">

<h1>出荷管理</h1>

<!-- 上タブ -->

<div class="top-tabs">
  <button class="active">注意事項</button>
  <button>出荷予定</button>
  <button>当日出荷</button>
  <button id="manageBtn">管理</button>
</div>

<!-- 前週次週 -->

<div class="week-row">
  <button id="prevWeek">前週</button>

  <button id="calendarBtn">🗓</button>

  <button id="nextWeek">次週</button>
</div>

<!-- 日付 -->

<div class="date-row" id="dateRow">
  <button class="active">5/4</button>
  <button>5/5</button>
  <button>5/6</button>
  <button>5/7</button>
  <button>5/8</button>
</div>

<!-- カード -->

<div class="card">

  <div class="notice-title">クレーム</div>

  <div class="notice-name">○○様</div>

  <div class="notice-body">
    要検品
  </div>

  <div class="card-actions">
    <button class="icon-btn edit-btn" id="editBtn">✏️</button>
    <button class="icon-btn delete-btn" id="deleteBtn">🗑️</button>
  </div>

</div>

</div>

<!-- 編集モーダル -->

<div class="modal" id="modal">

  <div class="modal-content">

    <h2>編集</h2>

    <input type="text" id="titleInput" placeholder="タイトル">

    <input type="text" id="nameInput" placeholder="名前">

    <textarea id="bodyInput" placeholder="内容"></textarea>

    <button class="save-btn" id="saveBtn">
      保存
    </button>

    <button class="close-btn" id="closeBtn">
      閉じる
    </button>

  </div>

</div>

<!-- hidden date -->

<input type="date" id="hiddenDate" style="display:none">

<script>

/* 日付ボタン切替 */

const dateButtons = document.querySelectorAll('#dateRow button');

dateButtons.forEach(btn => {

  btn.addEventListener('click', () => {

    dateButtons.forEach(b => b.classList.remove('active'));

    btn.classList.add('active');

  });

});

/* 編集 */

const modal = document.getElementById('modal');

const editBtn = document.getElementById('editBtn');

const closeBtn = document.getElementById('closeBtn');

const saveBtn = document.getElementById('saveBtn');

const titleEl = document.querySelector('.notice-title');

const nameEl = document.querySelector('.notice-name');

const bodyEl = document.querySelector('.notice-body');

editBtn.addEventListener('click', () => {

  document.getElementById('titleInput').value =
    titleEl.innerText;

  document.getElementById('nameInput').value =
    nameEl.innerText;

  document.getElementById('bodyInput').value =
    bodyEl.innerText;

  modal.style.display='flex';

});

closeBtn.addEventListener('click', () => {

  modal.style.display='none';

});

saveBtn.addEventListener('click', () => {

  titleEl.innerText =
    document.getElementById('titleInput').value;

  nameEl.innerText =
    document.getElementById('nameInput').value;

  bodyEl.innerText =
    document.getElementById('bodyInput').value;

  modal.style.display='none';

});

/* 削除 */

document.getElementById('deleteBtn')
.addEventListener('click', () => {

  if(confirm('削除しますか？')){

    document.querySelector('.card').remove();

  }

});

/* カレンダー */

const hiddenDate = document.getElementById('hiddenDate');

document.getElementById('calendarBtn')
.addEventListener('click', () => {

  hiddenDate.showPicker();

});

hiddenDate.addEventListener('change', e => {

  alert('選択日: ' + e.target.value);

});

/* 前週次週 */

document.getElementById('prevWeek')
.addEventListener('click', () => {

  alert('前週へ');

});

document.getElementById('nextWeek')
.addEventListener('click', () => {

  alert('次週へ');

});

/* 管理 */

document.getElementById('manageBtn')
.addEventListener('click', () => {

  alert('管理画面');

});

</script>

</body>
</html>
