<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>出荷管理</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f3eadf;
      color: #111;
    }

    .app {
      padding: 48px 22px 24px;
    }

    h1 {
      font-size: 40px;
      margin: 0 0 36px;
      font-weight: 900;
    }

    .tabs,
    .week-nav,
    .dates {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
    }

    button {
      border: none;
      border-radius: 22px;
      background: #ddd5cc;
      color: #111;
      font-size: 18px;
      font-weight: 800;
      padding: 16px 18px;
    }

    button.active {
      background: #bd8b55;
      color: white;
    }

    .tabs button {
      flex: 1;
      min-height: 58px;
    }

    .week-nav button {
      flex: 1;
    }

    .dates {
      overflow-x: auto;
      padding-bottom: 8px;
    }

    .dates button {
      min-width: 72px;
    }

    .card {
      background: white;
      border-radius: 28px;
      padding: 24px 20px;
      margin-top: 18px;
    }

    .row {
      border-bottom: 1px solid #e8ddd2;
      padding: 18px 0;
    }

    .row:last-child {
      border-bottom: none;
    }

    .row h2 {
      font-size: 28px;
      margin: 0 0 10px;
      font-weight: 900;
    }

    .row p {
      font-size: 22px;
      margin: 0 0 14px;
      font-weight: 800;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .actions button {
      min-width: 64px;
      padding: 12px 16px;
    }

    .camera {
      min-width: 64px;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>出荷管理</h1>

    <div class="tabs">
      <button>注意事項</button>
      <button class="active">出荷予定</button>
      <button>当日出荷</button>
      <button>管理</button>
    </div>

    <div class="week-nav">
      <button>前週</button>
      <button>🗓️</button>
      <button>次週</button>
    </div>

    <div class="dates">
      <button class="active">5/4</button>
      <button>5/5</button>
      <button>5/6</button>
      <button>5/7</button>
      <button>5/8</button>
      <button>5/9</button>
      <button>5/10</button>
    </div>

    <div class="card">
      <div class="row">
        <h2>佐川急便</h2>
        <p>2F</p>
        <div class="actions">
          <button class="active">あり</button>
          <button>なし</button>
          <button class="camera">📷</button>
        </div>
      </div>

      <div class="row">
        <h2>福山通運</h2>
        <p>2F</p>
        <div class="actions">
          <button class="active">あり</button>
          <button>なし</button>
          <button class="camera">📷</button>
        </div>
      </div>

      <div class="row">
        <h2>梱包場</h2>
        <div class="actions">
          <button class="active">あり</button>
          <button>なし</button>
          <button class="camera">📷</button>
        </div>
      </div>

      <div class="row">
        <h2>MJ倉庫</h2>
        <div class="actions">
          <button>あり</button>
          <button class="active">なし</button>
          <button class="camera">📷</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
