<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>出荷管理</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: #f3eadf;
  color: #111;
}

.app {
  max-width: 430px;
  margin: 0 auto;
  padding: 44px 22px 24px;
}

h1 {
  font-size: 34px;
  margin: 0 0 30px;
  font-weight: 900;
}

button {
  border: none;
  border-radius: 22px;
  background: #ded6cd;
  color: #111;
  font-size: 16px;
  font-weight: 900;
  padding: 12px 10px;
  cursor: pointer;
}

button.active {
  background: #bd8b55;
  color: white;
}

.tabs,
.week-nav,
.dates,
.actions {
  display: flex;
  gap: 10px;
}

.tabs {
  margin-bottom: 18px;
}

.tabs button {
  flex: 1;
  height: 52px;
}

.week-nav {
  margin-bottom: 14px;
}

.week-nav button {
  flex: 1;
  height: 48px;
}

.dates {
  overflow-x: auto;
  padding-bottom: 8px;
  margin-bottom: 16px;
}

.dates button {
  min-width: 68px;
  height: 52px;
  flex-shrink: 0;
}

.card {
  background: white;
  border-radius: 28px;
  padding: 22px 20px;
}

.row {
  border-bottom: 1px solid #e8ddd2;
  padding: 18px 0;
}

.row:last-child {
  border-bottom: none;
}

.row h2 {
  font-size: 26px;
  margin: 0 0 8px;
  font-weight: 900;
}

.row p {
  font-size: 20px;
  margin: 0 0 12px;
  font-weight: 800;
}

.actions {
  justify-content: flex-end;
}

.actions button {
  min-width: 58px;
  height: 46px;
}

.camera {
  font-size: 18px;
}

.photo-area img {
  width: 90px;
  height: 90px;
  object-fit: cover;
  border-radius: 14px;
  margin-top: 12px;
}
</style>
</head>

<body>

<div class="app">

  <h1>出荷管理</h1>

  <div class="tabs">
    <button>注意事項</button>
    <button class="active">出荷予定</button>
    <button>当日出荷</button>
    <button>管理</button>
  </div>

  <div class="week-nav">
    <button>前週</button>
    <button>🗓️</button>
    <button>次週</button>
  </div>

  <div class="dates">
    <button class="active">5/4</button>
    <button>5/5</button>
    <button>5/6</button>
    <button>5/7</button>
    <button>5/8</button>
    <button>5/9</button>
    <button>5/10</button>
  </div>

  <div class="card">

    <div class="row">
      <h2>佐川急便</h2>
      <p>2F</p>

      <div class="actions">
        <button class="active">あり</button>
        <button>なし</button>
        <button class="camera" onclick="selectPhoto('sagawa')">📷</button>
      </div>

      <div class="photo-area" id="photo-sagawa"></div>
    </div>

    <div class="row">
      <h2>福山通運</h2>
      <p>2F</p>

      <div class="actions">
        <button class="active">あり</button>
        <button>なし</button>
        <button class="camera" onclick="selectPhoto('fukuyama')">📷</button>
      </div>

      <div class="photo-area" id="photo-fukuyama"></div>
    </div>

    <div class="row">
      <h2>梱包場</h2>

      <div class="actions">
        <button class="active">あり</button>
        <button>なし</button>
        <button class="camera" onclick="selectPhoto('packing')">📷</button>
      </div>

      <div class="photo-area" id="photo-packing"></div>
    </div>

  </div>

</div>

<input
  id="cameraInput"
  type="file"
  accept="image/*"
  capture="environment"
  style="display:none;"
  onchange="handlePhotoSelected(event)"
>

<script>

const SUPABASE_URL = "あなたのSUPABASE_URL";
const SUPABASE_KEY = "あなたのSUPABASE_ANON_KEY";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const currentDate = "2026-05-04";

let selectedPlaceKey = null;

function selectPhoto(placeKey) {
  selectedPlaceKey = placeKey;
  document.getElementById("cameraInput").click();
}

async function handlePhotoSelected(event) {

  const file = event.target.files[0];

  if (!file || !selectedPlaceKey) return;

  await uploadPhoto(
    file,
    currentDate,
    selectedPlaceKey
  );

  event.target.value = "";
}

async function uploadPhoto(file, date, placeKey) {

  try {

    const fileName =
      `${Date.now()}-${file.name}`;

    const { error: uploadError } =
      await supabase.storage
        .from("shipment-photos")
        .upload(fileName, file);

    if (uploadError) {
      alert(
        "写真アップロードエラー : " +
        uploadError.message
      );
      return;
    }

    const { data } =
      supabase.storage
        .from("shipment-photos")
        .getPublicUrl(fileName);

    const publicUrl =
      data.publicUrl;

    const { error: insertError } =
      await supabase
        .from("shipping_photos")
        .insert([
          {
            date: date,
            place_key: placeKey,
            photo_url: publicUrl
          }
        ]);

    if (insertError) {
      alert(
        "DB保存エラー : " +
        insertError.message
      );
      return;
    }

    showPhoto(
      placeKey,
      publicUrl
    );

  } catch (e) {

    console.error(e);

    alert("エラー");

  }
}

async function loadPhotos(date) {

  const { data, error } =
    await supabase
      .from("shipping_photos")
      .select("*")
      .eq("date", date);

  if (error) {
    console.error(error);
    return;
  }

  data.forEach(item => {
    showPhoto(
      item.place_key,
      item.photo_url
    );
  });
}

function showPhoto(placeKey, url) {

  const area =
    document.getElementById(
      `photo-${placeKey}`
    );

  if (!area) return;

  area.innerHTML = `
    <img src="${url}">
  `;
}

loadPhotos(currentDate);

</script>

</body>
</html>
