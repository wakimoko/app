<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>出荷管理</title>
</head>
<body>

<h1>出荷管理</h1>

<!-- 入力 -->
<input id="titleInput" placeholder="タイトル"><br><br>
<textarea id="contentInput" placeholder="内容"></textarea><br><br>

<select id="statusInput">
  <option value="通常">通常</option>
  <option value="重要">重要</option>
</select><br><br>

<button onclick="addData()">追加する</button>

<hr>

<div id="list"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = window.supabase.createClient(
  "https://bylottznwuizncgfltd.supabase.co",
  "sb_publishable_VDryMJYXIZUwumf5gxxqyw__ivv1upf"
);

// 仮の値（あとでUIと連動できる）
let selectedDate = "4/20";
let selectedCategory = "管理";

// 一覧表示
async function loadData() {
  const { data, error } = await supabase
    .from('shipments')
    .select('*')
    .order('id', { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.innerHTML = `
      <b>${item.date} / ${item.category}</b><br>
      ${item.title}<br>
      ${item.content}<br>
      ${item.status}
      <hr>
    `;
    list.appendChild(div);
  });
}

// 追加
async function addData() {
  const title = document.getElementById("titleInput").value;
  const content = document.getElementById("contentInput").value;
  const status = document.getElementById("statusInput").value;

  if (!title) {
    alert("タイトル入れて");
    return;
  }

  const { error } = await supabase
    .from('shipments')
    .insert([
      {
        date: selectedDate,
        category: selectedCategory,
        title: title,
        content: content,
        status: status,
        done: false
      }
    ]);

  if (error) {
    alert("追加エラー：" + error.message);
    console.error(error);
    return;
  }

  // 入力クリア
  document.getElementById("titleInput").value = "";
  document.getElementById("contentInput").value = "";

  loadData();
}

// 初回
loadData();
</script>

</body>
</html>
