<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>出荷管理</title>

<style>
body{
  margin:0;
  background:#f4efe6;
  font-family:sans-serif;
  color:#111;
}

.container{
  padding:24px 20px 120px;
}

h1{
  font-size:58px;
  font-weight:900;
  margin:20px 0 30px;
}

/* ---------- 上メニュー ---------- */

.top-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:22px;
}

.top-tabs button{
  height:72px;
  border:none;
  border-radius:24px;
  background:#e6ddd4;
  font-size:18px;
  font-weight:900;
  color:#0d6efd;
}

.top-tabs button.active{
  background:#be8b55;
  color:#fff;
}

/* ---------- 日付 ---------- */

.week-row{
  display:grid;
  grid-template-columns:1fr 120px 1fr;
  gap:14px;
  margin-bottom:14px;
}

.week-row button{
  height:74px;
  border:none;
  border-radius:24px;
  background:#e6ddd4;
  font-size:20px;
  font-weight:900;
  color:#0d6efd;
}

.date-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-bottom:26px;
}

.date-btn{
  height:92px;
  border:none;
  border-radius:24px;
  background:#e6ddd4;
  font-size:26px;
  font-weight:900;
  color:#0d6efd;
}

.date-btn.active{
  background:#be8b55;
  color:#fff;
}

/* ---------- カード ---------- */

.notice-card{
  position:relative;
  background:#fff;
  border-radius:34px;
  padding:34px 28px 90px;
  margin-bottom:20px;
}

.notice-title{
  font-size:34px;
  font-weight:900;
  margin-bottom:24px;
}

.notice-body{
  font-size:26px;
  line-height:1.7;
  white-space:pre-wrap;
}

/* ---------- 編集削除 ---------- */

.card-actions{
  position:absolute;
  right:20px;
  bottom:20px;
  display:flex;
  gap:12px;
}

.icon-btn{
  width:50px;
  height:50px;
  border:none;
  border-radius:50%;
  font-size:22px;
  cursor:pointer;
}

.edit-btn{
  background:#eadfd3;
}

.delete-btn{
  background:#f5d9d9;
}

/* ---------- 管理 ---------- */

.manage-box{
  background:#fff;
  border-radius:34px;
  padding:26px;
}

.manage-box h2{
  font-size:34px;
  margin:0 0 18px;
}

.manage-box input,
.manage-box textarea{
  width:100%;
  box-sizing:border-box;
  margin-bottom:16px;
  border:2px solid #ddd;
  border-radius:20px;
  padding:18px;
  font-size:20px;
}

.manage-box textarea{
  min-height:140px;
  resize:none;
}

.save-btn{
  width:100%;
  height:70px;
  border:none;
  border-radius:24px;
  background:#be8b55;
  color:#fff;
  font-size:28px;
  font-weight:900;
}

/* 非表示 */

.hidden{
  display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>出荷管理</h1>

<!-- 上タブ -->

<div class="top-tabs">
  <button class="active" onclick="selectTab(this,'notice')">注意事項</button>
  <button onclick="selectTab(this,'ship')">出荷予定</button>
  <button onclick="selectTab(this,'today')">当日出荷</button>
  <button onclick="selectTab(this,'manage')">管理</button>
</div>

<!-- 日付 -->

<div class="week-row">
  <button>前週</button>

  <button onclick="openCalendar()">🗓️</button>

  <button>次週</button>
</div>

<div class="date-row">
  <button class="date-btn active">5/4</button>
  <button class="date-btn">5/5</button>
  <button class="date-btn">5/6</button>
  <button class="date-btn">5/7</button>
  <button class="date-btn">5/8</button>
</div>

<!-- 注意事項 -->

<div id="notice-section">

  <div id="notice-list"></div>

</div>

<!-- 出荷予定 -->

<div id="ship-section" class="hidden">
  <div class="manage-box">
    <h2>出荷予定</h2>
    <p>ここに出荷予定を表示</p>
  </div>
</div>

<!-- 当日出荷 -->

<div id="today-section" class="hidden">
  <div class="manage-box">
    <h2>当日出荷</h2>
    <p>ここに当日出荷を表示</p>
  </div>
</div>

<!-- 管理 -->

<div id="manage-section" class="hidden">

  <div class="manage-box">

    <h2>注意事項を追加</h2>

    <input type="text" id="title" placeholder="タイトル">

    <textarea id="body" placeholder="内容"></textarea>

    <button class="save-btn" onclick="saveNotice()">
      保存
    </button>

  </div>

</div>

</div>

<!-- hidden calendar -->

<input
  type="date"
  id="calendar"
  style="position:absolute;opacity:0;pointer-events:none;"
>

<script>

/* ---------------- 保存 ---------------- */

let notices = JSON.parse(localStorage.getItem("notices")) || [];

let editId = null;

/* ---------------- 描画 ---------------- */

function renderNotices(){

  const list = document.getElementById("notice-list");

  list.innerHTML = "";

  notices.reverse().forEach(item => {

    list.innerHTML += `

      <div class="notice-card">

        <div class="notice-title">
          ${item.title}
        </div>

        <div class="notice-body">
          ${item.body}
        </div>

        <div class="card-actions">

          <button
            class="icon-btn edit-btn"
            onclick="editNotice(${item.id})"
          >
            ✏️
          </button>

          <button
            class="icon-btn delete-btn"
            onclick="deleteNotice(${item.id})"
          >
            🗑️
          </button>

        </div>

      </div>

    `;
  });

  notices.reverse();
}

/* ---------------- 保存 ---------------- */

function saveNotice(){

  const title = document.getElementById("title").value;

  const body = document.getElementById("body").value;

  if(!title || !body){
    alert("入力してください");
    return;
  }

  if(editId){

    notices = notices.map(n => {

      if(n.id === editId){
        return {
          ...n,
          title,
          body
        };
      }

      return n;

    });

    editId = null;

  }else{

    notices.push({
      id:Date.now(),
      title,
      body
    });

  }

  localStorage.setItem(
    "notices",
    JSON.stringify(notices)
  );

  document.getElementById("title").value = "";
  document.getElementById("body").value = "";

  renderNotices();

  alert("保存しました");
}

/* ---------------- 編集 ---------------- */

function editNotice(id){

  const item = notices.find(n => n.id === id);

  if(!item) return;

  document.getElementById("title").value = item.title;

  document.getElementById("body").value = item.body;

  editId = id;

  selectTab(
    document.querySelectorAll(".top-tabs button")[3],
    "manage"
  );
}

/* ---------------- 削除 ---------------- */

function deleteNotice(id){

  if(!confirm("削除しますか？")) return;

  notices = notices.filter(n => n.id !== id);

  localStorage.setItem(
    "notices",
    JSON.stringify(notices)
  );

  renderNotices();
}

/* ---------------- タブ切替 ---------------- */

function selectTab(button, type){

  document
    .querySelectorAll(".top-tabs button")
    .forEach(btn => btn.classList.remove("active"));

  button.classList.add("active");

  document.getElementById("notice-section").classList.add("hidden");
  document.getElementById("ship-section").classList.add("hidden");
  document.getElementById("today-section").classList.add("hidden");
  document.getElementById("manage-section").classList.add("hidden");

  if(type === "notice"){
    document.getElementById("notice-section").classList.remove("hidden");
  }

  if(type === "ship"){
    document.getElementById("ship-section").classList.remove("hidden");
  }

  if(type === "today"){
    document.getElementById("today-section").classList.remove("hidden");
  }

  if(type === "manage"){
    document.getElementById("manage-section").classList.remove("hidden");
  }
}

/* ---------------- カレンダー ---------------- */

function openCalendar(){

  const calendar = document.getElementById("calendar");

  if(calendar.showPicker){
    calendar.showPicker();
  }else{
    calendar.click();
  }
}

/* ---------------- 初期 ---------------- */

renderNotices();

</script>

</body>
</html>
