<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>出荷注意アプリ</title>

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
    }

    header {
      background: #1f2937;
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 12px;
    }

    .day-card {
      background: white;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .day-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .notice {
      padding: 10px;
      border-radius: 8px;
      margin-top: 8px;
      color: white;
      font-size: 16px;
    }

    .normal {
      background: #6b7280;
    }

    .important {
      background: #f59e0b;
    }

    .urgent {
      background: #dc2626;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <header>出荷注意（今週）</header>

  <div class="container" id="app"></div>

  <script>
    const data = [
      {
        date: "5/6（水）",
        today: true,
        notices: [
          { level: "urgent", text: "大型ソファ出荷 / 2人作業必須" },
          { level: "important", text: "搬入口B使用（午前便）" }
        ]
      },
      {
        date: "5/7（木）",
        notices: [
          { level: "important", text: "ガラス製品あり" }
        ]
      },
      {
        date: "5/8（金）",
        notices: [
          { level: "normal", text: "通常出荷" }
        ]
      },
      {
        date: "5/9（土）",
        notices: []
      },
      {
        date: "5/10（日）",
        notices: []
      },
      {
        date: "5/11（月）",
        notices: []
      },
      {
        date: "5/12（火）",
        notices: []
      }
    ];

    const app = document.getElementById("app");

    data.forEach(day => {
      const card = document.createElement("div");
      card.className = "day-card";

      const title = document.createElement("div");
      title.className = "day-title";
      title.innerText = day.today ? `${day.date}【今日】` : day.date;
      card.appendChild(title);

      if (day.notices.length === 0) {
        const empty = document.createElement("div");
        empty.innerText = "注意事項なし";
        card.appendChild(empty);
      }

      day.notices.forEach(n => {
        const notice = document.createElement("div");
        notice.className = `notice ${n.level}`;
        notice.innerText = n.text;
        card.appendChild(notice);
      });

      const button = document.createElement("button");
      button.innerText = "確認しました";
      button.onclick = () => {
        alert(`${day.date} を確認しました`);
      };

      card.appendChild(button);
      app.appendChild(card);
    });
  </script>
</body>
</html>
