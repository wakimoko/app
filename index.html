<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>出荷管理</title>
</head>
<body>
<h1>出荷管理</h1>

<input id="titleInput" placeholder="タイトル"><br><br>
<textarea id="contentInput" placeholder="内容"></textarea><br><br>

<select id="statusInput">
  <option value="通常">通常</option>
  <option value="重要">重要</option>
</select><br><br>

<button onclick="addData()">追加する</button>

<hr>
<div id="message"></div>
<div id="list"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const client = window.supabase.createClient(
  "https://bylottznuwuizncgfltd.supabase.co",
  "sb_publishable_VDryMJYXIZUwumf5gxxqyw__ivv1upf"
);

let selectedDate = "4/20";
let selectedCategory = "管理";

async function loadData() {
  const { data, error } = await client
    .from("shipments")
    .select("*")
    .order("id", { ascending: false });

  const list = document.getElementById("list");
  const message = document.getElementById("message");

  if (error) {
    message.textContent = "読み込みエラー: " + error.message;
    return;
  }

  list.innerHTML = "";
  data.forEach(item => {
    const div = document.createElement("div");
    div.innerHTML = `<b>${item.title || ""}</b><br>${item.content || ""}<br>${item.status || ""}<hr>`;
    list.appendChild(div);
  });
}

async function addData() {
  const title = document.getElementById("titleInput").value;
  const content = document.getElementById("contentInput").value;
  const status = document.getElementById("statusInput").value;
  const message = document.getElementById("message");

  message.textContent = "追加中...";

  const { error } = await client.from("shipments").insert([{
    date: selectedDate,
    category: selectedCategory,
    title: title,
    content: content,
    status: status,
    done: false
  }]);

  if (error) {
    message.textContent = "追加エラー: " + error.message;
    return;
  }

  message.textContent = "追加しました";
  document.getElementById("titleInput").value = "";
  document.getElementById("contentInput").value = "";
  loadData();
}

loadData();
</script>
</body>
</html>
