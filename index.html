<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出荷管理</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  padding:20px;
  background:#f7f2ec;
  font-family:-apple-system;
  color:#5c4a3a;
}

h1{font-size:26px;margin-bottom:15px}

/* タブ */
button{
  border:none;
  border-radius:20px;
  padding:12px 16px;
  margin:4px;
  background:#e8dfd6;
  font-weight:700;
  transition:.15s;
}

button:active{
  transform:scale(0.94);
}

.active{
  background:#c8a98a !important;
  color:#fff !important;
  box-shadow:0 4px 10px rgba(90,70,50,0.18);
}

/* 日付 */
#dates{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
  margin-top:10px;
}

/* カード */
.card{
  background:#fff;
  border-radius:20px;
  padding:16px;
  margin-top:12px;
}

/* 行 */
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 0;
  border-bottom:1px solid #eadfd5;
}

/* いいね */
.like{
  margin-top:10px;
  background:#c8a98a;
  color:#fff;
}

</style>
</head>

<body>

<h1>出荷管理</h1>

<button onclick="setTab('notice')" id="tab_notice">注意事項</button>
<button onclick="setTab('today')" id="tab_today">当日出荷</button>
<button onclick="setTab('manage')" id="tab_manage">管理</button>

<div id="dates"></div>
<div id="view"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const client = window.supabase.createClient(
  "https://bylottznuwuizncgfltd.supabase.co",
  "sb_publishable_VDryMJYXIZUwumf5gxxqyw__ivv1upf"
);

let currentTab="notice";
let currentDate="5/4";
const dateList=["5/4","5/5","5/6","5/7","5/8"];

function setTab(tab){
  currentTab=tab;
  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab_"+tab).classList.add("active");
  renderDates();
  render();
}

function renderDates(){
  const box=document.getElementById("dates");
  box.innerHTML="";

  if(currentTab==="manage"){
    box.style.display="none";
    return;
  }

  box.style.display="grid";

  dateList.forEach(d=>{
    const btn=document.createElement("button");
    btn.innerText=d;
    if(d===currentDate) btn.classList.add("active");

    btn.onclick=()=>{
      currentDate=d;
      renderDates();
      render();
    };

    box.appendChild(btn);
  });
}

/* 表示 */
async function render(){
  const view=document.getElementById("view");
  view.innerHTML="";

  /* 注意事項 */
  if(currentTab==="notice"){
    const {data}=await client
      .from("shipments")
      .select("*")
      .eq("date",currentDate)
      .eq("category","notice");

    if(!data || data.length===0){
      view.innerHTML="<div class='card'>なし</div>";
      return;
    }

    data.forEach(item=>{
      view.innerHTML+=`
        <div class="card">
          <b>${item.title||""}</b><br>
          ${item.content||""}
          <button class="like"
            onclick="like(${item.id},${item.likes||0})">
            👍 ×${item.likes||0}
          </button>
        </div>
      `;
    });
  }

  /* 当日出荷 */
  if(currentTab==="today"){
    const {data}=await client
      .from("shipments")
      .select("*")
      .eq("date",currentDate)
      .eq("category","today")
      .single();

    if(!data){
      view.innerHTML="<div class='card'>データなし</div>";
      return;
    }

    view.innerHTML=`
      <div class="card">
        <h3>当日出荷</h3>
        ${row("2F","floor_2f",data.floor_2f)}
        ${row("2Fテーブル","table_2f",data.table_2f)}
        ${row("梱包場","packing",data.packing)}
        ${row("MJ倉庫","mj",data.mj)}
      </div>
    `;
  }

  /* 管理 */
  if(currentTab==="manage"){
    view.innerHTML=`
      <div class="card">
        <select id="date">
          ${dateList.map(d=>`<option>${d}</option>`).join("")}
        </select>

        <select id="category">
          <option value="notice">注意事項</option>
          <option value="today">当日出荷</option>
        </select>

        <input id="title" placeholder="タイトル">
        <textarea id="content"></textarea>

        <button class="active" onclick="add()">追加</button>
      </div>
    `;
  }
}

/* いいね */
async function like(id,count){
  await client
    .from("shipments")
    .update({likes:count+1})
    .eq("id",id);

  render();
}

/* 行 */
function row(label,key,value){
  return `
    <div class="row">
      <span>${label}</span>
      <button onclick="toggle('${key}',${value})"
        class="${value?'active':''}">
        ${value?"あり":"なし"}
      </button>
    </div>
  `;
}

/* 切替 */
async function toggle(key,value){
  await client
    .from("shipments")
    .update({[key]:!value})
    .eq("date",currentDate)
    .eq("category","today");

  render();
}

/* 追加 */
async function add(){
  await client.from("shipments").insert({
    date:document.getElementById("date").value,
    category:document.getElementById("category").value,
    title:document.getElementById("title").value,
    content:document.getElementById("content").value,
    likes:0
  });

  alert("追加OK");
  setTab("notice");
}

setTab("notice");

</script>
</body>
</html>
