<style>
.ship-row{
  position:relative;
  display:grid;
  grid-template-columns:1fr 54px 54px 76px;
  column-gap:7px;
  align-items:center;
  padding:14px 0 22px;
  border-bottom:1px solid #eadfd5;
}

.ship-row:last-child{
  border-bottom:none;
}

.ship-left{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.ship-company{
  font-size:21px;
  font-weight:900;
  line-height:1.1;
}

.ship-place{
  font-size:16px;
  font-weight:800;
  line-height:1;
}

.ship-buttons{
  display:contents;
}

.ship-buttons button{
  width:52px;
  height:36px;
  border-radius:9px;
  font-size:14px;
  font-weight:800;
  border:none;
}

.photo-text-group{
  position:absolute;
  right:6px;
  bottom:5px;
  display:flex;
  gap:14px;
  z-index:2;
}

.photo-text{
  border:none;
  background:transparent;
  padding:0;
  margin:0;
  color:#6b4b2f;
  font-size:9px;
  font-weight:800;
  line-height:1;
  text-decoration:underline;
  width:auto;
  height:auto;
  border-radius:0;
  white-space:nowrap;
}

.active{
  background:#b88a5a!important;
  color:#fff!important;
}
</style>

<script>
function shipRow(company,place,key){

  const status =
    localStorage.getItem(currentDate + "_" + key)
    || "なし";

  const photo = photoMap[key];

  return `
    <div class="ship-row">

      <div class="ship-left">
        <div class="ship-company">${company}</div>

        ${
          place !== "-"
          ? `<div class="ship-place">${place}</div>`
          : ``
        }
      </div>

      <div class="ship-buttons">

        <button
          class="${status === "あり" ? "active" : ""}"
          onclick="setShipStatus('${key}','あり')">
          あり
        </button>

        <button
          class="${status === "なし" ? "active" : ""}"
          onclick="setShipStatus('${key}','なし')">
          なし
        </button>

        <div class="photo-text-group">

          <button
            class="photo-text"
            onclick="${
              photo
              ? `openPhotoModal('${photo}')`
              : `alert('写真なし')`
            }">
            写真表示
          </button>

          <label class="photo-text">
            添付
            <input
              type="file"
              accept="image/*"
              hidden
              onchange="savePhoto(event,'${key}')">
          </label>

        </div>

      </div>

    </div>
  `;
}
</script>
