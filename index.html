<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>出荷管理</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:#f4ede4;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  color:#111;
}

.container{
  padding:16px 18px 90px;
  max-width:430px;
  margin:auto;
}

h1{
  font-size:34px;
  font-weight:900;
  margin:10px 0 22px;
}

.top-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:12px;
}

.top-tabs button{
  height:54px;
  border:none;
  border-radius:18px;
  background:#e6ddd4;
  font-size:14px;
  font-weight:900;
  color:#007aff;
}

.active{
  background:#be8b55!important;
  color:#fff!important;
}

.week-row{
  display:grid;
  grid-template-columns:1fr .7fr 1fr;
  gap:8px;
  margin-bottom:10px;
}

.week-row button{
  height:48px;
  border:none;
  border-radius:18px;
  background:#e6ddd4;
  font-size:15px;
  font-weight:900;
  color:#007aff;
}

.date-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-bottom:12px;
}

.date-row button{
  height:48px;
  border:none;
  border-radius:18px;
  background:#e6ddd4;
  font-size:17px;
  font-weight:900;
  color:#007aff;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:22px 22px 56px;
  position:relative;
  min-height:210px;
}

.notice-title{
  font-size:28px;
  font-weight:900;
  margin-bottom:14px;
}

.notice-title.important{
  color:red;
}

.notice-body{
  font-size:18px;
  line-height:1.5;
  white-space:pre-wrap;
}

.card-actions{
  position:absolute;
  right:18px;
  bottom:18px;
  display:flex;
  gap:10px;
}

.icon-btn{
  width:38px;
  height:38px;
  border:none;
  border-radius:50%;
  font-size:18px;
}

.edit-btn{background:#eadfd3}
.delete-btn{background:#f5d9d9}

.manage-box{
  background:#fff;
  border-radius:24px;
  padding:20px;
}

input,textarea,select{
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:15px;
}

textarea{
  height:90px;
}

.save-btn{
  width:100%;
  height:44px;
  border:none;
  border-radius:14px;
  background:#be8b55;
  color:#fff;
  font-size:16px;
  font-weight:900;
  margin-top:12px;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="container">

<h1>出荷管理</h1>

<div class="top-tabs">
  <button class="active" onclick="selectTab(this,'notice')">注意事項</button>
  <button onclick="selectTab(this,'ship')">出荷予定</button>
  <button onclick="selectTab(this,'today')">当日出荷</button>
  <button onclick="selectTab(this,'manage')">管理</button>
</div>

<div id="dateArea">
  <div class="week-row">
    <button onclick="alert('前週')">前週</button>
    <button onclick="openCalendar()">🗓️</button>
    <button onclick="alert('次週')">次週</button>
  </div>

  <div class="date-row">
    <button class="active">5/4</button>
    <button>5/5</button>
    <button>5/6</button>
    <button>5/7</button>
    <button>5/8</button>
  </div>
</div>

<input type="date" id="calendar" style="display:none">

<div id="notice-section">
  <div id="notice-list"></div>
</div>

<div id="manage-section" class="hidden">
  <div class="manage-box">
    <div class="notice-title">注意事項を追加</div>
    <input id="title" placeholder="タイトル">
    <textarea id="body" placeholder="内容"></textarea>
    <select id="status">
      <option value="通常">通常</option>
      <option value="重要">重要</option>
    </select>
    <button class="save-btn" onclick="saveNotice()">保存</button>
  </div>
</div>

</div>

<script>
let notices = JSON.parse(localStorage.getItem("notices") || "[]");
let editId = null;

function renderNotices(){
  const list = document.getElementById("notice-list");

  if(notices.length === 0){
    list.innerHTML = `
      <div class="card">
        <div class="notice-title">注意事項なし</div>
        <div class="notice-body">この日の注意事項はありません</div>
      </div>
    `;
    return;
  }

  list.innerHTML = notices.slice().reverse().map(item=>`
    <div class="card">
      <div class="notice-title ${item.status === "重要" ? "important" : ""}">
        ${item.title || ""}
      </div>

      <div class="notice-body">
        ${item.body || item.content || ""}
      </div>

      <div class="card-actions">
        <button class="icon-btn edit-btn" onclick="editNotice(${item.id})">✏️</button>
        <button class="icon-btn delete-btn" onclick="deleteNotice(${item.id})">🗑️</button>
      </div>
    </div>
  `).join("");
}

function saveNotice(){
  const title = document.getElementById("title").value.trim();
  const body = document.getElementById("body").value.trim();
  const status = document.getElementById("status").value;

  if(!title || !body){
    alert("入力してください");
    return;
  }

  if(editId){
    notices = notices.map(item =>
      item.id === editId ? {...item,title,body,status} : item
    );
    editId = null;
  }else{
    notices.push({
      id:Date.now(),
      title,
      body,
      status
    });
  }

  localStorage.setItem("notices",JSON.stringify(notices));

  document.getElementById("title").value = "";
  document.getElementById("body").value = "";

  selectTab(document.querySelectorAll(".top-tabs button")[0],"notice");
  renderNotices();
}

function editNotice(id){
  const item = notices.find(x=>x.id===id);
  if(!item) return;

  editId = id;

  document.getElementById("title").value = item.title || "";
  document.getElementById("body").value = item.body || item.content || "";
  document.getElementById("status").value = item.status || "通常";

  selectTab(document.querySelectorAll(".top-tabs button")[3],"manage");
}

function deleteNotice(id){
  if(!confirm("削除しますか？")) return;

  notices = notices.filter(item=>item.id!==id);
  localStorage.setItem("notices",JSON.stringify(notices));
  renderNotices();
}

function selectTab(button,type){
  document.querySelectorAll(".top-tabs button").forEach(btn=>{
    btn.classList.remove("active");
  });
  button.classList.add("active");

  document.getElementById("notice-section").classList.add("hidden");
  document.getElementById("manage-section").classList.add("hidden");

  if(type === "notice"){
    document.getElementById("dateArea").style.display = "block";
    document.getElementById("notice-section").classList.remove("hidden");
  }

  if(type === "manage"){
    document.getElementById("dateArea").style.display = "none";
    document.getElementById("manage-section").classList.remove("hidden");
  }

  if(type === "ship" || type === "today"){
    alert("この画面は次に作ります");
  }
}

function openCalendar(){
  const cal = document.getElementById("calendar");
  if(cal.showPicker){ cal.showPicker(); }
  else{ cal.click(); }
}

renderNotices();
</script>

</body>
</html>
