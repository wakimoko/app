```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出荷管理</title>

<style>
body{
  margin:0;
  padding:20px;
  background:#f6efe6;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;
  color:#111;
}

h1{
  font-size:28px;
  margin-bottom:25px;
}

button{
  border:none;
  border-radius:18px;
  background:#e6ddd4;
  color:#111;
  font-weight:bold;
  font-size:15px;
}

.active{
  background:#b88a5a!important;
  color:#fff!important;
}

.top-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:14px;
}

.top-tabs button{
  width:100%;
  padding:16px 0;
}

#weekControls{
  display:grid;
  grid-template-columns:1fr 0.8fr 1fr;
  gap:8px;
  margin-bottom:10px;
}

#weekControls button{
  width:100%;
  padding:12px 0;
}

#dates{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-bottom:15px;
}

#dates button{
  width:100%;
  padding:14px 0;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:24px;
  margin-top:10px;
  position:relative;
}

.item-title{
  font-size:24px;
  font-weight:800;
  margin-bottom:10px;
}

.item-content{
  font-size:18px;
  white-space:pre-wrap;
  margin-bottom:50px;
}

.important{
  color:red;
}

.icon-btn{
  position:absolute;
  bottom:14px;
  width:38px;
  height:38px;
  border-radius:50%;
  padding:0;
  font-size:18px;
}

.edit-btn{
  right:60px;
  background:#e6ddd4;
}

.delete-btn{
  right:14px;
  background:#f3d6d6;
}

input,textarea,select{
  width:100%;
  box-sizing:border-box;
  padding:12px;
  margin-top:12px;
  border-radius:14px;
  border:1px solid #ddd;
  font-size:16px;
}

textarea{
  height:110px;
}

.manage-save{
  width:100%;
  padding:14px 0;
  margin-top:14px;
  background:#b88a5a;
  color:#fff;
  font-size:16px;
}

#calendarBox{
  display:none;
  background:#fff;
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
}

.cal-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.cal-grid button{
  padding:10px 0;
  border-radius:12px;
  font-size:14px;
}
</style>
</head>

<body>

<h1>出荷管理</h1>

<div class="top-tabs">
  <button id="tab_notice" onclick="setTab('notice')">注意事項</button>
  <button id="tab_ship" onclick="setTab('ship')">出荷予定</button>
  <button id="tab_today" onclick="setTab('today')">当日出荷</button>
  <button id="tab_manage" onclick="setTab('manage')">管理</button>
</div>

<div id="weekControls"></div>
<div id="calendarBox"></div>
<div id="dates"></div>
<div id="view"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://bylottznuwuizncgfltd.supabase.co",
  "YOUR_SUPABASE_KEY"
);

let currentTab = "notice";
let currentDate = "";
let weekStart = getMonday(new Date());
let calendarMonth = new Date();
let editId = null;

function getMonday(date){
  const d = new Date(date);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d;
}

function formatDate(d){
  return (d.getMonth()+1)+"/"+d.getDate();
}

function setTab(tab){
  currentTab = tab;

  document.querySelectorAll(".top-tabs button")
    .forEach(btn => btn.classList.remove("active"));

  document.getElementById("tab_"+tab).classList.add("active");

  renderDates();
  render();
}

function renderDates(){
  const controls = document.getElementById("weekControls");
  const dates = document.getElementById("dates");

  if(currentTab === "manage"){
    controls.style.display = "none";
    dates.style.display = "none";
    return;
  }

  controls.style.display = "grid";
  dates.style.display = "grid";

  controls.innerHTML =     <button onclick="moveWeek(-1)">前週</button>     <button onclick="toggleCalendar()">🗓️</button>     <button onclick="moveWeek(1)">次週</button>  ;

  dates.innerHTML = "";

  for(let i=0;i<5;i++){
    const d = new Date(weekStart);
    d.setDate(d.getDate()+i);

    const text = formatDate(d);

    if(!currentDate && i===0){
      currentDate = text;
    }

    const btn = document.createElement("button");
    btn.textContent = text;

    if(text===currentDate){
      btn.classList.add("active");
    }

    btn.onclick = ()=>{
      currentDate = text;
      renderDates();
      render();
    };

    dates.appendChild(btn);
  }
}

function moveWeek(n){
  weekStart.setDate(weekStart.getDate() + (7n));
  currentDate = "";
  renderDates();
  render();
}

function toggleCalendar(){
  const box = document.getElementById("calendarBox");

  if(box.style.display === "block"){
    box.style.display = "none";
    return;
  }

  box.style.display = "block";
  renderCalendar();
}

function renderCalendar(){
  const box = document.getElementById("calendarBox");

  const y = calendarMonth.getFullYear();
  const m = calendarMonth.getMonth();

  const first = new Date(y,m,1);
  const last = new Date(y,m+1,0);

  let html = `
    <div class="cal-head">
      <button onclick="changeMonth(-1)">←</button>
      <b>${y} / ${m+1}</b>
      <button onclick="changeMonth(1)">→</button>
    </div>
    <div class="cal-grid">
  `;

  for(let i=0;i<first.getDay();i++){
    html += `<div></div>`;
  }

  for(let d=1; d<=last.getDate(); d++){
    html += `
      <button onclick="selectCalendarDate(${y},${m},${d})">
        ${d}
      </button>
    `;
  }

  html += `</div>`;

  box.innerHTML = html;
}

function changeMonth(n){
  calendarMonth.setMonth(calendarMonth.getMonth()+n);
  renderCalendar();
}

function selectCalendarDate(y,m,d){
  const selected = new Date(y,m,d);

  weekStart = getMonday(selected);
  currentDate = formatDate(selected);

  document.getElementById("calendarBox").style.display = "none";

  renderDates();
  render();
}

async function render(){
  const view = document.getElementById("view");
  view.innerHTML = "";

  if(currentTab==="ship"){
    view.innerHTML = `
      <div class="card">
        <div class="item-title">出荷予定</div>
        <div class="item-content">
佐川急便
2F

福山通運
2F / 梱包場 / MJ倉庫
        </div>
      </div>
    `;
    return;
  }

  if(currentTab==="today"){
    view.innerHTML = `
      <div class="card">
        <div class="item-title">当日出荷</div>
        <div class="item-content">
2F：あり / なし
2Fテーブル：あり / なし
梱包場：あり / なし
MJ倉庫：あり / なし
        </div>
      </div>
    `;
    return;
  }

  if(currentTab==="notice"){
    const {data,error} = await client
      .from("shipments")
      .select("")
      .eq("date",currentDate)
      .eq("category","notice")
      .order("id",{ascending:false});

    if(error){
      view.innerHTML = `<div class="card">${error.message}</div>`;
      return;
    }

    if(!data || data.length===0){
      view.innerHTML = `<div class="card">データなし</div>`;
      return;
    }

    data.forEach(item=>{
      view.innerHTML += `
        <div class="card">
          <div class="item-title ${item.status==="重要" ? "important" : ""}">
            ${item.title || ""}
          </div>

          <div class="item-content">
            ${item.content || ""}
          </div>

          <button class="icon-btn edit-btn"
            onclick='startEdit(${JSON.stringify(item)})'>
            ✏️
          </button>

          <button class="icon-btn delete-btn"
            onclick="deleteItem(${item.id})">
            🗑️
          </button>
        </div>
      `;
    });
  }

  if(currentTab==="manage"){
    view.innerHTML = `
      <div class="card">

        <select id="dateInput"></select>

        <input id="title" placeholder="タイトル">

        <textarea id="content" placeholder="内容"></textarea>

        <select id="status">
          <option value="通常">通常</option>
          <option value="重要">重要</option>
        </select>

        <button class="manage-save"
          onclick="${editId ? "saveEdit()" : "addData()"}">
          ${editId ? "保存" : "追加"}
        </button>

      </div>
    `;

    const select = document.getElementById("dateInput");

    for(let i=0;i<5;i++){
      const d = new Date(weekStart);
      d.setDate(d.getDate()+i);

      const text = formatDate(d);

      select.innerHTML += `<option>${text}</option>`;
    }

    select.value = currentDate;
  }
}

async function addData(){
  const title = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();

  if(!title || !content){
    alert("入力してください");
    return;
  }

  const {error} = await client
    .from("shipments")
    .insert({
      date:document.getElementById("dateInput").value,
      category:"notice",
      title,
      content,
      status:document.getElementById("status").value
    });

  if(error){
    alert(error.message);
    return;
  }

  currentDate = document.getElementById("dateInput").value;

  setTab("notice");
}

function startEdit(item){
  editId = item.id;

  setTab("manage");

  setTimeout(()=>{
    document.getElementById("dateInput").value = item.date;
    document.getElementById("title").value = item.title;
    document.getElementById("content").value = item.content;
    document.getElementById("status").value = item.status;
  },100);
}

async function saveEdit(){
  const {error} = await client
    .from("shipments")
    .update({
      date:document.getElementById("dateInput").value,
      title:document.getElementById("title").value,
      content:document.getElementById("content").value,
      status:document.getElementById("status").value
    })
    .eq("id",editId);

  if(error){
    alert(error.message);
    return;
  }

  editId = null;

  setTab("notice");
}

async function deleteItem(id){
  if(!confirm("削除しますか？")) return;

  const {error} = await client
    .from("shipments")
    .delete()
    .eq("id",id);

  if(error){
    alert(error.message);
    return;
  }

  render();
}

setTab("notice");
</script>

</body>
</html>
