<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>出荷管理</title>

<style>

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  background:#f4ede4;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  color:#111;
}

.app{
  padding:26px 22px 40px;
  max-width:430px;
  margin:auto;
}

h1{
  font-size:54px;
  font-weight:900;
  margin:18px 0 28px;
}

.top-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:18px;
}

.top-tabs button{
  height:88px;
  border:none;
  border-radius:26px;
  background:#e6ddd4;
  font-size:22px;
  font-weight:900;
}

.top-tabs .active{
  background:#be8b55;
  color:#fff;
}

.week-nav{
  display:grid;
  grid-template-columns:1fr .7fr 1fr;
  gap:14px;
  margin-bottom:18px;
}

.week-nav button{
  height:82px;
  border:none;
  border-radius:24px;
  background:#e6ddd4;
  font-size:22px;
  font-weight:900;
}

.dates{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:14px;
  margin-bottom:22px;
}

.dates button{
  height:82px;
  border:none;
  border-radius:24px;
  background:#e6ddd4;
  font-size:24px;
  font-weight:900;
}

.dates .active{
  background:#be8b55;
  color:#fff;
}

.card{
  background:#fff;
  border-radius:34px;
  padding:20px 18px 10px;
}

.ship-row{
  padding:18px 0 16px;
  border-bottom:2px solid #efe5dc;
}

.ship-row:last-child{
  border-bottom:none;
}

.ship-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.ship-left{
  display:flex;
  flex-direction:column;
}

.ship-company{
  font-size:28px;
  font-weight:900;
  line-height:1.1;
}

.ship-place{
  font-size:20px;
  font-weight:800;
  margin-top:8px;
}

.ship-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
}

.ship-status{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
}

.ship-status button{
  min-width:74px;
  height:42px;
  border:none;
  border-radius:999px;
  background:#e6ddd4;
  font-size:18px;
  font-weight:900;
  color:#111;
}

.ship-status .active{
  background:#be8b55;
  color:#fff;
}

.photo-links{
  display:flex;
  gap:18px;
  margin-top:12px;
}

.photo-links button,
.photo-links label{
  border:none;
  background:none;
  padding:0;
  margin:0;
  font-size:14px;
  font-weight:700;
  color:#8b5d33;
  text-decoration:underline;
}

.photo-links input{
  display:none;
}

</style>
</head>

<body>

<div class="app">

<h1>出荷管理</h1>

<div class="top-tabs">
  <button>注意事項</button>
  <button class="active">出荷予定</button>
  <button>当日出荷</button>
  <button>管理</button>
</div>

<div class="week-nav">
  <button>前週</button>
  <button>🗓️</button>
  <button>次週</button>
</div>

<div class="dates">
  <button class="active">5/4</button>
  <button>5/5</button>
  <button>5/6</button>
  <button>5/7</button>
  <button>5/8</button>
</div>

<div class="card">

  <!-- 佐川 -->
  <div class="ship-row">

    <div class="ship-top">

      <div class="ship-left">
        <div class="ship-company">佐川急便</div>
        <div class="ship-place">2F</div>
      </div>

      <div class="ship-right">

        <div class="ship-status">
          <button class="active">あり</button>
          <button>なし</button>
        </div>

        <div class="photo-links">
          <button>写真表示</button>

          <label>
            添付
            <input type="file" accept="image/*">
          </label>
        </div>

      </div>

    </div>

  </div>

  <!-- 福山 -->
  <div class="ship-row">

    <div class="ship-top">

      <div class="ship-left">
        <div class="ship-company">福山通運</div>
        <div class="ship-place">2F</div>
      </div>

      <div class="ship-right">

        <div class="ship-status">
          <button class="active">あり</button>
          <button>なし</button>
        </div>

        <div class="photo-links">
          <button>写真表示</button>

          <label>
            添付
            <input type="file" accept="image/*">
          </label>
        </div>

      </div>

    </div>

  </div>

  <!-- 梱包場 -->
  <div class="ship-row">

    <div class="ship-top">

      <div class="ship-left">
        <div class="ship-company">梱包場</div>
        <div class="ship-place">2F</div>
      </div>

      <div class="ship-right">

        <div class="ship-status">
          <button>あり</button>
          <button class="active">なし</button>
        </div>

        <div class="photo-links">
          <button>写真表示</button>

          <label>
            添付
            <input type="file" accept="image/*">
          </label>
        </div>

      </div>

    </div>

  </div>

  <!-- MJ -->
  <div class="ship-row">

    <div class="ship-top">

      <div class="ship-left">
        <div class="ship-company">MJ倉庫</div>
        <div class="ship-place">2F</div>
      </div>

      <div class="ship-right">

        <div class="ship-status">
          <button>あり</button>
          <button class="active">なし</button>
        </div>

        <div class="photo-links">
          <button>写真表示</button>

          <label>
            添付
            <input type="file" accept="image/*">
          </label>
        </div>

      </div>

    </div>

  </div>

</div>

</div>

</body>
</html>
