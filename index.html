<style>
.ship-row{
  position:relative;
  display:grid;
  grid-template-columns:1fr 68px 68px;
  column-gap:10px;
  align-items:center;
  padding:16px 0 28px;
  border-bottom:1px solid #eadfd5;
}

.ship-row:last-child{
  border-bottom:none;
}

.ship-left{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.ship-company{
  font-size:18px;
  font-weight:900;
  line-height:1.2;
}

.ship-place{
  font-size:18px;
  font-weight:800;
}

.ship-buttons{
  display:contents;
}

.ship-buttons button{
  width:68px;
  height:42px;
  border:none;
  border-radius:999px;
  font-size:17px;
  font-weight:800;
  background:#e6ddd4;
  color:#111;
}

.active{
  background:#b88a5a!important;
  color:#fff!important;
}

.photo-text-group{
  position:absolute;
  right:4px;
  bottom:6px;
  display:flex;
  gap:16px;
}

.photo-text{
  border:none;
  background:transparent;
  padding:0;
  margin:0;
  color:#6b4b2f;
  font-size:9px;
  font-weight:800;
  text-decoration:underline;
}
</style>

<script>
function shipRow(company,place,key){

  const status =
    localStorage.getItem(currentDate + "_" + key)
    || "なし";

  const photo = photoMap[key];

  return `
    <div class="ship-row">

      <div class="ship-left">

        <div class="ship-company">
          ${company}
        </div>

        ${
          place !== "-"
          ? `<div class="ship-place">${place}</div>`
          : `<div class="ship-place"></div>`
        }

      </div>

      <div class="ship-buttons">

        <button
          class="${status === "あり" ? "active" : ""}"
          onclick="setShipStatus('${key}','あり')">
          あり
        </button>

        <button
          class="${status === "なし" ? "active" : ""}"
          onclick="setShipStatus('${key}','なし')">
          なし
        </button>

        <div class="photo-text-group">

          <button
            class="photo-text"
            onclick="${
              photo
              ? `openPhotoModal('${photo}')`
              : `alert('写真なし')`
            }">
            写真表示
          </button>

          <label class="photo-text">
            添付
            <input
              type="file"
              accept="image/*"
              hidden
              onchange="savePhoto(event,'${key}')">
          </label>

        </div>

      </div>

    </div>
  `;
}
</script>
