<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出荷管理</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  padding:20px;
  background:#f6efe6;
  color:#111;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
}

h1{
  font-size:34px;
  margin:28px 0;
  font-weight:900;
}

button{
  border:none;
  border-radius:18px;
  background:#e6ddd4;
  color:#111;
  font-weight:800;
  font-size:15px;
}

button:active{transform:scale(.96)}

.active{
  background:#b88a5a!important;
  color:#fff!important;
}

.top-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:16px;
}

.top-tabs button{padding:14px 0}

#weekControls{
  display:grid;
  grid-template-columns:1fr .7fr 1fr;
  gap:8px;
  margin-bottom:10px;
}

#weekControls button{padding:12px 0;width:100%}

#dates{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-bottom:16px;
}

#dates button{padding:14px 0;width:100%}

.card{
  background:#fff;
  border-radius:24px;
  padding:24px;
  margin-top:14px;
  position:relative;
  min-height:150px;
}

.item-title{
  font-size:24px;
  font-weight:900;
  margin-bottom:12px;
  text-align:left;
}

.item-content{
  font-size:19px;
  line-height:1.7;
  white-space:pre-wrap;
  text-align:left;
  padding-bottom:48px;
}

.important{color:red}

.icon-btn{
  position:absolute;
  bottom:14px;
  width:38px;
  height:38px;
  border-radius:50%;
  padding:0;
  font-size:18px;
}

.edit-btn{
  right:60px;
  background:#e6ddd4;
}

.delete-btn{
  right:14px;
  background:#f3d6d6;
}

input,textarea,select{
  width:100%;
  padding:14px;
  margin-top:14px;
  border-radius:14px;
  border:1px solid #ddd;
  font-size:16px;
}

textarea{height:120px}

.save-btn{
  width:100%;
  padding:15px 0;
  margin-top:16px;
  background:#b88a5a;
  color:#fff;
}

.cancel-btn{
  width:100%;
  padding:15px 0;
  margin-top:10px;
}

#calendarBox{
  display:none;
  background:#fff;
  border-radius:22px;
  padding:16px;
  margin-bottom:16px;
}

.cal-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.cal-head button{padding:8px 14px}

.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  text-align:center;
}

.cal-grid div{
  padding:8px 0;
  font-weight:800;
}

.cal-grid button{
  padding:10px 0;
  border-radius:12px;
}

.ship-group{margin-top:24px}

.ship-company{
  font-size:24px;
  font-weight:900;
  margin-bottom:12px;
}

.ship-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 0;
  border-bottom:1px solid #eadfd5;
}

.ship-place{
  font-size:20px;
  font-weight:700;
}

.ship-buttons{
  display:flex;
  gap:8px;
}

.ship-buttons button{
  padding:10px 16px;
  border-radius:14px;
}
</style>
</head>

<body>

<h1>出荷管理</h1>

<div class="top-tabs">
  <button id="tab_notice" onclick="setTab('notice')">注意事項</button>
  <button id="tab_ship" onclick="setTab('ship')">出荷予定</button>
  <button id="tab_today" onclick="setTab('today')">当日出荷</button>
  <button id="tab_manage" onclick="setTab('manage')">管理</button>
</div>

<div id="weekControls"></div>
<div id="calendarBox"></div>
<div id="dates"></div>
<div id="view"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = supabase.createClient(
  "https://bylottznuwuizncgfltd.supabase.co",
  "sb_publishable_VDryMJYXIZUwumf5gxxqyw__ivv1upf"
);

let currentTab = "notice";
let currentDate = "";
let weekStart = getMonday(new Date());
let calendarMonth = new Date();
let editId = null;
let lastItems = [];

function esc(text){
  return String(text ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function getMonday(date){
  const d = new Date(date);
  const day = d.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d;
}

function formatDate(date){
  return (date.getMonth()+1) + "/" + date.getDate();
}

function setTab(tab){
  currentTab = tab;

  document.querySelectorAll(".top-tabs button").forEach(btn=>{
    btn.classList.remove("active");
  });

  document.getElementById("tab_" + tab).classList.add("active");
  document.getElementById("calendarBox").style.display = "none";

  renderDates();
  render();
}

function renderDates(){
  const controls = document.getElementById("weekControls");
  const dates = document.getElementById("dates");

  controls.innerHTML = "";
  dates.innerHTML = "";

  if(currentTab === "manage"){
    controls.style.display = "none";
    dates.style.display = "none";
    return;
  }

  controls.style.display = "grid";
  dates.style.display = "grid";

  controls.innerHTML = `
    <button onclick="moveWeek(-1)">前週</button>
    <button onclick="toggleCalendar()">🗓️</button>
    <button onclick="moveWeek(1)">次週</button>
  `;

  for(let i=0;i<5;i++){
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate()+i);

    const text = formatDate(d);

    if(!currentDate && i === 0){
      currentDate = text;
    }

    const btn = document.createElement("button");
    btn.textContent = text;

    if(text === currentDate){
      btn.classList.add("active");
    }

    btn.onclick = ()=>{
      currentDate = text;
      document.getElementById("calendarBox").style.display = "none";
      renderDates();
      render();
    };

    dates.appendChild(btn);
  }
}

function moveWeek(num){
  weekStart.setDate(weekStart.getDate() + 7*num);
  currentDate = "";
  renderDates();
  render();
}

function toggleCalendar(){
  const box = document.getElementById("calendarBox");

  if(box.style.display === "block"){
    box.style.display = "none";
    return;
  }

  box.style.display = "block";
  renderCalendar();
}

function renderCalendar(){
  const box = document.getElementById("calendarBox");
  const year = calendarMonth.getFullYear();
  const month = calendarMonth.getMonth();

  const first = new Date(year, month, 1);
  const last = new Date(year, month + 1, 0);

  let html = `
    <div class="cal-head">
      <button onclick="changeMonth(-1)">前月</button>
      <b>${year}/${month+1}</b>
      <button onclick="changeMonth(1)">次月</button>
    </div>
    <div class="cal-grid">
      <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
  `;

  for(let i=0;i<first.getDay();i++){
    html += `<div></div>`;
  }

  for(let day=1;day<=last.getDate();day++){
    html += `<button onclick="pickDate(${year},${month},${day})">${day}</button>`;
  }

  html += `</div>`;
  box.innerHTML = html;
}

function changeMonth(num){
  calendarMonth.setMonth(calendarMonth.getMonth()+num);
  renderCalendar();
}

function pickDate(year,month,day){
  const selected = new Date(year,month,day);

  weekStart = getMonday(selected);
  currentDate = formatDate(selected);

  document.getElementById("calendarBox").style.display = "none";

  renderDates();
  render();
}

function shipRow(place, key){
  const status = localStorage.getItem(currentDate + "_" + key) || "なし";

  return `
    <div class="ship-row">
      <div class="ship-place">${place}</div>

      <div class="ship-buttons">
        <button class="${status === "あり" ? "active" : ""}"
          onclick="setShipStatus('${key}','あり')">
          あり
        </button>

        <button class="${status === "なし" ? "active" : ""}"
          onclick="setShipStatus('${key}','なし')">
          なし
        </button>
      </div>
    </div>
  `;
}

function setShipStatus(key, value){
  localStorage.setItem(currentDate + "_" + key, value);
  render();
}

async function render(){
  const view = document.getElementById("view");
  view.innerHTML = "";

  if(currentTab === "ship"){
    view.innerHTML = `
      <div class="card">
        <div class="item-title">出荷予定</div>

        <div class="ship-group">
          <div class="ship-company">佐川急便</div>
          ${shipRow("2F", "sagawa_2f")}
        </div>

        <div class="ship-group">
          <div class="ship-company">福山通運</div>
          ${shipRow("2F", "fukuyama_2f")}
          ${shipRow("梱包場", "fukuyama_packing")}
          ${shipRow("MJ倉庫", "fukuyama_mj")}
        </div>
      </div>
    `;
    return;
  }

  if(currentTab === "today"){
    view.innerHTML = `
      <div class="card">
        <div class="item-title">当日出荷</div>
        <div class="item-content">2F：あり / なし
2Fテーブル：あり / なし
梱包場：あり / なし
MJ倉庫：あり / なし</div>
      </div>
    `;
    return;
  }

  if(currentTab === "notice"){
    const {data,error} = await client
      .from("shipments")
      .select("*")
      .eq("date",currentDate)
      .eq("category","notice")
      .order("id",{ascending:false});

    if(error){
      view.innerHTML = `<div class="card">${esc(error.message)}</div>`;
      return;
    }

    if(!data || data.length === 0){
      view.innerHTML = `<div class="card">データなし</div>`;
      return;
    }

    lastItems = data;

    data.forEach(item=>{
      view.innerHTML += `
        <div class="card">
          <div class="item-title ${item.status === "重要" ? "important" : ""}">
            ${esc(item.title)}
          </div>

          <div class="item-content">${esc(item.content)}</div>

          <button class="icon-btn edit-btn" onclick="startEditById(${item.id})">✏️</button>
          <button class="icon-btn delete-btn" onclick="deleteItem(${item.id})">🗑️</button>
        </div>
      `;
    });

    return;
  }

  if(currentTab === "manage"){
    view.innerHTML = `
      <div class="card">
        <select id="dateInput"></select>

        <input id="title" placeholder="タイトル">

        <textarea id="content" placeholder="内容"></textarea>

        <select id="status">
          <option value="通常">通常</option>
          <option value="重要">重要</option>
        </select>

        <button class="save-btn" onclick="${editId ? "saveEdit()" : "addData()"}">
          ${editId ? "保存" : "追加"}
        </button>

        ${editId ? `<button class="cancel-btn" onclick="cancelEdit()">キャンセル</button>` : ""}
      </div>
    `;

    const select = document.getElementById("dateInput");

    for(let i=0;i<5;i++){
      const d = new Date(weekStart);
      d.setDate(weekStart.getDate()+i);

      const text = formatDate(d);
      select.innerHTML += `<option>${text}</option>`;
    }

    select.value = currentDate;
  }
}

async function addData(){
  const title = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();
  const status = document.getElementById("status").value;
  const date = document.getElementById("dateInput").value;

  if(!title || !content){
    alert("タイトルと内容を入力してください");
    return;
  }

  const {error} = await client
    .from("shipments")
    .insert({
      date,
      category:"notice",
      title,
      content,
      status
    });

  if(error){
    alert(error.message);
    return;
  }

  currentDate = date;
  setTab("notice");
}

function startEditById(id){
  const item = lastItems.find(x => x.id === id);
  if(!item) return;

  editId = id;
  setTab("manage");

  setTimeout(()=>{
    document.getElementById("dateInput").value = item.date || currentDate;
    document.getElementById("title").value = item.title || "";
    document.getElementById("content").value = item.content || "";
    document.getElementById("status").value = item.status || "通常";
  },100);
}

async function saveEdit(){
  const title = document.getElementById("title").value.trim();
  const content = document.getElementById("content").value.trim();
  const status = document.getElementById("status").value;
  const date = document.getElementById("dateInput").value;

  if(!title || !content){
    alert("タイトルと内容を入力してください");
    return;
  }

  const {error} = await client
    .from("shipments")
    .update({
      date,
      title,
      content,
      status
    })
    .eq("id",editId);

  if(error){
    alert(error.message);
    return;
  }

  editId = null;
  currentDate = date;
  setTab("notice");
}

function cancelEdit(){
  editId = null;
  setTab("notice");
}

async function deleteItem(id){
  if(!confirm("削除しますか？")) return;

  const {error} = await client
    .from("shipments")
    .delete()
    .eq("id",id);

  if(error){
    alert(error.message);
    return;
  }

  render();
}

setTab("notice");
</script>

</body>
</html>
