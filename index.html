<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  background:#f3eee6;
  font-family:"Hiragino Maru Gothic ProN","Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  -webkit-font-smoothing:antialiased;
  color:#111;
  overflow-x:hidden;
}

.container{
  max-width:430px;
  margin:auto;
  padding:4px 10px 24px;
  transform:scale(.90);
  transform-origin:top center;
}

h1{font-size:32px;font-weight:900;margin:6px 0 16px}
button{border:none;cursor:pointer;font-family:inherit}

.top-tabs{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:10px;
}

.top-tabs button{
  height:42px;
  border-radius:15px;
  background:#e6ddd4;
  color:#111;
  font-size:12px;
  font-weight:900;
}

#todayBtn{line-height:1.2;font-size:11px}
.active{background:#c99657!important;color:#fff!important}

.week-row{
  display:grid;
  grid-template-columns:1fr .7fr 1fr;
  gap:8px;
  margin-bottom:8px;
}

.week-row button{
  height:38px;
  border-radius:14px;
  background:#e6ddd4;
  color:#111;
  font-size:12px;
  font-weight:900;
}

.date-row{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-bottom:10px;
}

.date-row button{
  height:38px;
  border-radius:14px;
  background:#e6ddd4;
  color:#111;
  font-size:14px;
  font-weight:900;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:14px;
  position:relative;
  min-height:108px;
  margin-bottom:10px;
}

.group-title{font-size:19px;font-weight:900;margin-bottom:8px}

  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:10px 0;
  gap:10px;
}

.place{
  font-size:18px;
  font-weight:900;
  width:88px;
}

.toggle-wrap{
  display:flex;
  gap:10px;
  margin-left:auto;
}

.toggle{
  width:84px;
  height:44px;
  border-radius:999px;
  font-size:15px;
  font-weight:900;
  background:#e6ddd4;
  color:#111;
}

.toggle.active{
  background:#d0a05c!important;
  color:#fff!important;
}

.photo-actions{
  display:flex;
  align-items:center;
  gap:10px;
  margin-left:8px;

.photo-btn,

.save-text{

.bottom-btn{

.passcode-overlay{

.passcode-box{

.pin-dot{

.pin-pad{

  grid-template-columns:repeat(3,1fr);

  font-weight:500;

.pin-btn:active{

.photo-modal{

<script>

const DROPBOX_LINK =
"https://www.dropbox.com/scl/fo/fquqg1cjqv0aq0y6fdy31/ABvsncXfzuukneSRy_qiBeo?rlkey=390kzz8a0cmuaf7xdclh3twtv&st=4mxiq5q8&dl=0";

let pinCode = "";

function pressPin(num){

if(pinCode.length >= 4)return;

pinCode += num;

updateDots();

}

function clearPin(){

pinCode = "";

updateDots();

}

function updateDots(){

const dots =
document.querySelectorAll(".pin-dot");

dots.forEach((dot,index)=>{

dot.style.background =
index < pinCode.length
? "#6d4d2e"
: "#ddd2c7";

});

}
  function loginApp(){

if(pinCode === "0714"){

loginScreen.style.display = "none";

localStorage.setItem(
"shipment-login",
"ok"
);

}else{

alert("パスコードが違います");

clearPin();

}

}

window.onload = ()=>{

if(
localStorage.getItem(
"shipment-login"
) === "ok"
){

loginScreen.style.display =
"none";

}

};

function openDropbox(){

window.open(
DROPBOX_LINK,
"_blank"
);

}

function closePhotos(){

photoModal.style.display =
"none";

}

function esc(str){

return String(str ?? "")

.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");

}

function formatDate(d){

return
(d.getMonth()+1)
+
"/"
+
d.getDate();

}

function weekday(d){

return
["日","月","火","水","木","金","土"]
[d.getDay()];

}

function nowText(){

const d = new Date();

return `
${formatDate(d)}
${String(d.getHours()).padStart(2,"0")}
:
${String(d.getMinutes()).padStart(2,"0")}
`;

}

let selectedDate =
new Date();

let weekStart =
getMonday(new Date());

function getMonday(date){

const d =
new Date(date);

const day =
d.getDay();

d.setDate(
d.getDate()
+
(day===0?-6:1-day)
);

return d;

}
  function sameDate(a,b){

return
a.getFullYear()===b.getFullYear()
&&
a.getMonth()===b.getMonth()
&&
a.getDate()===b.getDate();

}

function renderDates(){

dateRow.innerHTML = "";

for(let i=0;i<5;i++){

const d =
new Date(weekStart);

d.setDate(
weekStart.getDate()+i
);

const btn =
document.createElement(
"button"
);

btn.textContent =
formatDate(d);

if(
sameDate(
d,
selectedDate
)
){
btn.classList.add(
"active"
);
}

btn.onclick = ()=>{

selectedDate =
new Date(d);

renderDates();

renderShip();

};

dateRow.appendChild(btn);

}

}

};

calendarPopup.style.display =
"none";

modalBg.style.display =

};

prevWeek.onclick = ()=>{

weekStart.setDate(
weekStart.getDate()-7
);

selectedDate =
new Date(weekStart);

renderDates();

renderShip();

};

nextWeek.onclick = ()=>{

weekStart.setDate(
weekStart.getDate()+7
);

selectedDate =
new Date(weekStart);

renderDates();

renderShip();

};

document.addEventListener(
"click",
e=>{

if(
e.target.classList.contains(
"toggle"
)
){

const wrap =
e.target.parentElement;

wrap.querySelectorAll(
".toggle"
).forEach(btn=>{

btn.classList.remove(
"active"
);

});

e.target.classList.add(
"active"
);

}

}
);
