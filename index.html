<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>出荷管理</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  padding:20px;
  background:#f6efe6;
  font-family:sans-serif;
  color:#111;
}

h1{
  font-size:28px;
  margin-bottom:15px;
}

/* ボタン */
button{
  margin:5px;
  padding:12px 16px;
  border:none;
  border-radius:18px;
  background:#e6ddd4;
  color:#111;
  font-weight:bold;
}

.active{
  background:#b88a5a;
  color:#fff;
}

/* カード */
.card{
  background:#fff;
  padding:20px;
  border-radius:20px;
  margin-top:15px;
}

/* タイトル・詳細 */
.item-title{
  font-size:22px;
  font-weight:800;
  margin-bottom:6px;
}

.item-content{
  font-size:18px;
  margin-bottom:12px;
}

/* 重要 */
.important{
  color:red;
}

/* いいね */
.like{
  background:#b88a5a;
  color:white;
}
</style>
</head>

<body>

<h1>出荷管理</h1>

<div>
  <button id="tab_notice" onclick="setTab('notice')">注意事項</button>
  <button id="tab_ship" onclick="setTab('ship')">出荷予定</button>
  <button id="tab_today" onclick="setTab('today')">当日出荷</button>
  <button id="tab_manage" onclick="setTab('manage')">管理</button>
</div>

<div id="dates"></div>
<div id="view"></div>

<script>
const client = supabase.createClient(
  "https://bylottznuwuizncgfltd.supabase.co",
  "sb_publishable_VDryMJYXIZUwumf5gxxqyw__ivv1upf"
);

let currentTab="notice";
let currentDate="5/4";
const dateList=["5/4","5/5","5/6","5/7","5/8"];

/* タブ */
function setTab(tab){
  currentTab=tab;

  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  document.getElementById("tab_"+tab).classList.add("active");

  renderDates();
  render();
}

/* 日付 */
function renderDates(){
  const box=document.getElementById("dates");
  box.innerHTML="";

  if(currentTab==="manage") return;

  dateList.forEach(d=>{
    let btn=document.createElement("button");
    btn.textContent=d;

    if(d===currentDate) btn.classList.add("active");

    btn.onclick=()=>{
      currentDate=d;
      renderDates();
      render();
    };

    box.appendChild(btn);
  });
}

/* 表示 */
async function render(){
  const view=document.getElementById("view");
  view.innerHTML="";

  /* 出荷予定（固定） */
  if(currentTab==="ship"){
    view.innerHTML=`
      <div class="card">
        <h3>出荷予定</h3>
        佐川急便 2F<br><br>
        福山通運 2F / 梱包場 / MJ倉庫
      </div>
    `;
    return;
  }

  /* 注意事項 */
  if(currentTab==="notice"){
    let {data}=await client.from("shipments")
      .select("*")
      .eq("date",currentDate)
      .eq("category","notice");

    if(!data || data.length===0){
      view.innerHTML='<div class="card">データなし</div>';
      return;
    }

    data.forEach(item=>{
      view.innerHTML+=`
        <div class="card">
          <div class="item-title ${item.status==="重要"?"important":""}">
            ${item.title || ""}
          </div>

          <div class="item-content">
            ${item.content || ""}
          </div>

          <button class="like"
            onclick="like(${item.id}, ${item.likes||0})">
            ${localStorage.getItem("liked_"+item.id) ? "👍 済" : "👍"}
            ×${item.likes||0}
          </button>
        </div>
      `;
    });
  }

  /* 当日出荷（簡易） */
  if(currentTab==="today"){
    view.innerHTML=`
      <div class="card">
        <h3>当日出荷</h3>
        2F：あり / なし<br>
        2Fテーブル：あり / なし<br>
        梱包場：あり / なし<br>
        MJ倉庫：あり / なし
      </div>
    `;
  }

  /* 管理 */
  if(currentTab==="manage"){
    view.innerHTML=`
      <div class="card">
        <h3>追加</h3>

        <select id="dateInput">
          ${dateList.map(d=>`<option>${d}</option>`).join("")}
        </select>

        <select id="category">
          <option value="notice">注意事項</option>
        </select>

        <input id="title" placeholder="タイトル">
        <textarea id="content" placeholder="内容"></textarea>

        <select id="status">
          <option value="通常">通常</option>
          <option value="重要">重要</option>
        </select>

        <button class="active" onclick="addData()">追加</button>
      </div>
    `;
  }
}

/* 追加 */
async function addData(){
  await client.from("shipments").insert({
    date:document.getElementById("dateInput").value,
    category:"notice",
    title:document.getElementById("title").value,
    content:document.getElementById("content").value,
    status:document.getElementById("status").value,
    likes:0
  });

  alert("追加した");
  render();
}

/* いいね（トグル） */
async function like(id,count){
  const key = "liked_" + id;
  let liked = localStorage.getItem(key);

  if(liked){
    await client.from("shipments")
      .update({likes: Math.max(0, count - 1)})
      .eq("id", id);

    localStorage.removeItem(key);

  }else{
    await client.from("shipments")
      .update({likes: count + 1})
      .eq("id", id);

    localStorage.setItem(key, "true");
  }

  render();
}

/* 初期表示 */
setTab("notice");
</script>

</body>
</html>
